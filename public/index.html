// 탐험 탭 (던전 + 광산 서브탭)
function ExploreTab({myS,setMy,toast,col,aliveCols,dgExploring,dgRes,setDgRes,runDungeon,DUNGEONS,unlocks,useStaminaPot,acHex}){
  const [exploreTab,setExploreTab]=React.useState("dungeon");

  // 광산 파견 처리
  const dispatchMine=(mineId,selectedIdxs)=>{
    const mine=MINE_CONFIGS.find(m=>m.id===mineId);
    if(!mine)return;
    if(selectedIdxs.length<1){toast("몬스터를 선택하세요!","var(--red)");return;}
    if(selectedIdxs.length>mine.slots){toast(`최대 ${mine.slots}마리!`,"var(--red)");return;}
    const now=Date.now();
    const endTime=now+mine.hours*3600*1000;
    setMy(s=>{
      // 파견된 몬스터들을 mining 상태로
      const nc=(s.collection||[]).map((c,i)=>
        selectedIdxs.includes(i)?{...c,mining:{mineId,endTime}}:c
      );
      return{...s,collection:nc};
    });
    toast(`⛏️ ${mine.name} 파견 완료! ${mine.hours}시간 후 회수 가능`,"#8b5cf6");
  };

  // 광산 회수
  const recallMine=(mineId)=>{
    const mine=MINE_CONFIGS.find(m=>m.id===mineId);
    if(!mine)return;
    const now=Date.now();
    const miners=(myS.collection||[]).filter(c=>c.mining?.mineId===mineId);
    if(miners.length===0){toast("파견된 몬스터가 없습니다!","var(--red)");return;}
    const ready=miners.every(c=>now>=c.mining.endTime);
    if(!ready){
      const earliest=Math.min(...miners.map(c=>c.mining.endTime));
      const remain=Math.ceil((earliest-now)/60000);
      toast(`⏰ ${remain}분 후 회수 가능!`,"var(--orange)");
      return;
    }
    // 등급/강화 기반 보너스
    const avgBonus=miners.reduce((acc,c)=>{
      const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{rarity:"COMMON"};
      const gradeBonus={COMMON:1,UNCOMMON:1.3,RARE:1.6,UNIQUE:2.0,EPIC:3.0,LEGEND:4.0}[bm.rarity]||1;
      return acc+gradeBonus*(1+(c.enhance||0)*0.05);
    },0)/miners.length;

    const dropped=[];
    mine.drops.forEach(d=>{
      if(Math.random()<d.rate){
        const amt=Math.max(1,Math.round(d.amt*avgBonus));
        dropped.push({id:d.id,amt});
      }
    });

    setMy(s=>{
      let ns={...s,collection:(s.collection||[]).map(c=>
        c.mining?.mineId===mineId?{...c,mining:null}:c
      )};
      dropped.forEach(({id,amt})=>{ns=addItem(ns,id,amt);});
      return addTamerExp(ns,mine.hours*10);
    });

    const dropStr=dropped.map(({id,amt})=>{
      const it=[...CONSUMABLES,...EVO_STONES,...BOSS_ITEMS,...FOODS,...BALLS].find(x=>x.id===id)||{emoji:"📦"};
      return `${it.emoji}×${amt}`;
    }).join(" ")||"드롭 없음";
    toast(`⛏️ 회수 완료! ${dropStr}`,"#8b5cf6");
  };

  return <div>
    {/* 서브탭 */}
    <div style={{display:"flex",borderBottom:"2px solid rgba(0,0,0,0.06)",background:"white",flexShrink:0}}>
      {[["dungeon","🏰 던전"],["mine","⛏️ 광산"]].map(([k,l])=>(
        <button key={k} onClick={()=>setExploreTab(k)}
          style={{flex:1,padding:"10px 0",border:"none",background:"transparent",
            fontSize:13,fontWeight:exploreTab===k?800:500,fontFamily:"inherit",cursor:"pointer",
            color:exploreTab===k?acHex:"var(--tx3)",
            borderBottom:`3px solid ${exploreTab===k?acHex:"transparent"}`,
            transition:"all 0.15s"}}>
          {l}
        </button>
      ))}
    </div>

    {/* 던전 서브탭 */}
    {exploreTab==="dungeon"&&<div style={{padding:12}}>
      <SideDungeon myS={myS} dgExploring={dgExploring} dgRes={dgRes} setDgRes={setDgRes}
        runDungeon={runDungeon} DUNGEONS={DUNGEONS} unlocks={unlocks} aliveCols={aliveCols}
        useStaminaPot={useStaminaPot}/>
    </div>}

    {/* 광산 서브탭 */}
    {exploreTab==="mine"&&<MineTab myS={myS} col={col} aliveCols={aliveCols}
      dispatchMine={dispatchMine} recallMine={recallMine} acHex={acHex} unlocks={unlocks}/>}
  </div>;
}

// 광산 탭 UI
function MineTab({myS,col,aliveCols,dispatchMine,recallMine,acHex,unlocks}){
  const [selectedMine,setSelectedMine]=React.useState(null);
  const [selectedMonIdxs,setSelectedMonIdxs]=React.useState([]);
  const tLv=myS.tamerLv||1;
  const now=Date.now();

  const toggleMon=(idx)=>{
    const mine=MINE_CONFIGS.find(m=>m.id===selectedMine);
    if(!mine)return;
    setSelectedMonIdxs(prev=>{
      if(prev.includes(idx))return prev.filter(i=>i!==idx); // 선택 해제
      if(prev.length>=mine.slots)return prev; // 슬롯 초과 시 무시
      return [...prev,idx];
    });
  };

  // 현재 파견 현황
  const miningMons=(myS.collection||[]).filter(c=>c.mining);
  const mineStatus=MINE_CONFIGS.reduce((acc,mine)=>{
    const miners=(myS.collection||[]).filter(c=>c.mining?.mineId===mine.id);
    if(miners.length>0){
      const ready=miners.every(c=>now>=c.mining.endTime);
      const remaining=ready?0:Math.ceil((Math.min(...miners.map(c=>c.mining.endTime))-now)/60000);
      acc[mine.id]={miners,ready,remaining};
    }
    return acc;
  },{});

  return <div style={{padding:12}}>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:4}}>⛏️ 광산 파견</div>
    <div style={{fontSize:9,color:"var(--tx3)",marginBottom:10,padding:"5px 8px",
      background:"rgba(139,92,246,0.05)",borderRadius:7,border:"1px solid rgba(139,92,246,0.12)"}}>
      몬스터를 광산에 보내 현실 시간 경과 후 아이템 수확. 파견 중 소환수는 다른 컨텐츠 사용 불가.
    </div>

    {/* 진행 중인 파견 현황 */}
    {Object.entries(mineStatus).map(([mineId,status])=>{
      const mine=MINE_CONFIGS.find(m=>m.id===mineId);
      return <div key={mineId} style={{marginBottom:8,padding:"8px 10px",borderRadius:10,
        background:status.ready?"rgba(16,185,129,0.08)":"rgba(139,92,246,0.06)",
        border:`1px solid ${status.ready?"rgba(16,185,129,0.3)":"rgba(139,92,246,0.2)"}`}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
          <span style={{fontSize:16}}>{mine.emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:status.ready?"var(--green)":"var(--purple)"}}>
              {mine.name} {status.ready?"✅ 회수 가능!":"⏳ 파견 중..."}
            </div>
            <div style={{fontSize:8,color:"var(--tx3)"}}>
              {status.miners.map(c=>{const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{emoji:"❓"};return bm.emoji;}).join(" ")}
              {!status.ready&&` · 약 ${status.remaining}분 남음`}
            </div>
          </div>
          <button onClick={()=>recallMine(mineId)}
            disabled={!status.ready}
            style={{padding:"4px 10px",borderRadius:8,border:"none",fontFamily:"inherit",
              background:status.ready?"var(--green)":"rgba(0,0,0,0.06)",
              color:status.ready?"white":"rgba(0,0,0,0.2)",fontSize:9,fontWeight:700,cursor:status.ready?"pointer":"default"}}>
            {status.ready?"회수":"대기"}
          </button>
        </div>
      </div>;
    })}

    {/* 광산 목록 */}
    {MINE_CONFIGS.map(mine=>{
      const locked=tLv<mine.minLv;
      const busy=mineStatus[mine.id];
      const isSelected=selectedMine===mine.id;
      return <div key={mine.id} style={{marginBottom:8,borderRadius:11,
        border:`1.5px solid ${isSelected?acHex:locked?"rgba(0,0,0,0.05)":"rgba(0,0,0,0.1)"}`,
        background:isSelected?`${acHex}08`:"white",opacity:locked?0.4:1}}>
        <div style={{padding:"9px 11px",cursor:locked||busy?"default":"pointer"}}
      onClick={()=>{
        if(locked||busy)return;
        if(isSelected){setSelectedMine(null);setSelectedMonIdxs([]);}
        else{setSelectedMine(mine.id);setSelectedMonIdxs([]);}
      }}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>{locked?"🔒":mine.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--tx1)"}}>{mine.name}</div>
              <div style={{fontSize:9,color:"var(--tx3)"}}>{mine.desc}</div>
              <div style={{fontSize:8,color:"var(--tx3)",marginTop:2}}>
                드롭: {mine.drops.map(d=>{
                  const it=[...CONSUMABLES,...EVO_STONES,...FOODS,...BOSS_ITEMS].find(x=>x.id===d.id)||{emoji:"📦"};
                  return `${it.emoji}(${Math.round(d.rate*100)}%)`;
                }).join(" ")}
              </div>
            </div>
            {busy?<span style={{fontSize:9,color:"var(--purple)",fontWeight:700}}>파견중</span>
              :locked?<span style={{fontSize:9,color:"var(--tx3)"}}>Lv{mine.minLv}</span>
              :<span style={{fontSize:9,color:isSelected?acHex:"var(--tx3)"}}>{isSelected?"▲":"▼"}</span>}
          </div>
        </div>

        {/* 몬스터 선택 (선택된 광산만) */}
        {isSelected&&!busy&&<div style={{padding:"0 11px 11px"}}>
          <div style={{fontSize:9,color:"var(--tx2)",fontWeight:700,marginBottom:5}}>
            파견 몬스터 선택 ({selectedMonIdxs.length}/{mine.slots}마리)
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:3,marginBottom:8}}>
            {aliveCols.map((c,i)=>{
              const origIdx=col.indexOf(c);
              const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{emoji:"❓",rarity:"COMMON"};
              const isMining=c.mining;
              const isChosen=selectedMonIdxs.includes(origIdx);
              const isFull=selectedMonIdxs.length>=mine.slots&&!isChosen;
              const isDisabled=!!isMining||isFull;
              return <button key={i} onClick={()=>!isDisabled&&toggleMon(origIdx)}
                disabled={isDisabled}
                style={{padding:"5px 3px",borderRadius:8,textAlign:"center",fontFamily:"inherit",
                  border:`1.5px solid ${isChosen?acHex:"rgba(0,0,0,0.08)"}`,
                  background:isChosen?`${acHex}15`:(isMining||isFull)?"rgba(0,0,0,0.03)":"white",
                  cursor:isDisabled?"default":"pointer",
                  opacity:isMining?0.3:isFull?0.4:1}}>
                <div style={{fontSize:14}}>{bm.emoji}</div>
                <div style={{fontSize:6,color:"var(--tx3)"}}>Lv{c.lv}</div>
                <div style={{fontSize:6,color:RCOL[bm.rarity]||"#888"}}>{bm.rarity?.slice(0,3)}</div>
              </button>;
            })}
            {aliveCols.length===0&&<div style={{gridColumn:"1/-1",fontSize:9,color:"var(--tx3)",textAlign:"center",padding:"8px 0"}}>몬스터 없음</div>}
          </div>
          <button onClick={()=>{dispatchMine(mine.id,selectedMonIdxs);setSelectedMine(null);setSelectedMonIdxs([]);}}
            disabled={selectedMonIdxs.length===0}
            style={{width:"100%",padding:"8px 0",borderRadius:9,border:"none",
              background:selectedMonIdxs.length>0?"linear-gradient(135deg,#8b5cf6,#6d28d9)":"rgba(0,0,0,0.06)",
              color:selectedMonIdxs.length>0?"white":"rgba(0,0,0,0.2)",
              fontSize:11,fontWeight:800,cursor:selectedMonIdxs.length>0?"pointer":"default",fontFamily:"inherit"}}>
            ⛏️ {mine.name} 파견! ({selectedMonIdxs.length}/{mine.slots}마리)
          </button>
        </div>}
      </div>;
    })}
  </div>;
}


function SideRaid({myS,col,setMy,toast,aliveCols,acHex}){
  const [raidState,setRaidState]=React.useState(null);
  const [pickedIdx,setPickedIdx]=React.useState(null);
  const [raidRooms,setRaidRooms]=React.useState({}); // Firebase 공유 레이드방
  const [myRaidRoom,setMyRaidRoom]=React.useState(null); // 내가 참여 중인 방

  // Firebase 레이드방 10초 폴링 (비용 절감)
  React.useEffect(()=>{
    if(!db)return;
    const fetchRooms=()=>{
      db.ref("raidRooms").once("value",snap=>{
        const data=snap.val()||{};
        const now=Date.now();
        const active={};
        Object.entries(data).forEach(([id,room])=>{
          if(room&&room.bossHp>0&&room.startedAt&&(now-room.startedAt)<86400000){
            active[id]=room;
          }
        });
        setRaidRooms(active);
      });
    };
    fetchRooms(); // 즉시 1회
    const timer=setInterval(fetchRooms,10000); // 10초마다
    return()=>clearInterval(timer);
  },[]);

  // 협력 레이드 공격
  const attackCoopRaid=(roomId,bossId)=>{
    if(pickedIdx===null){toast("몬스터를 선택하세요!","var(--red)");return;}
    const boss=RAID_BOSSES.find(b=>b.id===bossId);
    const c=aliveCols[pickedIdx];
    if(!c||!boss)return;
    const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{atk:10,hp:30};
    const enh=c.enhance||0;
    const equipB=getEquipBonus(myS.equipsOn,myS.equips);
    const myAtk=Math.floor((bm.atk+(c.lv||1)*2)*(1+(c.atkBonus||0))*(1+enh*3/100)*(1+equipB.atk/100));
    const myDmg=Math.max(1,Math.floor(myAtk*(0.85+Math.random()*0.3)));

    const roomRef=db.ref(`raidRooms/${roomId}`);
    roomRef.transaction(room=>{
      if(!room||room.bossHp<=0)return room;
      const newHp=Math.max(0,room.bossHp-myDmg);
      const log=[...(room.log||[]).slice(-10),
        `⚔️ ${myS.nickname||"테이머"} ${myDmg}dmg → HP ${newHp}/${room.bossMaxHp}`
      ];
      if(newHp<=0){
        return{...room,bossHp:0,status:"cleared",clearedAt:Date.now(),log:[...log,`🏆 ${boss.name} 레이드 클리어!`]};
      }
      return{...room,bossHp:newHp,log};
    },(err,committed,snap)=>{
      if(err){toast("오류 발생!","var(--red)");return;}
      const room=snap.val();
      if(room&&room.bossHp<=0){
        // 클리어 보상 지급 + 30분 쿨타임 기록
        setMy(s=>{
          let ns={...s,
            bossKills:{...(s.bossKills||{}),[bossId]:((s.bossKills||{})[bossId]||0)+1},
            raidCooldowns:{...(s.raidCooldowns||{}),[bossId]:Date.now()},
          };
          Object.entries(boss.rewards).forEach(([id,amt])=>{ns=addItem(ns,id,amt);});
          (boss.randomDrops||[]).forEach(drop=>{
            if(Math.random()<drop.rate){
              const isEquip=BOSS_EQUIPS.find(e=>e.id===drop.id);
              if(isEquip) ns={...ns,equips:{...(ns.equips||{}),[drop.id]:true}};
              else ns=addItem(ns,drop.id,drop.amt);
            }
          });
          return addTamerExp(ns,150);
        });
        // 30초 후 방 삭제
        setTimeout(()=>{db.ref(`raidRooms/${roomId}`).remove();},30000);
        toast(`🏆 ${boss.name} 클리어! (30분 쿨타임)`,"var(--gold)");
      }else{
        toast(`⚔️ ${myDmg} 대미지!`,"var(--purple)");
      }
    });
  };

  // 새 레이드방 생성
  const createRaidRoom=(bossId)=>{
    if(!db){toast("Firebase 연결 필요!","var(--red)");return;}
    const boss=RAID_BOSSES.find(b=>b.id===bossId);
    if(!boss)return;
    // 1. 중복 방지 - 같은 보스의 진행중 방이 이미 있으면 거부
    const existingRoom=Object.values(raidRooms).find(r=>r.bossId===bossId&&r.status==="ongoing");
    if(existingRoom){
      toast(`⚠️ ${boss.name} 레이드방이 이미 있습니다! 참전하세요`,"var(--orange)");
      return;
    }
    // 2. 쿨타임 체크 (30분)
    const coolDown=30*60*1000;
    const lastClear=(myS.raidCooldowns||{})[bossId]||0;
    const remaining=coolDown-(Date.now()-lastClear);
    if(remaining>0){
      const mins=Math.ceil(remaining/60000);
      toast(`⏱️ ${boss.name} 쿨타임 ${mins}분 남음!`,"var(--orange)");
      return;
    }
    const roomId=`raid_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
    const room={
      id:roomId,bossId,bossHp:boss.hp,bossMaxHp:boss.hp,
      status:"ongoing",startedAt:Date.now(),
      host:myS.nickname||"테이머",
      log:[`🌋 ${boss.name} 레이드 시작!`],
      participants:{},
    };
    db.ref(`raidRooms/${roomId}`).set(room);
    setMyRaidRoom(roomId);
    toast(`🌋 ${boss.name} 레이드방 개설!`,"var(--purple)");
  };

  // 레이드 떠나기
  const leaveRaidRoom=(roomId)=>{
    if(!db)return;
    if(!confirm("레이드방을 떠나시겠습니까?\n(진행 중인 방은 다른 사람이 이어서 공격 가능)"))return;
    const room=raidRooms[roomId];
    if(room&&room.host===(myS.nickname||"테이머")){
      // 호스트가 떠나면 방 삭제
      db.ref(`raidRooms/${roomId}`).remove();
      toast("🚪 레이드방 삭제됨","var(--tx3)");
    }else{
      toast("🚪 레이드 떠남","var(--tx3)");
    }
    setMyRaidRoom(null);
  };

  // 즐겨찾기(주력) 소환수
  const favs=myS.favMons||[];
  const toggleFav=(origIdx)=>{
    setMy(s=>{
      const cur=s.favMons||[];
      const next=cur.includes(origIdx)?cur.filter(x=>x!==origIdx):[...cur,origIdx];
      return{...s,favMons:next};
    });
  };

  // 몬스터 카드 렌더 (강화/등급/스탯 압축 표시)
  const MonCard=({c,i,origIdx,selected,onSelect})=>{
    const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{emoji:"❓",name:"??",rarity:"COMMON",atk:10,hp:30,color:"#888"};
    const enh=c.enhance||0;
    const enhColor=enh>=7?"var(--gold)":enh>=4?"var(--purple)":"var(--blue)";
    const isFav=favs.includes(origIdx);
    const myAtk=Math.floor((bm.atk+(c.lv||1)*2)*(1+(c.atkBonus||0))*(1+enh*3/100));
    const myHp=bm.hp+((c.lv||1)-1)*5;
    const tInfo=c.monType?TYPES[c.monType]:null;
    return <div onClick={onSelect} style={{
      borderRadius:11,padding:"8px 9px",cursor:"pointer",
      border:`2px solid ${selected?(RCOL[bm.rarity]||acHex):"rgba(0,0,0,0.08)"}`,
      background:selected?`${RCOL[bm.rarity]||acHex}10`:"white",
      boxShadow:selected?`0 2px 12px ${RCOL[bm.rarity]||acHex}30`:"0 1px 5px rgba(0,0,0,0.05)",
      position:"relative",transition:"all 0.15s"}}>
      {/* 즐겨찾기 버튼 */}
      <div onClick={e=>{e.stopPropagation();toggleFav(origIdx);}}
        style={{position:"absolute",top:4,right:5,fontSize:11,cursor:"pointer",opacity:isFav?1:0.3}}>
        {isFav?"⭐":"☆"}
      </div>
      {/* 등급 배지 */}
      <div style={{position:"absolute",top:4,left:6,fontSize:7,fontWeight:800,
        color:RCOL[bm.rarity]||"#888",background:`${RCOL[bm.rarity]||"#888"}15`,
        padding:"1px 4px",borderRadius:4,border:`1px solid ${RCOL[bm.rarity]||"#888"}30`}}>
        {bm.rarity?.slice(0,3)}
      </div>
      {/* 이모지 */}
      <div style={{textAlign:"center",fontSize:22,marginTop:4,marginBottom:3}}>{bm.emoji}</div>
      {/* 이름 */}
      <div style={{fontSize:9,fontWeight:700,textAlign:"center",color:"var(--tx1)",marginBottom:2,
        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
        {c.name||bm.name}
      </div>
      {/* Lv + 강화 */}
      <div style={{display:"flex",justifyContent:"center",gap:3,marginBottom:3,alignItems:"center"}}>
        <span style={{fontSize:8,color:"var(--tx3)"}}>Lv{c.lv}</span>
        {enh>0&&<span style={{fontSize:8,fontWeight:800,color:enhColor}}>+{enh}</span>}
        {c.gender&&<span style={{fontSize:8,color:c.gender==="♂"?"#3b82f6":"#ec4899"}}>{c.gender}</span>}
      </div>
      {/* 스탯 */}
      <div style={{display:"flex",justifyContent:"center",gap:4,fontSize:8,color:"var(--tx3)"}}>
        <span style={{color:"var(--red)"}}>⚔{myAtk}</span>
        <span style={{color:"var(--green)"}}>❤{myHp}</span>
        {tInfo&&<span style={{color:tInfo.color}}>{tInfo.emoji}</span>}
      </div>
    </div>;
  };

  const startRaid=(bossId)=>{
    if(pickedIdx===null){toast("몬스터를 선택하세요!","var(--red)");return;}
    const boss=RAID_BOSSES.find(b=>b.id===bossId);
    if(!boss)return;
    const c=aliveCols[pickedIdx];
    const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{hp:30,atk:10};
    const myMaxHp=bm.hp+((c.lv||1)-1)*5;
    // 레이드 보스 HP = 원본의 5배 (진짜 레이드 난이도)
    setRaidState({
      bossId,
      bossHp:boss.hp*5, bossMaxHp:boss.hp*5,
      myHp:myMaxHp, myMaxHp,
      phase:0,
      log:[`🌋 ${boss.emoji}${boss.name} 레이드 시작!`],
      over:false,win:false,
    });
  };

  const attackRaid=()=>{
    if(!raidState||raidState.over||pickedIdx===null)return;
    const boss=RAID_BOSSES.find(b=>b.id===raidState.bossId);
    const c=aliveCols[pickedIdx];
    if(!c||!boss)return;
    const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{atk:10,hp:30};

    // 내 공격력 계산 (강화+장비+타입 반영)
    const enh=c.enhance||0;
    const equipBonus=getEquipBonus(myS.equipsOn,myS.equips);
    const myAtk=Math.floor((bm.atk+(c.lv||1)*2)*(1+(c.atkBonus||0))*(1+enh*3/100)*(1+equipBonus.atk/100));

    // 페이즈
    const curPhase=raidState.phase;
    const phaseInfo=boss.phases[curPhase];
    const atkMult=phaseInfo?.atkMult||1;
    const defMult=phaseInfo?.defMult||1;

    // 타입 상성 보너스
    const myType=c.monType||(MON_BASE_TYPE[c.baseId||c.id]);
    const bossType=MON_BASE_TYPE[boss.id]||"fire";
    const typeMult=getTypeMult(myType,bossType);

    const myDmg=Math.max(1,Math.floor(myAtk*(0.85+Math.random()*0.3)*typeMult/defMult));
    // 보스 반격 - 플레이어 HP 소모!
    const defBonus=1-Math.min(0.6,(getEquipBonus(myS.equipsOn,myS.equips).def/100));
    const bDmg=Math.max(1,Math.floor(boss.atk*atkMult*(0.85+Math.random()*0.3)*defBonus));

    const newBossHp=Math.max(0,raidState.bossHp-myDmg);
    const newMyHp=Math.max(0,raidState.myHp-bDmg);

    const typeMsg=typeMult>1?"⚡효과적!":typeMult<1?"💤비효과...":"";
    const newLog=[...raidState.log.slice(-7),
      `⚔ 내공격 ${myDmg}dmg${typeMsg} → 보스HP ${newBossHp}/${raidState.bossMaxHp}`,
      `💢 보스반격 ${bDmg}dmg → 내HP ${newMyHp}/${raidState.myMaxHp}`,
    ];

    // 페이즈 전환
    let newPhase=curPhase;
    const nextPhase=boss.phases[curPhase+1];
    if(nextPhase&&newBossHp/raidState.bossMaxHp<=nextPhase.hp){
      newPhase=curPhase+1;
      newLog.push(`🔥 ${boss.phases[newPhase].msg}`);
    }

    // 내 몬스터 사망 체크
    if(newMyHp<=0){
      // 몬스터 전사!
      setMy(s=>{
        const nc=(s.collection||[]).map((cc,ci)=>{
          const origIdx=col.indexOf(aliveCols[pickedIdx]);
          return ci===origIdx?{...cc,alive:false,curHp:0}:cc;
        });
        return{...s,collection:nc,losses:(s.losses||0)+1};
      });
      newLog.push(`💀 ${c.name||bm.name} 전사! 레이드 실패...`);
      setRaidState(s=>({...s,bossHp:newBossHp,myHp:0,phase:newPhase,log:newLog,over:true,win:false}));
      toast(`💀 ${c.name||bm.name} 전사!`,"var(--red)");
      return;
    }

    if(newBossHp<=0){
      // 랜덤 파밍 계산
      const droppedItems=[];
      (boss.randomDrops||[]).forEach(drop=>{
        if(Math.random()<drop.rate){
          droppedItems.push({id:drop.id,name:drop.name,emoji:drop.emoji,amt:drop.amt,desc:drop.desc});
        }
      });

      setMy(s=>{
        let ns={...s,bossKills:{...(s.bossKills||{}),[boss.id]:((s.bossKills||{})[boss.id]||0)+1}};
        // 확정 보상
        Object.entries(boss.rewards).forEach(([id,amt])=>{ns=addItem(ns,id,amt);});
        // 랜덤 드롭 아이템 처리
        droppedItems.forEach(drop=>{
          const isEquip=BOSS_EQUIPS.find(e=>e.id===drop.id);
          if(isEquip){
            // 장비: equips 객체에 저장
            ns={...ns,equips:{...(ns.equips||{}),[drop.id]:true}};
          } else {
            // 일반 아이템: consumables 또는 stones에 추가
            ns=addItem(ns,drop.id,drop.amt);
          }
        });
        return addTamerExp(ns,200);
      });

      // 드롭 로그
      const dropLog=droppedItems.length>0
        ?droppedItems.map(d=>`${d.emoji}${d.name}`).join(" · ")
        :"추가 드롭 없음";
      newLog.push(`🏆 ${boss.name} 클리어!`);
      newLog.push(`🎁 파밍: ${dropLog}`);
      setRaidState(s=>({...s,bossHp:0,myHp:newMyHp,phase:newPhase,log:newLog,over:true,win:true,drops:droppedItems}));
    }else{
      setRaidState(s=>({...s,bossHp:newBossHp,myHp:newMyHp,phase:newPhase,log:newLog}));
    }
  };

  if(raidState){
    const boss=RAID_BOSSES.find(b=>b.id===raidState.bossId);
    const bossPct=Math.max(0,raidState.bossHp/raidState.bossMaxHp*100);
    const myPct=Math.max(0,raidState.myHp/raidState.myMaxHp*100);
    const c=aliveCols[pickedIdx];
    const bm=c?MONS.find(m=>m.id===(c.baseId||c.id)):null;
    return <div>
      <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:8}}>🌋 레이드 진행중</div>
      {/* 보스 */}
      <div style={{textAlign:"center",fontSize:30,marginBottom:2,
        filter:raidState.bossHp<raidState.bossMaxHp*0.3?"drop-shadow(0 0 8px red)":"none"}}>
        {boss.emoji}
      </div>
      <div style={{fontSize:11,fontWeight:700,color:boss.color,textAlign:"center",marginBottom:4}}>{boss.name}</div>
      <div style={{background:"rgba(0,0,0,0.08)",borderRadius:5,height:8,marginBottom:2,overflow:"hidden"}}>
        <div style={{width:`${bossPct}%`,height:"100%",
          background:bossPct>50?"var(--green)":bossPct>25?"var(--gold)":"var(--red)",
          borderRadius:5,transition:"width 0.3s"}}/>
      </div>
      <div style={{fontSize:9,color:"var(--tx3)",textAlign:"right",marginBottom:8}}>
        보스 {raidState.bossHp}/{raidState.bossMaxHp}
      </div>
      {/* 내 몬스터 HP */}
      {c&&bm&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 7px",
        borderRadius:8,background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.15)",marginBottom:8}}>
        <span style={{fontSize:16}}>{bm.emoji}</span>
        <div style={{flex:1}}>
          <div style={{background:"rgba(0,0,0,0.06)",borderRadius:4,height:5,overflow:"hidden"}}>
            <div style={{width:`${myPct}%`,height:"100%",
              background:myPct>50?"var(--green)":myPct>25?"var(--gold)":"var(--red)",
              borderRadius:4,transition:"width 0.3s"}}/>
          </div>
        </div>
        <span style={{fontSize:9,color:myPct>25?"var(--green)":"var(--red)",fontWeight:700}}>
          {raidState.myHp}/{raidState.myMaxHp}
        </span>
      </div>}
      {/* 로그 */}
      <div style={{maxHeight:80,overflowY:"auto",background:"rgba(0,0,0,0.04)",borderRadius:8,
        padding:"6px 8px",marginBottom:8,fontSize:8,lineHeight:1.7,color:"var(--tx2)"}}>
        {raidState.log.slice(-6).map((l,i)=>(
          <div key={i} style={{color:l.includes("🏆")?"var(--gold)":l.includes("💀")||l.includes("실패")?"var(--red)":l.includes("🔥")?"var(--orange)":"var(--tx2)"}}>{l}</div>
        ))}
      </div>
      {!raidState.over
        ?<button onClick={attackRaid} style={{width:"100%",padding:"9px 0",borderRadius:10,border:"none",
            background:`linear-gradient(135deg,${boss.color},${boss.color}cc)`,color:"white",
            fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit",
            boxShadow:`0 4px 14px ${boss.color}50`}}>
            ⚔️ 공격!
          </button>
        :<div>
          {raidState.win&&<div style={{marginBottom:8}}>
            {/* 확정 보상 */}
            <div style={{padding:"7px 10px",borderRadius:9,background:"rgba(245,158,11,0.08)",
              border:"1px solid rgba(245,158,11,0.25)",marginBottom:5}}>
              <div style={{fontSize:9,color:"var(--gold)",fontWeight:800,marginBottom:3}}>✅ 확정 보상</div>
              <div style={{fontSize:10,color:"var(--tx1)"}}>
                {Object.entries(boss.rewards).map(([id,amt])=>{
                  const it=[...CONSUMABLES,...EVO_STONES,...BOSS_ITEMS,...FOODS].find(x=>x.id===id)||{emoji:"📦"};
                  return `${it.emoji}×${amt}`;
                }).join("  ")}
              </div>
            </div>
            {/* 랜덤 드롭 */}
            <div style={{padding:"7px 10px",borderRadius:9,
              background:(raidState.drops||[]).length>0?"rgba(139,92,246,0.08)":"rgba(0,0,0,0.03)",
              border:`1px solid ${(raidState.drops||[]).length>0?"rgba(139,92,246,0.25)":"rgba(0,0,0,0.06)"}`}}>
              <div style={{fontSize:9,fontWeight:800,color:"var(--purple)",marginBottom:3}}>🎲 랜덤 파밍</div>
              {(raidState.drops||[]).length>0
                ?<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {(raidState.drops||[]).map((d,i)=>(
                    <div key={i} style={{padding:"3px 7px",borderRadius:7,
                      background:"rgba(139,92,246,0.1)",border:"1px solid rgba(139,92,246,0.2)",
                      fontSize:9,fontWeight:700,color:"var(--purple)"}}>
                      {d.emoji} {d.name}{d.amt>1&&`×${d.amt}`}
                    </div>
                  ))}
                </div>
                :<div style={{fontSize:9,color:"var(--tx3)"}}>이번엔 추가 드롭 없음... 다음엔 운이 따를 거예요!</div>
              }
            </div>
          </div>}
          {!raidState.win&&<div style={{padding:"6px",borderRadius:8,background:"rgba(239,68,68,0.08)",
            border:"1px solid rgba(239,68,68,0.2)",marginBottom:6,fontSize:10,color:"var(--red)",
            textAlign:"center",fontWeight:700}}>💀 몬스터 전사... 더 강한 몬스터로 도전하세요!</div>}
          <button onClick={()=>{setRaidState(null);setPickedIdx(null);}}
            style={{width:"100%",padding:"7px 0",borderRadius:9,border:"1px solid rgba(139,92,246,0.2)",
              background:"transparent",color:"var(--purple)",fontSize:11,fontWeight:700,
              cursor:"pointer",fontFamily:"inherit"}}>← 돌아가기</button>
        </div>}
    </div>;
  }

  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:4}}>🌋 레이드</div>
    <div style={{fontSize:9,color:"var(--tx3)",marginBottom:8,padding:"5px 8px",
      background:"rgba(239,68,68,0.05)",borderRadius:7,border:"1px solid rgba(239,68,68,0.15)"}}>
      ⚠️ 보스가 강력하게 반격! · 몬스터 전사 주의 · 강화된 소환수 추천
    </div>

    {/* 실시간 협력 레이드방 */}
    {Object.keys(raidRooms).length>0&&<div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:800,color:"var(--purple)",marginBottom:6}}>
        🔴 진행 중인 협력 레이드 ({Object.keys(raidRooms).length}개)
      </div>
      {Object.entries(raidRooms).map(([roomId,room])=>{
        const boss=RAID_BOSSES.find(b=>b.id===room.bossId);
        if(!boss)return null;
        const pct=Math.max(0,(room.bossHp/room.bossMaxHp)*100);
        return <div key={roomId} style={{padding:"9px 11px",borderRadius:11,marginBottom:6,
          border:`1.5px solid ${boss.color}40`,background:`${boss.color}06`}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
            <span style={{fontSize:20}}>{boss.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:800,color:boss.color}}>{boss.name}</div>
              <div style={{fontSize:9,color:"var(--tx3)"}}>방장: {room.host}</div>
            </div>
            <div style={{fontSize:10,fontWeight:800,color:pct>50?"var(--green)":pct>25?"var(--gold)":"var(--red)"}}>
              HP {Math.round(pct)}%
            </div>
          </div>
          {/* 보스 HP 바 */}
          <div style={{background:"rgba(0,0,0,0.08)",borderRadius:5,height:7,overflow:"hidden",marginBottom:5}}>
            <div style={{width:`${pct}%`,height:"100%",
              background:pct>50?"var(--green)":pct>25?"var(--gold)":"var(--red)",
              borderRadius:5,transition:"width 0.3s"}}/>
          </div>
          <div style={{fontSize:8,color:"var(--tx3)",marginBottom:5}}>
            {(room.log||[]).slice(-1)[0]||""}
          </div>
          <div style={{display:"flex",gap:5}}>
            <button onClick={()=>attackCoopRaid(roomId,room.bossId)}
              disabled={pickedIdx===null}
              style={{flex:1,padding:"6px 0",borderRadius:8,border:"none",
                background:pickedIdx!==null?`linear-gradient(135deg,${boss.color},${boss.color}cc)`:"rgba(0,0,0,0.06)",
                color:pickedIdx!==null?"white":"rgba(0,0,0,0.2)",
                fontSize:11,fontWeight:800,cursor:pickedIdx!==null?"pointer":"default",fontFamily:"inherit"}}>
              {pickedIdx===null?"몬스터 선택 후 참전":"⚔️ 참전 공격!"}
            </button>
            <button onClick={()=>leaveRaidRoom(roomId)}
              style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid rgba(239,68,68,0.25)",
                background:"rgba(239,68,68,0.08)",color:"var(--red)",
                fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>
              🚪 떠나기
            </button>
          </div>
        </div>;
      })}
    </div>}
    {Object.keys(raidRooms).length===0&&<div style={{padding:"8px 10px",borderRadius:9,
      background:"rgba(0,0,0,0.03)",border:"1px solid rgba(0,0,0,0.07)",marginBottom:10,
      fontSize:10,color:"var(--tx3)",textAlign:"center"}}>
      진행 중인 레이드방 없음 · 아래에서 새 레이드 시작!
    </div>}

    {/* 몬스터 선택 - 개선된 카드 */}
    <div style={{fontSize:10,fontWeight:700,color:"var(--tx2)",marginBottom:4}}>
      출전 몬스터 선택 <span style={{fontSize:8,color:"var(--tx3)",fontWeight:400}}>(⭐누르면 주력 설정)</span>
    </div>
    {/* 즐겨찾기 먼저 표시 */}
    {favs.length>0&&<div style={{fontSize:9,color:"var(--gold)",fontWeight:700,marginBottom:3}}>⭐ 주력 몬스터</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:10}}>
      {aliveCols.map((c,i)=>{
        const origIdx=col.indexOf(c);
        const isFav=favs.includes(origIdx);
        if(!isFav)return null;
        return <MonCard key={i} c={c} i={i} origIdx={origIdx} selected={pickedIdx===i} onSelect={()=>setPickedIdx(pickedIdx===i?null:i)}/>;
      })}
      {aliveCols.map((c,i)=>{
        const origIdx=col.indexOf(c);
        const isFav=favs.includes(origIdx);
        if(isFav)return null;
        return <MonCard key={i} c={c} i={i} origIdx={origIdx} selected={pickedIdx===i} onSelect={()=>setPickedIdx(pickedIdx===i?null:i)}/>;
      })}
    </div>

    {/* 레이드 보스 목록 */}
    {/* 전체 5부위 세트 현황 */}
    {(()=>{
      const myEquips=myS.equips||{};
      const ownedCount=BOSS_EQUIPS.filter(e=>myEquips[e.id]).length;
      const isFullSet=ownedCount===BOSS_EQUIPS.length;
      return <div style={{padding:"8px 10px",borderRadius:10,marginBottom:10,
        background:isFullSet?"rgba(245,158,11,0.08)":"rgba(0,0,0,0.03)",
        border:`1.5px solid ${isFullSet?"rgba(245,158,11,0.4)":"rgba(0,0,0,0.08)"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
          <div style={{fontSize:11,fontWeight:800,color:isFullSet?"var(--gold)":"var(--tx2)"}}>
            ⚔️ 레이더 세트 {ownedCount}/{BOSS_EQUIPS.length}부위
            {isFullSet&&<span style={{marginLeft:4}}>✨ 풀셋!</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:4}}>
          {BOSS_EQUIPS.map(eq=>(
            <div key={eq.id} style={{flex:1,padding:"5px 4px",borderRadius:8,textAlign:"center",
              background:myEquips[eq.id]?"rgba(245,158,11,0.1)":"rgba(0,0,0,0.03)",
              border:`1px solid ${myEquips[eq.id]?"rgba(245,158,11,0.4)":"rgba(0,0,0,0.07)"}`,
              opacity:myEquips[eq.id]?1:0.5}}>
              <div style={{fontSize:16}}>{myEquips[eq.id]?eq.emoji:"❓"}</div>
              <div style={{fontSize:7,color:myEquips[eq.id]?"var(--gold)":"var(--tx3)",marginTop:1}}>
                {eq.slot}
              </div>
            </div>
          ))}
        </div>
        {isFullSet&&<div style={{fontSize:9,color:"var(--gold)",fontWeight:700,marginTop:5,textAlign:"center"}}>
          풀셋 효과: ATK+{FULL_SET_BONUS.atk}% DEF+{FULL_SET_BONUS.def}% 추가
        </div>}
      </div>;
    })()}

    {RAID_BOSSES.map(boss=>{
      const killCnt=(myS.bossKills||{})[boss.id]||0;
      const myEquips=myS.equips||{};
      return <div key={boss.id} style={{border:`1.5px solid ${boss.color}35`,borderRadius:12,
        padding:"10px 12px",marginBottom:8,
        background:"white",
        boxShadow:`0 2px 10px ${boss.color}12`}}>
        {/* 보스 헤더 */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <span style={{fontSize:24}}>{boss.emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:800,color:boss.color}}>{boss.name}</div>
            <div style={{fontSize:9,color:"var(--tx3)"}}>
              HP:{boss.hp} · ATK:{boss.atk} · {boss.phases.length-1}페이즈
              {killCnt>0&&<span style={{color:"var(--gold)",marginLeft:4}}>✅{killCnt}회 클리어</span>}
            </div>
          </div>
        </div>
        {/* 이중속성 + 약점 */}
        <div style={{display:"flex",gap:4,marginBottom:5,flexWrap:"wrap"}}>
          <span style={{fontSize:9,padding:"2px 6px",borderRadius:5,background:`${boss.color}15`,color:boss.color,fontWeight:700}}>
            {boss.typeDesc}
          </span>
          <span style={{fontSize:9,padding:"2px 6px",borderRadius:5,background:"rgba(16,185,129,0.08)",color:"var(--green)",fontWeight:700}}>
            💡{boss.weakness}
          </span>
        </div>
        {/* 랜덤 파밍 미리보기 */}
        <div style={{fontSize:9,color:"var(--tx3)",marginBottom:6,padding:"4px 7px",
          background:"rgba(0,0,0,0.03)",borderRadius:6}}>
          <span style={{fontWeight:700,color:"var(--purple)"}}>🎲 파밍 풀: </span>
          {(boss.randomDrops||[]).map(d=>`${d.emoji}${Math.round(d.rate*100)}%`).join(" · ")}
        </div>
        {(()=>{
          // 쿨타임 + 중복 체크
          const coolDown=30*60*1000;
          const lastClear=(myS.raidCooldowns||{})[boss.id]||0;
          const remaining=coolDown-(Date.now()-lastClear);
          const onCooldown=remaining>0;
          const hasActiveRoom=Object.values(raidRooms).some(r=>r.bossId===boss.id&&r.status==="ongoing");
          const disabled=pickedIdx===null||onCooldown||hasActiveRoom;
          let label="🌋 새 레이드방 개설!";
          if(pickedIdx===null)label="몬스터를 먼저 선택하세요";
          else if(hasActiveRoom)label="⚠️ 이미 진행중인 방 있음 · 참전하세요";
          else if(onCooldown){
            const mins=Math.ceil(remaining/60000);
            label=`⏱️ 쿨타임 ${mins}분 남음`;
          }
          return <button onClick={()=>createRaidRoom(boss.id)}
            disabled={disabled}
            style={{width:"100%",padding:"7px 0",borderRadius:9,border:"none",
              background:!disabled?`linear-gradient(135deg,${boss.color},${boss.color}99)`:"rgba(0,0,0,0.06)",
              color:!disabled?"white":"rgba(0,0,0,0.35)",
              fontSize:11,fontWeight:800,cursor:!disabled?"pointer":"default",
              fontFamily:"inherit",
              boxShadow:!disabled?`0 3px 12px ${boss.color}40`:"none"}}>
            {label}
          </button>;
        })()}
      </div>;
    })}
  </div>;
}

// ── HYBRID 교배/육아 시스템 ──
// HYBRID 등급: 두 소환수 교배로 탄생, 부모 속성 혼합
// ── HYBRID 교배/육아 시스템 v2 ──
function SideBreed({myS,col,setMy,toast,aliveCols,acHex}){
  const [parentMale,setParentMale]=React.useState(null);
  const [parentFemale,setParentFemale]=React.useState(null);
  const [egg,setEgg]=React.useState(myS.breedEgg||null);
  const [breedTab,setBreedTab]=React.useState("select");

  const BREED_MIN_IDX=GRADE_ORDER.indexOf("UNCOMMON");
  const breedable=aliveCols.map((c,i)=>({c,i})).filter(({c})=>{
    const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{rarity:"COMMON"};
    return GRADE_ORDER.indexOf(bm.rarity)>=BREED_MIN_IDX;
  });
  const males=breedable.filter(({c})=>c.gender==="♂"||!c.gender);
  const females=breedable.filter(({c})=>c.gender==="♀");

  const nurseEgg=()=>{
    if(!egg||egg.hatch>=egg.need){toast("알이 없거나 이미 부화됨!","var(--red)");return;}
    const useAdv=egg.hatch>=egg.need*0.5;
    const fid=useAdv?"food2":"food1";
    const have=myS.foods?.[fid]||0;
    if(have<=0){toast(`${useAdv?"고급":"일반"} 먹이 필요!`,"var(--red)");return;}
    setMy(s=>({...s,foods:{...s.foods,[fid]:Math.max(0,(s.foods[fid]||1)-1)}}));
    const newEgg={...egg,hatch:Math.min(egg.need,egg.hatch+1)};
    setEgg(newEgg);
    setMy(s=>({...s,breedEgg:newEgg}));
  };

  const hatchEgg=()=>{
    if(!egg||egg.hatch<egg.need)return;
    const bmA=MONS.find(m=>m.id===egg.fatherMon)||{rarity:"UNCOMMON",hp:40,atk:15,name:"아빠"};
    const bmB=MONS.find(m=>m.id===egg.motherMon)||{rarity:"UNCOMMON",hp:40,atk:15,name:"엄마"};
    const gA=GRADE_ORDER.indexOf(bmA.rarity);
    const gB=GRADE_ORDER.indexOf(bmB.rarity);
    // 알 등급 = 부모 중 높은 등급에서 1단계(70%) 또는 2단계(30%) 아래
    // 단, 내려갈 등급이 없으면 같은 등급 or 1단계 아래
    const highGradeIdx=Math.max(gA,gB);
    const drop=Math.random()<0.70?1:2; // 70%=1단계 아래, 30%=2단계 아래
    let targetIdx=highGradeIdx-drop;
    if(targetIdx<0)targetIdx=Math.max(0,highGradeIdx-1); // 최소 1단계라도 내리기
    if(targetIdx<0)targetIdx=0; // COMMON이 최저
    const targetGrade=GRADE_ORDER[targetIdx]||"COMMON";
    // 해당 등급 몬스터 중 랜덤 선택
    const candidates=MONS.filter(m=>m.rarity===targetGrade&&m.id!=="_god_orange"&&!m.id.startsWith("mutant_")&&!m.id.startsWith("boss_"));
    const baseMon=candidates.length>0
      ? candidates[Math.floor(Math.random()*candidates.length)]
      : MONS.find(m=>m.rarity==="COMMON");
    // 스탯 우성유전: 좋은 쪽 70%, 나쁜 쪽 30%
    const domHp=Math.max(bmA.hp,bmB.hp),recHp=Math.min(bmA.hp,bmB.hp);
    const domAtk=Math.max(bmA.atk,bmB.atk),recAtk=Math.min(bmA.atk,bmB.atk);
    const bonusHp=Math.max(0,Math.floor((domHp*0.7+recHp*0.3)-baseMon.hp));
    const bonusAtk=Math.max(0,Math.floor((domAtk*0.7+recAtk*0.3)-baseMon.atk));
    const baseType=MON_BASE_TYPE[baseMon.id]||null;
    const tBonus=baseType?TYPES[baseType]?.bonus||{}:{};
    const gender=Math.random()<0.5?"♂":"♀";
    const maxHp=Math.floor((baseMon.hp+bonusHp)*(1+(tBonus.hp||0)));
    const newMon={
      id:baseMon.id,lv:1,exp:0,
      maxHp,hp:maxHp,curHp:maxHp,
      alive:true,enhance:0,
      monType:baseType,atkBonus:(tBonus.atk||0),
      gender,
      breedBonus:{atk:bonusAtk,hp:bonusHp}, // 교배 보너스 (스탯뽑기)
      fromBreed:true,
    };
    setMy(s=>{
      const nc=[...(s.collection||[]),newMon];
      return addTamerExp({...s,collection:nc,breedEgg:null},60);
    });
    toast(`🥚 ${gender} ${baseMon.name} [${targetGrade}] 탄생! (부모최고:${GRADE_ORDER[highGradeIdx]}에서 ${drop}단계↓)`,"var(--purple)");
    setEgg(null);setParentMale(null);setParentFemale(null);setBreedTab("select");
  };

  const startBreed=()=>{
    if(parentMale===null||parentFemale===null){toast("♂수컷과 ♀암컷을 선택하세요!","var(--red)");return;}
    const mC=males[parentMale]?.c;
    const fC=females[parentFemale]?.c;
    if(!mC||!fC)return;
    if((mC.lv||1)<3||(fC.lv||1)<3){toast("Lv.3 이상 필요!","var(--red)");return;}
    if(egg){toast("이미 알이 있어요!","var(--red)");return;}
    const bmA=MONS.find(m=>m.id===(mC.baseId||mC.id))||{rarity:"UNCOMMON"};
    const bmB=MONS.find(m=>m.id===(fC.baseId||fC.id))||{rarity:"UNCOMMON"};
    const gA=GRADE_ORDER.indexOf(bmA.rarity),gB=GRADE_ORDER.indexOf(bmB.rarity);
    const need=Math.min(20,Math.max(4,gA+gB+2));
    const newEgg={fatherMon:mC.baseId||mC.id,motherMon:fC.baseId||fC.id,hatch:0,need,
      fatherName:bmA.name,motherName:bmB.name,fatherEmoji:bmA.emoji||"🧬",motherEmoji:bmB.emoji||"🧬"};
    setEgg(newEgg);
    setMy(s=>({...s,breedEgg:newEgg}));
    setBreedTab("nurse");
    toast(`🥚 교배 시작! 먹이 ${need}개로 부화`,"var(--purple)");
  };

  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:6}}>🥚 교배/육아</div>
    <div style={{fontSize:9,color:"var(--tx3)",marginBottom:6,padding:"4px 7px",background:"rgba(139,92,246,0.05)",borderRadius:6}}>
      UNCOMMON↑ · Lv3↑ · 암수한쌍 · 우성유전(높은스탯70%) · 등급결정식
    </div>
    <div style={{display:"flex",gap:4,marginBottom:8}}>
      {[["select","👫선택"],["nurse","🥚육아"]].map(([k,l])=>(
        <button key={k} onClick={()=>setBreedTab(k)}
          style={{flex:1,padding:"5px 0",borderRadius:8,border:`1.5px solid ${breedTab===k?acHex:"rgba(0,0,0,0.08)"}`,
            background:breedTab===k?`${acHex}12`:"white",cursor:"pointer",fontFamily:"inherit",
            fontSize:9,fontWeight:breedTab===k?800:500,color:breedTab===k?acHex:"var(--tx2)"}}>
          {l}{k==="nurse"&&egg?` (${egg.hatch}/${egg.need})`:""}
        </button>
      ))}
    </div>

    {breedTab==="select"&&<div>
      <div style={{fontSize:11,fontWeight:700,color:"#3b82f6",marginBottom:5}}>♂ 수컷 선택</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:10}}>
        {males.map(({c},i)=>{
          const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{emoji:"❓",rarity:"COMMON"};
          const enh=c.enhance||0;
          return <button key={i} onClick={()=>setParentMale(parentMale===i?null:i)}
            style={{padding:"8px 4px",borderRadius:10,border:`2px solid ${parentMale===i?"#3b82f6":"rgba(0,0,0,0.08)"}`,
              background:parentMale===i?"rgba(59,130,246,0.1)":"white",cursor:"pointer",fontFamily:"inherit",textAlign:"center",
              boxShadow:parentMale===i?"0 2px 8px rgba(59,130,246,0.3)":"0 1px 4px rgba(0,0,0,0.05)"}}>
            <div style={{fontSize:20,marginBottom:2}}>{bm.emoji}</div>
            <div style={{fontSize:8,fontWeight:700,color:"var(--tx1)",marginBottom:1,
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{bm.name}</div>
            <div style={{fontSize:8,color:"var(--tx3)"}}>Lv{c.lv}{enh>0&&<span style={{color:"var(--purple)",fontWeight:800}}> +{enh}</span>}</div>
            <div style={{fontSize:8,fontWeight:700,color:RCOL[bm.rarity]||"#888"}}>{bm.rarity?.slice(0,4)}</div>
          </button>;
        })}
        {males.length===0&&<div style={{gridColumn:"1/-1",fontSize:10,color:"var(--tx3)",padding:"8px 0",textAlign:"center"}}>♂수컷 없음</div>}
      </div>

        {females.map(({c},i)=>{
          const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{emoji:"❓",rarity:"COMMON"};

              background:parentFemale===i?"rgba(236,72,153,0.1)":"white",cursor:"pointer",fontFamily:"inherit",textAlign:"center",
              boxShadow:parentFemale===i?"0 2px 8px rgba(236,72,153,0.3)":"0 1px 4px rgba(0,0,0,0.05)"}}>
            <div style={{fontSize:20,marginBottom:2}}>{bm.emoji}</div>
            <div style={{fontSize:8,fontWeight:700,color:"var(--tx1)",marginBottom:1,
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{bm.name}</div>
            <div style={{fontSize:8,color:"var(--tx3)"}}>Lv{c.lv}{enh>0&&<span style={{color:"var(--purple)",fontWeight:800}}> +{enh}</span>}</div>
            <div style={{fontSize:8,fontWeight:700,color:RCOL[bm.rarity]||"#888"}}>{bm.rarity?.slice(0,4)}</div>
          </button>;
        })}
        {females.length===0&&<div style={{gridColumn:"1/-1",fontSize:10,color:"var(--tx3)",padding:"8px 0",textAlign:"center"}}>
          ♀암컷 없음<br/><span style={{fontSize:9}}>포획 시 랜덤 성별 부여</span>
        </div>}
      </div>
      <button onClick={startBreed} disabled={parentMale===null||parentFemale===null||!!egg}
        style={{width:"100%",padding:"10px 0",borderRadius:11,border:"none",
          background:parentMale!==null&&parentFemale!==null&&!egg?"linear-gradient(135deg,var(--purple),#6d28d9)":"rgba(0,0,0,0.06)",
          color:parentMale!==null&&parentFemale!==null&&!egg?"white":"rgba(0,0,0,0.2)",
          fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
        {egg?"🥚 육아 중...":"🥚 교배 시작!"}
      </button>
    </div>}

    {breedTab==="nurse"&&<div style={{textAlign:"center"}}>
      {egg?<>
        <div style={{fontSize:40,marginBottom:6,animation:"float 1.5s ease-in-out infinite",display:"inline-block"}}>🥚</div>
        <div style={{fontSize:11,fontWeight:700,color:"var(--purple)",marginBottom:4}}>
          {egg.fatherEmoji}{egg.fatherName} ♂ × {egg.motherEmoji}{egg.motherName} ♀
        </div>
        <div style={{background:"rgba(0,0,0,0.07)",borderRadius:6,height:10,marginBottom:4,overflow:"hidden"}}>
          <div style={{width:`${egg.hatch/egg.need*100}%`,height:"100%",background:"linear-gradient(90deg,var(--purple),#a855f7)",borderRadius:6,transition:"width 0.3s"}}/>
        </div>
        <div style={{fontSize:10,color:"var(--tx3)",marginBottom:10}}>
          먹이 {egg.hatch}/{egg.need}
          {egg.hatch>=Math.floor(egg.need*0.5)&&<span style={{color:"var(--gold)",marginLeft:4}}>🍖고급먹이 필요</span>}
        </div>
        {egg.hatch>=egg.need
          ?<button onClick={hatchEgg} style={{width:"100%",padding:"9px 0",borderRadius:10,border:"none",
              background:"linear-gradient(135deg,var(--purple),#6d28d9)",color:"white",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
              🐣 부화!
            </button>
          :<button onClick={nurseEgg}
              disabled={(myS.foods?.food1||0)<=0&&(myS.foods?.food2||0)<=0}
              style={{width:"100%",padding:"9px 0",borderRadius:10,border:"none",
                background:(myS.foods?.food1||0)>0||(myS.foods?.food2||0)>0?"rgba(139,92,246,0.15)":"rgba(0,0,0,0.06)",
                color:(myS.foods?.food1||0)>0||(myS.foods?.food2||0)>0?"var(--purple)":"var(--tx3)",
                fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
              먹이주기 🌾{myS.foods?.food1||0} / 🍖{myS.foods?.food2||0}
            </button>}
        <button onClick={()=>{setEgg(null);setMy(s=>({...s,breedEgg:null}));}}
          style={{width:"100%",marginTop:6,padding:"6px 0",borderRadius:10,border:"1px solid rgba(239,68,68,0.3)",
            background:"transparent",color:"var(--red)",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
          ✕ 알 포기
        </button>
      </>:<div style={{padding:"20px 0",color:"var(--tx3)",textAlign:"center"}}>
        <div style={{fontSize:24,marginBottom:6}}>🥚</div>
        <div style={{fontSize:11}}>선택 탭에서 교배를 시작하세요</div>
      </div>}
    </div>}
  </div>;
}


// ── 진화석 연구소 (부스터/각인/리롤) ──
// ── 배틀 탭 (1:1 로컬 + 실시간 멀티 통합) ──
function SideBattle({myS,col,setMy,toast,aliveCols,acHex,oppS,myPick,setMyPick,oppPick,setOppPick,oppHas,battleLeft,startPvp,bs,blog,lr,attack,resetB}){
  const [battleMode,setBattleMode]=React.useState("realtime"); // "realtime" | "local"
  const MONS_ref=window.__MONS||[];
  const TYPES_ref=window.__TYPES||{};

  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:6}}>⚔️ 배틀</div>
    {/* 모드 선택 */}
    <div style={{display:"flex",gap:4,marginBottom:10}}>
      {[["realtime","🌐 실시간 멀티"],["local","🔧 로컬 대전"]].map(([k,l])=>(
        <button key={k} onClick={()=>setBattleMode(k)}
          style={{flex:1,padding:"6px 0",borderRadius:9,border:`1.5px solid ${battleMode===k?acHex:"rgba(0,0,0,0.08)"}`,
            background:battleMode===k?`${acHex}12`:"white",cursor:"pointer",fontFamily:"inherit",
            fontSize:10,fontWeight:battleMode===k?800:500,color:battleMode===k?acHex:"var(--tx2)"}}>
          {l}
        </button>
      ))}
    </div>

    {/* 내 몬스터 선택 (공통) */}
    <div style={{fontSize:10,fontWeight:700,color:acHex,marginBottom:5}}>출전 몬스터</div>
    {aliveCols.length===0
      ?<div style={{color:"var(--tx3)",fontSize:11,marginBottom:8}}>살아있는 몬스터 없음</div>
      :<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
        {aliveCols.map(c=>{
          const ri=col.indexOf(c);
          const bm=(window.__MONS||[]).find(m=>m.id===(c.baseId||c.id))||c;
          return <div key={ri} onClick={()=>setMyPick(ri===myPick?null:ri)} style={{
            border:myPick===ri?`2px solid ${acHex}`:"1px solid rgba(0,0,0,0.08)",
            borderRadius:10,padding:"6px 8px",cursor:"pointer",textAlign:"center",
            minWidth:56,background:myPick===ri?`${acHex}15`:"white",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:18}}>{bm.emoji}</div>
            <div style={{fontSize:10,fontWeight:600}}>{bm.name}</div>
            <div style={{fontSize:9,color:"var(--tx3)"}}>Lv{c.lv}{c.gender&&<span style={{color:c.gender==="♂"?"#3b82f6":"#ec4899"}}> {c.gender}</span>}</div>
          </div>;
        })}
      </div>}

    {/* 실시간 멀티 */}
    {battleMode==="realtime"&&<div style={{borderTop:"1px solid rgba(0,0,0,0.06)",paddingTop:8}}>
      <div style={{fontSize:10,color:"var(--tx3)",marginBottom:6}}>온라인 유저에게 배틀 신청하세요</div>
      <div style={{fontSize:10,color:"var(--tx2)",marginBottom:4}}>
        오늘 <span style={{fontWeight:800,color:battleLeft>0?"var(--green)":"var(--red)"}}>{battleLeft}회</span> 남음
      </div>
      <div style={{fontSize:10,color:"var(--tx3)",marginBottom:4}}>
        ※ 실시간 대전은 대전 탭(메인)에서 진행하세요
      </div>
    </div>}

    {/* 로컬 대전 */}
    {battleMode==="local"&&<div style={{borderTop:"1px solid rgba(0,0,0,0.06)",paddingTop:8}}>
      {!bs?<>
        <div style={{fontSize:10,fontWeight:700,color:"var(--blue)",marginBottom:5}}>상대 몬스터 선택</div>
        {!oppHas?<div style={{fontSize:10,color:"var(--tx3)",marginBottom:8}}>상대 몬스터 없음</div>
          :<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
            {(oppS?.collection||[]).filter(c=>c.alive!==false).map(c=>{
              const ri=(oppS?.collection||[]).indexOf(c);
              const bm=(window.__MONS||[]).find(m=>m.id===c.id)||c;
              return <div key={ri} onClick={()=>setOppPick(ri)} style={{
                border:oppPick===ri?"2px solid var(--blue)":"1px solid rgba(0,0,0,0.08)",
                borderRadius:10,padding:"6px 8px",cursor:"pointer",textAlign:"center",
                minWidth:56,background:oppPick===ri?"rgba(59,130,246,0.1)":"white"}}>
                <div style={{fontSize:18}}>{bm.emoji}</div>
                <div style={{fontSize:10,fontWeight:600}}>{bm.name}</div>
                <div style={{fontSize:9,color:"var(--tx3)"}}>Lv{c.lv}</div>
              </div>;
            })}
          </div>}
        <button onClick={startPvp} disabled={myPick===null||oppPick===null||battleLeft<=0}
          style={{width:"100%",padding:"8px 0",borderRadius:10,border:"none",
            background:myPick!==null&&oppPick!==null&&battleLeft>0?"var(--blue)":"rgba(0,0,0,0.06)",
            color:myPick!==null&&oppPick!==null&&battleLeft>0?"white":"rgba(0,0,0,0.2)",
            fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
          ⚔ 배틀 시작!
        </button>
        {battleLeft<=0&&<div style={{fontSize:10,color:"var(--red)",textAlign:"center",marginTop:4}}>배틀권⚔️으로 추가 가능!</div>}
      </>
      :<BV bs={bs} log={blog} lr={lr} ac={acHex} attack={attack} resetB={resetB}/>}
    </div>}
  </div>;
}

// ── 연구소 (진화석 연구 + 진화 통합) ──
function SideLab({myS,col,setMy,toast,acHex,aliveCols}){
  const [labTab,setLabTab]=React.useState("evo");
  const [targetIdx,setTargetIdx]=React.useState(null);

  // 진화석 연구 - 부스터
  const useBooster=(stoneId,expAmt)=>{
    if(targetIdx===null){toast("몬스터를 선택하세요!","var(--red)");return;}
    if((myS.stones?.[stoneId]||0)<=0){toast("진화석이 없습니다!","var(--red)");return;}
    setMy(s=>{
      let ns={...s,stones:{...s.stones,[stoneId]:Math.max(0,(s.stones[stoneId]||1)-1)}};
      const nc=(ns.collection||[]).map((c,i)=>{
        if(i!==targetIdx)return c;
        const newExp=(c.exp||0)+expAmt;
        const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{hp:30};
        const expNeeded=c.lv*30;
        if(newExp>=expNeeded&&c.lv<50){
          toast(`🎉 Lv업! ${c.name||bm.name} Lv${c.lv}→Lv${c.lv+1}`,"var(--gold)");
          return{...c,lv:c.lv+1,exp:newExp-expNeeded,maxHp:bm.hp+(c.lv)*5,curHp:bm.hp+(c.lv)*5};
        }
        return{...c,exp:newExp};
      });
      return addTamerExp({...ns,collection:nc},15);
    });
    toast(`✨ EXP +${expAmt}!`,"var(--purple)");
  };

  // 각인: 진화석 → 속성 부여
  const useImprint=(stoneId,type)=>{
    if(targetIdx===null){toast("몬스터를 선택하세요!","var(--red)");return;}
    if((myS.stones?.[stoneId]||0)<2){toast("진화석 2개 필요!","var(--red)");return;}
    setMy(s=>{
      const tBonus=TYPES[type]?.bonus||{};
      const ns={...s,stones:{...s.stones,[stoneId]:Math.max(0,(s.stones[stoneId]||2)-2)}};
      const nc=(ns.collection||[]).map((c,i)=>i===targetIdx?{...c,monType:type,atkBonus:tBonus.atk||0}:c);
      return{...ns,collection:nc};
    });
    toast(`💎 ${TYPES[type]?.name||type} 속성 각인!`,"var(--cyan)");
  };

  // 리롤: 희귀진화석 → 속성 랜덤 변환
  const useReroll=()=>{
    if(targetIdx===null){toast("몬스터를 선택하세요!","var(--red)");return;}
    if((myS.stones?.stone2||0)<=0){toast("희귀진화석 필요!","var(--red)");return;}
    const types=Object.keys(TYPES);
    const rndType=types[Math.floor(Math.random()*types.length)];
    const tBonus=TYPES[rndType]?.bonus||{};
    setMy(s=>{
      const ns={...s,stones:{...s.stones,stone2:Math.max(0,(s.stones.stone2||1)-1)}};
      const nc=(ns.collection||[]).map((c,i)=>i===targetIdx?{...c,monType:rndType,atkBonus:tBonus.atk||0}:c);
      return{...ns,collection:nc};
    });
    toast(`🌈 속성 랜덤 변환: ${TYPES[rndType]?.emoji||""}${TYPES[rndType]?.name||rndType}`,"var(--gold)");
  };

  const BOOSTERS=[
    {id:"stone1",name:"기본 진화석",emoji:"💠",exp:50},
    {id:"stone2",name:"고급 진화석",emoji:"🔮",exp:150},
    {id:"stone2",name:"희귀 진화석",emoji:"⭐",exp:400},
  ];

  const IMPRINT_STONES=[
    {id:"stone1",name:"기본",emoji:"💠",types:["fire","water","grass"]},
    {id:"stone2",name:"고급",emoji:"🔮",types:["lightning","rock","ghost","ice"]},
  ];

  // 진화 탭 - 조건 충족 후 연구소에서 진화
  const renderEvo=()=>{
    // 등급별 기본 진화석 소모량
    const EVO_COST={COMMON:1,UNCOMMON:2,RARE:3,UNIQUE:5,EPIC:12};
    // 특수진화 추가 소모 (대성공 가능)
    const EVO_EXTRA_COST={COMMON:1,UNCOMMON:2,RARE:3,UNIQUE:4,EPIC:8};

    const doEvolve=(c,i,isEnhanced)=>{
      const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{rarity:"COMMON"};
      const chain=EVO_CHAIN[c.baseId||c.id];
      if(!chain)return;
      const condOk=checkEvoConds(chain,c,myS);
      if(!condOk){toast("진화 조건 미충족!","var(--red)");return;}
      const baseCost=EVO_COST[bm.rarity]||1;
      const extraCost=EVO_EXTRA_COST[bm.rarity]||1;
      const totalCost=isEnhanced?baseCost+extraCost:baseCost;
      const have=myS.stones?.[chain.stone]||0;
      if(have<totalCost){toast(`진화석 ${totalCost}개 필요! (보유:${have})`,"var(--red)");return;}

      // 특수진화: [대성공률, 성공률] 기반, 나머지는 실패(진화석만 소모)
      // 진화: 무조건 100% 성공
      let evoResult="success";
      if(isEnhanced){
        const rates=EVO_RATES[bm.rarity]||EVO_RATES["COMMON"];
        const r=Math.random();
        if(r<rates[0]) evoResult="great";           // 대성공
        else if(r<rates[0]+rates[1]) evoResult="success"; // 성공
        else evoResult="fail";                       // 실패 (진화석만 소모)
      }

      if(evoResult==="fail"){
        // 실패: 진화석만 소모, 소환수 유지
        setMy(s=>({...s,stones:{...s.stones,[chain.stone]:Math.max(0,(s.stones[chain.stone]||0)-totalCost)}}));
        toast(`💔 특수진화 실패... 진화석 ${totalCost}개 소모`,"var(--orange)");
        return;
      }

      const toId=evoResult==="great"&&chain.altTo?chain.altTo:chain.to;
      const toMon=MONS.find(m=>m.id===toId);
      if(!toMon){toast("진화체 없음!","var(--red)");return;}
      const greatBonus=evoResult==="great"?1.1:1;

      setMy(s=>{
        const ns={...s,stones:{...s.stones,[chain.stone]:Math.max(0,(s.stones[chain.stone]||0)-totalCost)}};
        const nc=(ns.collection||[]).map((cc,ci)=>{
          if(ci!==i)return cc;
          return{...cc,id:toId,baseId:toId,name:toMon.name,emoji:toMon.emoji,
            lv:1,exp:0,
            maxHp:Math.floor(toMon.hp*greatBonus),hp:Math.floor(toMon.hp*greatBonus),curHp:Math.floor(toMon.hp*greatBonus),
            feedCount:0,huntWins:0,
          };
        });
        const newDex=(ns.dexSeen||[]).includes(toId)?ns.dexSeen:[...(ns.dexSeen||[]),toId];
        return addTamerExp({...ns,collection:nc,dexSeen:newDex,totalEvos:(ns.totalEvos||0)+1},evoResult==="great"?60:30);
      });

      if(evoResult==="great"){
        toast(`🌟 대성공!! ${toMon.name}으로 진화!`,"var(--gold)");
      }else{
        toast(`✨ 진화 성공! → ${toMon.name}`,"var(--purple)");
      }
    };

    const evolveList=aliveCols.filter((c)=>{
      const baseId=c.baseId||c.id;
      return EVO_CHAIN[baseId]&&c.rarity!=="LEGEND";
    });

    return <div>
      <div style={{fontSize:11,color:"var(--tx3)",marginBottom:10,padding:"7px 9px",
        background:"rgba(139,92,246,0.05)",borderRadius:8,border:"1px solid rgba(139,92,246,0.12)"}}>
        🔬 진화 조건 충족 후 진화석 소모. 특수진화는 추가 진화석으로 <b>대성공</b> 가능!
      </div>
      {evolveList.length===0&&<div style={{color:"var(--tx3)",fontSize:12,textAlign:"center",padding:"16px 0"}}>
        진화 가능한 몬스터가 없습니다
      </div>}
      {evolveList.map((c,i)=>{
        const origIdx=aliveCols.indexOf(c);
        const baseId=c.baseId||c.id;
        const bm=MONS.find(m=>m.id===baseId)||{rarity:"COMMON",emoji:"❓",name:"??"};
        const chain=EVO_CHAIN[baseId];
        const condOk=checkEvoConds(chain,c,myS);
        const st=EVO_STONES.find(s=>s.id===chain.stone);
        const have=myS.stones?.[chain.stone]||0;
        const baseCost=EVO_COST[bm.rarity]||1;
        const extraCost=EVO_EXTRA_COST[bm.rarity]||1;
        const canBasic=condOk&&have>=baseCost;
        const canEnhanced=condOk&&have>=baseCost+extraCost;
        const rates=EVO_RATES[bm.rarity]||EVO_RATES["COMMON"];
        const toMon=MONS.find(m=>m.id===chain.to);
        const altMon=chain.altTo?MONS.find(m=>m.id===chain.altTo):null;

        return <div key={origIdx} style={{borderRadius:12,padding:"12px",marginBottom:10,
          border:`1.5px solid ${condOk?"rgba(139,92,246,0.25)":"rgba(0,0,0,0.08)"}`,
          background:condOk?"rgba(139,92,246,0.03)":"white",
          boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
          {/* 소환수 헤더 */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <span style={{fontSize:24}}>{bm.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:800,color:"var(--tx1)"}}>{c.name||bm.name}</div>
              <div style={{fontSize:10,color:"var(--tx3)"}}>
                Lv{c.lv} · +{c.enhance||0}강 · <span style={{color:RCOL[bm.rarity]||"#888"}}>{bm.rarity}</span>
              </div>
            </div>
            <div style={{textAlign:"right",fontSize:10}}>
              <div style={{color:condOk?"var(--purple)":"var(--red)",fontWeight:700}}>
                {condOk?"✅ 조건 충족":"🔒 조건 미충족"}
              </div>
            </div>
          </div>

          {/* 진화 조건 */}
          <div style={{fontSize:10,color:"var(--tx3)",marginBottom:8,padding:"5px 8px",
            background:"rgba(0,0,0,0.03)",borderRadius:7}}>
            <span style={{fontWeight:700,color:"var(--tx2)"}}>조건: </span>
            {chain.conds&&chain.conds.map((cond,ci)=>{
              let cur=0,need=cond.val,ok2=false;
              if(cond.type==="lv"){cur=c.lv||1;ok2=cur>=need;}
              else if(cond.type==="enhance"){cur=c.enhance||0;ok2=cur>=need;}
              else if(cond.type==="hunt"){cur=c.huntWins||0;ok2=cur>=need;}
              else if(cond.type==="feed"){cur=c.feedCount||0;ok2=cur>=need;}
              else if(cond.type==="dungeon"){cur=myS.totalDungeons||0;ok2=cur>=need;}
              else if(cond.type==="pvp"){cur=myS.pvpWins||0;ok2=cur>=need;}
              else if(cond.type==="boss"){cur=Object.values(myS.bossKills||{}).reduce((a,b)=>a+b,0);ok2=cur>=need;}
              else if(cond.type==="tamerLv"){cur=myS.tamerLv||1;ok2=cur>=need;}
              const label={lv:"Lv",enhance:"+강화",hunt:"사냥승",feed:"먹이횟수",dungeon:"던전",pvp:"배틀승",boss:"보스토벌",tamerLv:"테이머Lv"}[cond.type]||cond.type;
              return <span key={ci} style={{marginRight:5,color:ok2?"var(--green)":"var(--red)",fontWeight:600}}>
                {ok2?"✓":"✗"}{label} {cur}/{need}
              </span>;
            })}
          </div>

          {/* 진화 결과 미리보기 */}
          <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
            <span style={{fontSize:20}}>{bm.emoji}</span>
            <span style={{fontSize:12,color:"var(--tx3)"}}>→</span>
            <div>
              {bm.rarity==="EPIC"
                ?<div style={{fontSize:13,fontWeight:900,color:"#bf360c"}}>
                  🌈 {toMon?.name||chain.to} <span style={{fontSize:9,background:"rgba(191,54,12,0.12)",padding:"2px 6px",borderRadius:6}}>LEGEND</span>
                </div>
                :<>
                  <div style={{fontSize:12,fontWeight:700,color:"var(--purple)"}}>{toMon?.name||chain.to}</div>
                  {altMon&&<div style={{fontSize:10,color:"var(--gold)"}}>⭐비밀진화: {altMon.name}</div>}
                </>}
            </div>
          </div>

          {/* 진화석 현황 */}
          <div style={{fontSize:11,color:"var(--tx3)",marginBottom:8}}>
            {chain.stone==="legend_proof"
              ? <span>🏆 진화증표 보유: {myS.consumables?.legend_proof||0}개</span>
              : <span>{st?.emoji||"💠"} 보유: {have}개</span>}
          </div>

          {/* 진화 버튼 - 에픽은 레전드 진화 버튼 하나만 / 나머지는 진화+비밀진화 */}
          {(()=>{
            const isEpic=bm.rarity==="EPIC";
            if(isEpic){
              // 에픽: 진화증표로 레전드 진화 버튼 하나만
              const haveProof=(myS.consumables?.legend_proof||0)>0;
              const canLegend=condOk&&haveProof;
              return <button onClick={()=>doEvolve(c,origIdx,false)}
                disabled={!canLegend}
                style={{width:"100%",padding:"12px 0",borderRadius:10,border:"none",fontFamily:"inherit",
                  background:canLegend?"linear-gradient(135deg,#bf360c,#e53935)":"rgba(0,0,0,0.06)",
                  color:canLegend?"white":"rgba(0,0,0,0.25)",
                  fontSize:13,fontWeight:900,cursor:canLegend?"pointer":"default",
                  boxShadow:canLegend?"0 4px 16px rgba(191,54,12,0.4)":"none"}}>
                🏆 레전드 진화<br/>
                <span style={{fontSize:9,opacity:0.85}}>진화증표×1 소모 · 100% 성공 확정</span>
              </button>;
            }else{
              // COMMON~UNIQUE: 진화(to) + 비밀진화(altTo)
              return <div style={{display:"flex",gap:6}}>
                <button onClick={()=>doEvolve(c,origIdx,false)}
                  disabled={!canBasic}
                  style={{flex:1,padding:"9px 0",borderRadius:10,border:"none",
                    background:canBasic?"linear-gradient(135deg,#8b5cf6,#6d28d9)":"rgba(0,0,0,0.06)",
                    color:canBasic?"white":"rgba(0,0,0,0.2)",
                    fontSize:11,fontWeight:800,cursor:canBasic?"pointer":"default",fontFamily:"inherit"}}>
                  ✨ 진화<br/>
                  <span style={{fontSize:9,opacity:0.85}}>{st?.emoji}×{baseCost} · 성공{Math.round(rates[1]*100)}% 실패{Math.round((1-rates[0]-rates[1])*100)}%</span>
                </button>
                {chain.altTo&&<button onClick={()=>doEvolve(c,origIdx,true)}
                  disabled={!canEnhanced}
                  style={{flex:1,padding:"9px 0",borderRadius:10,border:"none",
                    background:canEnhanced?"linear-gradient(135deg,var(--gold),#d97706)":"rgba(0,0,0,0.06)",
                    color:canEnhanced?"#000":"rgba(0,0,0,0.2)",
                    fontSize:11,fontWeight:800,cursor:canEnhanced?"pointer":"default",fontFamily:"inherit"}}>
                  ⭐ 비밀진화<br/>
                  <span style={{fontSize:9,opacity:0.85}}>{st?.emoji}×{baseCost+extraCost} · {Math.round(rates[0]*100)}% {altMon?.name||"?"}</span>
                </button>}
              </div>;
            }
          })()}
        </div>;
      })}
    </div>;
  };

  // 연구 탭 - 현재 속성 확인 (각인은 사냥터/던전 드롭으로만)
  const renderResearch=()=>{
    return <div>
      <div style={{fontSize:11,color:"var(--tx3)",marginBottom:10,padding:"7px 9px",
        background:"rgba(245,158,11,0.05)",borderRadius:8,border:"1px solid rgba(245,158,11,0.15)"}}>
        🌈 이중속성은 사냥터·던전에서 낮은 확률로 드롭되는 <b>이중속성 각인권</b>으로만 부여됩니다
      </div>
      <div style={{fontSize:12,fontWeight:700,color:"var(--tx2)",marginBottom:8}}>보유 몬스터 속성 현황</div>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {aliveCols.map((c2,i)=>{
          const bm2=MONS.find(m=>m.id===(c2.baseId||c2.id))||{emoji:"❓",name:"??"};
          const t1=c2.monType?TYPES[c2.monType]:null;
          const t2=c2.monType2?TYPES[c2.monType2]:null;
          return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",
            borderRadius:9,background:"white",border:"1px solid rgba(0,0,0,0.07)"}}>
            <span style={{fontSize:18}}>{bm2.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700}}>{c2.name||bm2.name}</div>
              <div style={{display:"flex",gap:4,marginTop:2}}>
                {t1?<span style={{fontSize:10,padding:"1px 6px",borderRadius:6,
                  background:`${t1.color}15`,color:t1.color,fontWeight:700,border:`1px solid ${t1.color}30`}}>
                  {t1.emoji} {t1.name}
                </span>:<span style={{fontSize:10,color:"var(--tx3)"}}>속성 없음</span>}
                {t2&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:6,
                  background:`${t2.color}15`,color:t2.color,fontWeight:700,border:`1px solid ${t2.color}30`}}>
                  {t2.emoji} {t2.name} <span style={{fontSize:8,opacity:0.7}}>이중</span>
                </span>}
              </div>
            </div>
          </div>;
        })}
        {aliveCols.length===0&&<div style={{textAlign:"center",padding:"16px",color:"var(--tx3)",fontSize:11}}>몬스터 없음</div>}
      </div>
      <div style={{marginTop:12,padding:"8px 10px",borderRadius:9,background:"rgba(139,92,246,0.05)",
        border:"1px solid rgba(139,92,246,0.12)",fontSize:10,color:"var(--tx3)",lineHeight:1.7}}>
        💡 이중속성 각인권: 사냥터 보스급 몬스터 · 고급/전설 던전에서 낮은 확률 드롭<br/>
        💡 이중속성 보유 시 두 속성 모두 상성 효과 적용
      </div>
    </div>;
  };

  return <div>
    <div style={{fontSize:14,fontWeight:800,color:"var(--tx1)",marginBottom:8}}>🔬 연구소</div>
    <div style={{fontSize:11,color:"var(--tx3)",marginBottom:10,padding:"7px 10px",
      background:"rgba(139,92,246,0.05)",borderRadius:8,border:"1px solid rgba(139,92,246,0.12)"}}>
      진화석을 활용해 몬스터를 강화하고 진화시키는 연구소입니다
    </div>
    <div style={{display:"flex",gap:5,marginBottom:12}}>
      {[["evo","⚗️ 진화"],["awaken","💠 각성"],["research","🌈 속성"]].map(([k,l])=>(
        <button key={k} onClick={()=>setLabTab(k)}
          style={{flex:1,padding:"8px 0",borderRadius:10,border:`1.5px solid ${labTab===k?acHex:"rgba(0,0,0,0.08)"}`,
            background:labTab===k?`${acHex}12`:"white",cursor:"pointer",fontFamily:"inherit",
            fontSize:11,fontWeight:labTab===k?800:500,color:labTab===k?acHex:"var(--tx2)"}}>
          {l}
        </button>
      ))}
    </div>
    {labTab==="evo"&&renderEvo()}
    {labTab==="awaken"&&<div>
      <div style={{fontSize:11,color:"var(--tx3)",marginBottom:10,padding:"7px 9px",
        background:"rgba(6,182,212,0.05)",borderRadius:8,border:"1px solid rgba(6,182,212,0.15)"}}>
        💠 <b>각성</b>: 2번째 속성을 랜덤 부여 · 각성석 1개 소모 · <b>최대 2회</b><br/>
        ⚠️ 합성/진화 시 이중속성은 <b>리셋</b>됩니다
      </div>
      <div style={{fontSize:12,fontWeight:700,color:"var(--tx2)",marginBottom:6}}>몬스터 선택</div>
      {(()=>{
        // 속성이 있는 모든 몬스터가 각성 대상
        const awakenableCols=aliveCols.filter(c=>c.monType);
        if(awakenableCols.length===0)return <div style={{textAlign:"center",padding:"16px 0",color:"var(--tx3)",fontSize:11}}>
          속성이 있는 몬스터가 없습니다.<br/>속성 진화석으로 속성을 먼저 부여하세요!
        </div>;
        return <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
          {awakenableCols.map((c2)=>{
            const i=aliveCols.indexOf(c2);
            const bm2=MONS.find(m=>m.id===(c2.baseId||c2.id))||{emoji:"❓"};
            const awLv=c2.awakenLv||0;
            return <button key={i} onClick={()=>setTargetIdx(targetIdx===i?null:i)}
              style={{padding:"5px 4px",borderRadius:8,border:`1.5px solid ${targetIdx===i?"#06b6d4":"rgba(0,0,0,0.08)"}`,
                background:targetIdx===i?"rgba(6,182,212,0.1)":"white",cursor:"pointer",fontFamily:"inherit",textAlign:"center",
                position:"relative",minWidth:50}}>
              <div style={{fontSize:16}}>{bm2.emoji}</div>
              <div style={{fontSize:7,color:"var(--tx3)"}}>Lv{c2.lv}</div>
              {awLv>0&&<div style={{position:"absolute",top:-2,right:-2,fontSize:9,background:"#06b6d4",
                color:"white",borderRadius:"50%",width:14,height:14,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>{awLv}</div>}
              {c2.monType2&&<div style={{position:"absolute",bottom:-2,right:-2,fontSize:10}}>{TYPES[c2.monType2]?.emoji||""}</div>}
            </button>;
          })}
        </div>;
      })()}
      {targetIdx!==null&&(()=>{
        const c=aliveCols[targetIdx];
        if(!c)return null;
        const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{emoji:"❓",name:"??"};
        const awakenLv=c.awakenLv||0;
        const maxAwakenLv=2;
        const have=myS.consumables?.awaken_stone||0;
        const canAwaken=have>=1&&awakenLv<maxAwakenLv;
        const curType=c.monType?TYPES[c.monType]:null;
        const curType2=c.monType2?TYPES[c.monType2]:null;
        return <div style={{padding:"10px 12px",borderRadius:12,
          background:"rgba(6,182,212,0.05)",border:"1.5px solid rgba(6,182,212,0.25)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:26}}>{bm.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:800}}>{bm.name}</div>
              <div style={{fontSize:10,color:"var(--tx3)",marginTop:2}}>각성 {awakenLv}/{maxAwakenLv}회</div>
            </div>
            <div style={{fontSize:10,color:have>=1?"#06b6d4":"var(--red)",fontWeight:700,textAlign:"right"}}>
              💠×1 필요<br/>(보유:{have})
            </div>
          </div>
          {/* 현재 속성 표시 */}
          <div style={{background:"white",borderRadius:10,padding:"8px 10px",marginBottom:8,
            border:"1px solid rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:10,color:"var(--tx3)",marginBottom:5,fontWeight:700}}>현재 속성</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {curType&&<span style={{fontSize:13,fontWeight:700,color:curType.color,padding:"4px 10px",
                background:curType.color+"15",borderRadius:8,border:`1.5px solid ${curType.color}40`}}>
                {curType.emoji} {curType.name}
              </span>}
              <span style={{fontSize:14,color:"var(--tx3)"}}>+</span>
              {curType2
                ?<span style={{fontSize:13,fontWeight:700,color:curType2.color,padding:"4px 10px",
                  background:curType2.color+"15",borderRadius:8,border:`1.5px solid ${curType2.color}40`}}>
                  {curType2.emoji} {curType2.name} <span style={{fontSize:9,opacity:0.7}}>(각성)</span>
                </span>
                :<span style={{fontSize:12,color:"var(--tx3)",padding:"4px 10px",
                  background:"rgba(0,0,0,0.04)",borderRadius:8,border:"1.5px dashed rgba(0,0,0,0.1)"}}>
                  ??? (각성 시 랜덤 부여)
                </span>}
            </div>
          </div>
          {/* 각성 단계 표시 */}
          <div style={{display:"flex",gap:3,marginBottom:8}}>
            {[...Array(maxAwakenLv)].map((_,i)=>(
              <div key={i} style={{flex:1,height:8,borderRadius:4,
                background:i<awakenLv?"#06b6d4":"rgba(0,0,0,0.08)"}}/>
            ))}
          </div>
          {/* 안내 텍스트 */}
          <div style={{fontSize:10,color:"var(--tx3)",marginBottom:8,padding:"6px 9px",
            background:"rgba(0,0,0,0.03)",borderRadius:7,lineHeight:1.5}}>
            {awakenLv===0&&<>🔮 첫 각성: 2번째 속성 <b>랜덤 부여</b> (현재 속성 제외)</>}
            {awakenLv===1&&<>🎲 재각성: 2번째 속성 <b>다시 랜덤화</b> (맘에 안들 때 리롤용)</>}
            {awakenLv>=maxAwakenLv&&<>✅ <b>최대 각성 완료!</b> 더 이상 각성 불가</>}
          </div>
          <button onClick={()=>{
            if(!canAwaken){toast(awakenLv>=maxAwakenLv?"최대 각성!":"각성석 1개 필요!","var(--red)");return;}
            setMy(s=>{
              // 현재 속성 제외한 나머지 중 랜덤 선택
              const availableTypes=Object.keys(TYPES).filter(t=>t!==c.monType);
              const newType2=availableTypes[Math.floor(Math.random()*availableTypes.length)];
              const nc=(s.collection||[]).map((cc,ci)=>{
                if(cc!==aliveCols[targetIdx])return cc;
                return{...cc,monType2:newType2,awakenLv:(cc.awakenLv||0)+1};
              });
              return addTamerExp({...s,collection:nc,consumables:{...s.consumables,awaken_stone:Math.max(0,(s.consumables?.awaken_stone||0)-1)}},25);
            });
            // 결과 토스트는 딜레이 후 표시
            setTimeout(()=>{
              const updated=(myS.collection||[]).find(cc=>cc===aliveCols[targetIdx]);
              if(updated&&updated.monType2){
                const t2=TYPES[updated.monType2];
                toast(`💠 ${bm.name} 각성 성공! ${t2.emoji}${t2.name} 추가`,"#06b6d4");
              }else{
                toast(`💠 ${bm.name} 각성 완료!`,"#06b6d4");
              }
            },100);
          }} disabled={!canAwaken}
            style={{width:"100%",padding:"10px 0",borderRadius:10,border:"none",
              background:canAwaken?"linear-gradient(135deg,#06b6d4,#0284c7)":"rgba(0,0,0,0.06)",
              color:canAwaken?"white":"rgba(0,0,0,0.2)",
              fontSize:13,fontWeight:800,cursor:canAwaken?"pointer":"default",fontFamily:"inherit"}}>
            {awakenLv>=maxAwakenLv?"✅ 최대 각성 완료!":
             !canAwaken?"💠 각성석 1개 필요":
             awakenLv===0?"💠 각성 시작 (2번째 속성 부여)":"🎲 재각성 (속성 다시 랜덤화)"}
          </button>
        </div>;
      })()}
      {targetIdx===null&&<div style={{textAlign:"center",padding:"20px 0",color:"var(--tx3)",fontSize:11}}>
        위에서 몬스터를 선택하세요
      </div>}
    </div>}
    {labTab==="research"&&renderResearch()}
  </div>;
}
