      {q:"🥚 교배",a:"UNCOMMON+ 몬스터 ♂♀ 한 쌍. 알 등급=부모 평균(올림/내림 50:50). 스탯 우성유전 70:30."},
      {q:"🏆 진화증표",a:"뮤턴트)XXX 방생 시 획득. 에픽→레전드 공식 진화에 사용 (갓슬레이어→오메가 등)."},
      {q:"⚔️ 레이드",a:"보스당 1방만 개설 가능. 클리어 후 30분 쿨타임. 장비 드롭률 4~5% (희귀)."},
    ],
    grade:[
      {q:"등급 순서",a:"COMMON → UNCOMMON → RARE → UNIQUE → EPIC → LEGEND (합성으로 성장)"},
      {q:"💠 뮤턴트",a:"EPIC+ 합성 시 3% 확률 등장. 이름 형식: 뮤턴트)갓슬레이어 등. 에픽 대비 +15% 스탯. 방생 시 🏆진화증표 획득."},
      {q:"🌈 레전드 루트 ①",a:"갓슬레이어→오메가 / 솔라리스→오로라 / 드래곤로드→원시신 (진화증표+조건 필요)"},
      {q:"🎲 레전드 루트 ②",a:"뮤턴트+에픽 합성 → 랜덤 레전드 확정 (보이드킹/어비설/메카조드)"},
      {q:"BOSS",a:"사냥터에서 조건 달성 시 등장. 포획 불가. 토벌 시 특수 아이템 드롭."},
      {q:"🍊 DIVINE",a:"이스터에그. 조건 4가지 동시 충족 + 0.3% 확률 출현. 매우 드묾."},
    ],
    evotree:null,
  };

  // 진화트리 데이터 구성 - 루트 몬스터 찾기
  const buildEvoTree=(rootId)=>{
    const chain=[];
    let cur=rootId;
    let visited=new Set();
    while(cur&&!visited.has(cur)){
      visited.add(cur);
      const mon=MONS.find(m=>m.id===cur);
      if(!mon)break;
      const evo=EVO_CHAIN[cur];
      chain.push({mon,evo});
      cur=evo?.to;
    }
    return chain;
  };

  // 루트(진화 시작점) 몬스터들 - EVO_CHAIN에 from으로 있는 것 중 아무것도 가리키지 않는 것
  const allToIds=new Set(Object.values(EVO_CHAIN).flatMap(c=>[c.to,c.altTo].filter(Boolean)));
  const rootMons=Object.keys(EVO_CHAIN)
    .filter(id=>!allToIds.has(id))
    .map(id=>MONS.find(m=>m.id===id))
    .filter(Boolean);

  const gradeRoots={};
  rootMons.forEach(m=>{
    if(!gradeRoots[m.rarity])gradeRoots[m.rarity]=[];
    gradeRoots[m.rarity].push(m);
  });

  const renderEvoTree=()=>(
    <div>
      <div style={{fontSize:11,color:"var(--tx3)",marginBottom:10,padding:"6px 9px",
        background:"rgba(0,0,0,0.03)",borderRadius:8}}>
        🌿 몬스터를 눌러 진화 경로를 확인하세요!
      </div>

      {/* 모달 - 전체 진화트리 */}
      {selectedChain&&(()=>{
        const chain=buildEvoTree(selectedChain);
        return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:600,
          display:"flex",alignItems:"center",justifyContent:"center",padding:12}}
          onClick={()=>setSelectedChain(null)}>
          <div style={{background:"white",borderRadius:20,padding:18,width:"100%",maxWidth:340,
            maxHeight:"88vh",overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,0.25)"}}
            onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:800}}>🔗 전체 진화 트리</div>
              <button onClick={()=>setSelectedChain(null)}
                style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"var(--tx3)"}}>✕</button>
            </div>
            {chain.map(({mon,evo},idx)=>{
              if(!mon)return null;
              const lineageInfo=LINEAGES[mon.lineage];
              return <div key={mon.id}>
                <div style={{borderRadius:12,padding:"11px 12px",
                  border:`2px solid ${mon.color||"#888"}40`,
                  background:`${mon.color||"#888"}06`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5}}>
                    <span style={{fontSize:30}}>{mon.emoji}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:900,color:mon.color||"var(--tx1)"}}>{mon.name}</div>
                      <div style={{display:"flex",gap:3,marginTop:2,flexWrap:"wrap"}}>
                        <span style={{fontSize:8,fontWeight:800,padding:"1px 5px",borderRadius:5,
                          background:`${RCOL[mon.rarity]||"#888"}18`,color:RCOL[mon.rarity]||"#888"}}>
                          {mon.rarity}
                        </span>
                        {lineageInfo&&<span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:5,
                          background:lineageInfo.color+"15",color:lineageInfo.color}}>
                          {lineageInfo.emoji}{lineageInfo.name}
                        </span>}
                      </div>
                    </div>
                    <div style={{textAlign:"right",fontSize:9,color:"var(--tx3)"}}>
                      <div>❤️{mon.hp} ⚔️{mon.atk}</div>
                      <div>💨{mon.spd}</div>
                    </div>
                  </div>
                  <div style={{fontSize:10,color:"var(--tx2)",lineHeight:1.5,marginBottom:evo?4:0}}>{mon.desc}</div>
                  {evo&&<div style={{fontSize:8,color:"var(--tx3)",padding:"4px 6px",
                    background:"rgba(0,0,0,0.04)",borderRadius:5}}>
                    📋 {evo.condDesc}
                    {evo.altTo&&<div style={{color:"var(--gold)",marginTop:1}}>
                      ⭐ 비밀진화: {MONS.find(x=>x.id===evo.altTo)?.name||evo.altTo}
                    </div>}
                  </div>}
                </div>
                {idx<chain.length-1&&<div style={{textAlign:"center",padding:"3px 0",color:"var(--purple)",fontSize:16}}>↓</div>}
              </div>;
            })}
            {chain.length===0&&<div style={{textAlign:"center",color:"var(--tx3)",padding:"20px 0"}}>진화 정보 없음</div>}
          </div>
        </div>;
      })()}

      {/* 등급별 루트 몬스터 목록 */}
      {["COMMON","UNCOMMON","RARE","UNIQUE","EPIC"].map(grade=>{
        const mons=gradeRoots[grade]||[];
        if(mons.length===0)return null;
        return <div key={grade} style={{marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:800,color:RCOL[grade]||"#888",marginBottom:5,
            padding:"3px 8px",background:`${RCOL[grade]||"#888"}12`,borderRadius:6,display:"inline-block"}}>
            {grade}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {mons.map(m=>{
              // 최종 진화 찾기
              let finalMon=m;
              let cur=m.id;
              let visited=new Set();
              while(EVO_CHAIN[cur]&&!visited.has(cur)){
                visited.add(cur);
                const nextId=EVO_CHAIN[cur].to;
                const next=MONS.find(x=>x.id===nextId);
                if(next){finalMon=next;cur=nextId;}
                else break;
              }
              const chainLen=visited.size+1;
              return <button key={m.id} onClick={()=>setSelectedChain(m.id)}
                style={{padding:"7px 8px",borderRadius:10,border:`1.5px solid ${m.color||"#888"}40`,
                  background:`${m.color||"#888"}08`,cursor:"pointer",fontFamily:"inherit",
                  textAlign:"center",minWidth:70,transition:"all 0.1s"}}
                onMouseOver={e=>e.currentTarget.style.transform="scale(1.05)"}
                onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
                <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"center"}}>
                  <span style={{fontSize:16}}>{m.emoji}</span>
                  <span style={{fontSize:9,color:"var(--tx3)"}}>→</span>
                  <span style={{fontSize:16}}>{finalMon.emoji}</span>
                </div>
                <div style={{fontSize:9,fontWeight:700,color:"var(--tx1)",marginTop:2,
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:80}}>
                  {m.name}
                </div>
                <div style={{fontSize:8,color:"var(--tx3)"}}>
                  {chainLen}단계 진화
                </div>
              </button>;
            })}
          </div>
        </div>;
      })}
    </div>
  );

  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:6}}>❓ 도움말</div>
    <div style={{display:"flex",gap:3,marginBottom:8,flexWrap:"wrap"}}>
      {[["basic","📖기본"],["system","⚙️시스템"],["grade","⭐등급"],["evotree","🔗진화트리"]].map(([k,l])=>(
        <button key={k} onClick={()=>setHelpTab(k)}
          style={{flex:1,padding:"5px 2px",borderRadius:8,border:`1.5px solid ${helpTab===k?acHex:"rgba(0,0,0,0.08)"}`,
            background:helpTab===k?`${acHex}15`:"white",cursor:"pointer",fontFamily:"inherit",
            fontSize:9,fontWeight:helpTab===k?800:500,color:helpTab===k?acHex:"var(--tx2)"}}>
          {l}
        </button>
      ))}
    </div>
    {helpTab==="evotree"?renderEvoTree():helps[helpTab].map((h,i)=>(
      <div key={i} style={{padding:"8px 10px",borderRadius:10,border:"1px solid rgba(139,92,246,0.1)",
        marginBottom:5,background:"rgba(139,92,246,0.02)"}}>
        <div style={{fontSize:10,fontWeight:800,color:acHex,marginBottom:3}}>{h.q}</div>
        <div style={{fontSize:9,color:"var(--tx2)",lineHeight:1.6}}>{h.a}</div>
      </div>
    ))}
  </div>;
}


function SideDex({myS,col,acHex,setMy}){
  const [dexF,setDexF]=React.useState("all");
  const [selectedMon,setSelectedMon]=React.useState(null);
  const seenCount=(myS.dexSeen||[]).length;
  const totalCount=MONS.filter(m=>m.rarity!=="DIVINE").length;
  const DEX_REWARDS=[
    {need:5, label:"5종",  reward:{enhance_stone:5},           emoji:"📗",id:"dex5"},
    {need:10,label:"10종", reward:{enhance_stone:10,food2:2},   emoji:"📘",id:"dex10"},
    {need:20,label:"20종", reward:{enhance_stone:20,stone1:1},  emoji:"📙",id:"dex20"},
    {need:30,label:"30종", reward:{enhance_stone:30,stone2:1,food3:2},emoji:"📕",id:"dex30"},
    {need:40,label:"40종", reward:{enhance_stone:50,food3:3},   emoji:"🏆",id:"dex40"},
    {need:totalCount,label:"완성!",reward:{enhance_stone:100,ball3:3},emoji:"👑",id:"dexAll"},
  ];
  const claimDexReward=(tier)=>{
    if(seenCount<tier.need)return;
    if((myS.dexRewardsClaimed||[]).includes(tier.id))return;
    if(!setMy)return;
    setMy(s=>{
      let ns={...s,dexRewardsClaimed:[...(s.dexRewardsClaimed||[]),tier.id]};
      Object.entries(tier.reward).forEach(([id,amt])=>{ns=addItem(ns,id,amt);});
      return ns;
    });
  };

  const gradeFilters=["all","COMMON","UNCOMMON","RARE","UNIQUE","EPIC","LEGEND","MUTANT"];

  // 도감 상세 모달
  const renderMonDetail=()=>{
    if(!selectedMon)return null;
    const m=selectedMon;
    const owned=col.find(c=>c.id===m.id||(c.baseId&&c.baseId===m.id));
    const seen=(myS.dexSeen||[]).includes(m.id)||owned;
    const lineageInfo=LINEAGES[m.lineage];

    // 전체 진화트리 구성 - 루트부터 끝까지
    const buildFullTree=(anyId)=>{
      // 루트 찾기 (이 몬스터를 포함하는 체인의 시작점)
      let rootId=anyId;
      const visited=new Set();
      while(true){
        const parent=Object.entries(EVO_CHAIN).find(([k,v])=>v.to===rootId||v.altTo===rootId);
        if(!parent||visited.has(parent[0]))break;
        visited.add(parent[0]);
        rootId=parent[0];
      }
      // 루트부터 순서대로 체인 구성
      const chain=[];
      let cur=rootId;
      const seen2=new Set();
      while(cur&&!seen2.has(cur)){
        seen2.add(cur);
        const mon=MONS.find(x=>x.id===cur);
        const evo=EVO_CHAIN[cur];
        chain.push({mon,evo,id:cur});
        cur=evo?.to;
      }
      return chain;
    };

    const fullTree=buildFullTree(m.id);

    return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:500,
      display:"flex",alignItems:"center",justifyContent:"center",padding:12}}
      onClick={()=>setSelectedMon(null)}>
      <div style={{background:"white",borderRadius:20,padding:18,width:"100%",maxWidth:340,
        maxHeight:"88vh",overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,0.25)"}}
        onClick={e=>e.stopPropagation()}>

        {/* 헤더 */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <span style={{fontSize:40,filter:seen?`drop-shadow(0 0 8px ${m.color}88)`:"grayscale(1)"}}>
            {seen?m.emoji:"❓"}
          </span>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:900,color:seen?m.color:"var(--tx3)"}}>
              {seen?m.name:"미발견"}
            </div>
            <div style={{display:"flex",gap:3,marginTop:3,flexWrap:"wrap"}}>
              <span style={{fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:6,
                background:`${RCOL[m.rarity]||"#888"}18`,color:RCOL[m.rarity]||"#888"}}>
                {m.rarity}
              </span>
              {lineageInfo&&<span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:6,
                background:lineageInfo.color+"15",color:lineageInfo.color}}>
                {lineageInfo.emoji}{lineageInfo.name}
              </span>}
            </div>
          </div>
          <button onClick={()=>setSelectedMon(null)}
            style={{fontSize:18,background:"none",border:"none",cursor:"pointer",color:"var(--tx3)",padding:"4px"}}>✕</button>
        </div>

        {seen&&<>
          {/* 스탯 */}
          <div style={{display:"flex",gap:5,marginBottom:10}}>
            {[["❤️","HP",m.hp],["⚔️","ATK",m.atk],["💨","SPD",m.spd]].map(([e,l,v])=>(
              <div key={l} style={{flex:1,textAlign:"center",padding:"6px 4px",borderRadius:9,
                background:"rgba(0,0,0,0.04)",border:"1px solid rgba(0,0,0,0.06)"}}>
                <div style={{fontSize:13}}>{e}</div>
                <div style={{fontSize:14,fontWeight:900,color:"var(--tx1)"}}>{v}</div>
                <div style={{fontSize:8,color:"var(--tx3)"}}>{l}</div>
              </div>
            ))}
          </div>
          {/* 설명 */}
          <div style={{fontSize:11,color:"var(--tx2)",marginBottom:12,padding:"7px 10px",
            background:"rgba(0,0,0,0.03)",borderRadius:8,lineHeight:1.5}}>
            {m.desc}
          </div>

          {/* 전체 진화트리 */}
          {fullTree.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:800,color:"var(--tx2)",marginBottom:8}}>🔗 전체 진화 트리</div>
            {fullTree.map(({mon,evo,id},idx)=>{
              if(!mon)return null;
              const isCurrent=id===m.id;
              const monOwned=col.find(c=>c.id===mon.id||(c.baseId&&c.baseId===mon.id));
              const monSeen=(myS.dexSeen||[]).includes(mon.id)||monOwned;
              const lInfo=LINEAGES[mon.lineage];
              return <div key={id}>
                <div style={{
                  borderRadius:12,padding:"10px 12px",
                  border:`2px solid ${isCurrent?(mon.color||"#888"):"rgba(0,0,0,0.08)"}`,
                  background:isCurrent?`${mon.color||"#888"}12`:"rgba(0,0,0,0.02)",
                  boxShadow:isCurrent?`0 2px 12px ${mon.color||"#888"}30`:"none",
                  opacity:monSeen?1:0.4,
                }}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:28}}>{monSeen?mon.emoji:"❓"}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:isCurrent?14:12,fontWeight:isCurrent?900:600,
                        color:isCurrent?(mon.color||"var(--tx1)"):"var(--tx1)"}}>
                        {monSeen?mon.name:"???"}
                        {isCurrent&&<span style={{fontSize:9,marginLeft:6,background:(mon.color||"#888")+"20",
                          color:mon.color||"#888",padding:"1px 5px",borderRadius:5,fontWeight:700}}>현재</span>}
                      </div>
                      <div style={{display:"flex",gap:3,marginTop:2,flexWrap:"wrap"}}>
                        <span style={{fontSize:8,padding:"1px 5px",borderRadius:5,
                          background:`${RCOL[mon.rarity]||"#888"}15`,color:RCOL[mon.rarity]||"#888",fontWeight:700}}>
                          {mon.rarity}
                        </span>
                        {lInfo&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:5,
                          background:lInfo.color+"12",color:lInfo.color,fontWeight:600}}>
                          {lInfo.emoji}{lInfo.name}
                        </span>}
                        {monOwned&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:5,
                          background:"rgba(16,185,129,0.12)",color:"var(--green)",fontWeight:700}}>
                          ✅ Lv.{monOwned.lv}
                        </span>}
                      </div>
                      {monSeen&&<div style={{fontSize:9,color:"var(--tx3)",marginTop:2}}>
                        ❤️{mon.hp} ⚔️{mon.atk} 💨{mon.spd}
                      </div>}
                    </div>
                  </div>
                  {/* 진화 조건 */}
                  {evo&&<div style={{fontSize:8,color:"var(--tx3)",marginTop:6,padding:"4px 6px",
                    background:"rgba(0,0,0,0.04)",borderRadius:6}}>
                    📋 {evo.condDesc}
                    {evo.altTo&&<div style={{marginTop:2,color:"var(--gold)"}}>
                      ⭐ 비밀진화: {MONS.find(x=>x.id===evo.altTo)?.name||evo.altTo}
                    </div>}
                  </div>}
                </div>
                {/* 화살표 */}
                {idx<fullTree.length-1&&<div style={{textAlign:"center",padding:"4px 0",
                  fontSize:16,color:"var(--tx3)"}}>↓</div>}
              </div>;
            })}
          </div>}

          {/* 보유 여부 */}
          <div style={{fontSize:10,fontWeight:700,textAlign:"center",padding:"7px",
            borderRadius:8,
            background:owned?"rgba(16,185,129,0.08)":"rgba(0,0,0,0.03)",
            color:owned?"var(--green)":"var(--tx3)"}}>
            {owned
              ?`✅ 보유중 · Lv.${owned.lv} · +${owned.enhance||0}강 · ${owned.gender||""}`
              :"📦 미보유"}
          </div>
        </>}
        {!seen&&<div style={{textAlign:"center",padding:"20px 0",color:"var(--tx3)",fontSize:12}}>
          아직 발견하지 못한 몬스터입니다.<br/>필드와 사냥터에서 탐험하세요!
        </div>}
      </div>
    </div>;
  };

  return <div>
    {renderMonDetail()}
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:6}}>
      📖 도감 <span style={{fontSize:11,color:"var(--tx3)",fontWeight:400}}>{seenCount}/{totalCount}종</span>
    </div>
    {/* 완성도 바 */}
    <div style={{marginBottom:8}}>
      <div style={{background:"rgba(0,0,0,0.07)",borderRadius:6,height:7,overflow:"hidden",marginBottom:4}}>
        <div style={{width:`${Math.min(100,seenCount/totalCount*100)}%`,height:"100%",
          background:`linear-gradient(90deg,${acHex},${acHex}aa)`,borderRadius:6,transition:"width 0.4s"}}/>
      </div>
      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
        {DEX_REWARDS.map(tier=>{
          const done=seenCount>=tier.need;
          const claimed=(myS.dexRewardsClaimed||[]).includes(tier.id);
          const canClaim=done&&!claimed;
          return <button key={tier.id} onClick={()=>canClaim&&claimDexReward(tier)} style={{
            padding:"3px 5px",borderRadius:7,
            border:`1px solid ${claimed?"rgba(245,158,11,0.3)":done?"rgba(245,158,11,0.6)":"rgba(0,0,0,0.07)"}`,
            background:claimed?"rgba(245,158,11,0.08)":done?"rgba(245,158,11,0.12)":"rgba(0,0,0,0.02)",
            cursor:canClaim?"pointer":"default",fontFamily:"inherit",opacity:done?1:0.45}}>
            <span style={{fontSize:9}}>{tier.emoji}</span>
            <span style={{fontSize:8,color:claimed?"var(--gold)":done?"var(--gold)":"var(--tx3)",fontWeight:600,marginLeft:2}}>
              {tier.label}{claimed?"✅":canClaim?"🆕":""}
            </span>
          </button>;
        })}
      </div>
    </div>
    {/* 등급 필터 */}
    <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:10}}>
      {gradeFilters.map(f=>(
        <button key={f} onClick={()=>setDexF(f)}
          style={{padding:"2px 7px",borderRadius:12,
            border:`1px solid ${dexF===f?(RCOL[f]||acHex):"rgba(0,0,0,0.07)"}`,
            background:dexF===f?`${RCOL[f]||acHex}15`:"rgba(0,0,0,0.02)",
            color:dexF===f?(RCOL[f]||acHex):"var(--tx3)",
            fontSize:9,cursor:"pointer",fontWeight:dexF===f?800:400,fontFamily:"inherit"}}>
          {f==="all"?"전체":f}
        </button>
      ))}
    </div>

    {/* 일반 도감 */}
    {<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
      {MONS.filter(m=>{
        if(m.rarity==="DIVINE") return dexF==="all";
        if(dexF==="all") return true;
        return m.rarity===dexF;
      }).map(m=>{
        const owned=col.find(c=>c.id===m.id||(c.baseId&&c.baseId===m.id));
        const seen=(myS.dexSeen||[]).includes(m.id)||owned;
        const isDivine=m.rarity==="DIVINE";
        if(isDivine&&!seen)return null;
        return <div key={m.id} onClick={()=>setSelectedMon(m)}
          style={{
          border:`1.5px solid ${seen?(isDivine?"#ff660070":m.color+"45"):"rgba(0,0,0,0.06)"}`,
          borderRadius:10,padding:"8px 4px",textAlign:"center",
          opacity:seen?1:0.25,cursor:"pointer",
          background:seen?(isDivine?"rgba(255,102,0,0.06)":`${m.color}08`):"rgba(0,0,0,0.01)",
          boxShadow:isDivine&&seen?"0 0 8px rgba(255,102,0,0.3)":undefined,
          transition:"transform 0.1s",}}
          onMouseOver={e=>e.currentTarget.style.transform="scale(1.05)"}
          onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
          <div style={{fontSize:18,filter:isDivine&&seen?"drop-shadow(0 0 4px #ff6600)":undefined}}>
            {seen?m.emoji:"❓"}
          </div>
          <div style={{fontSize:10,fontWeight:700,color:isDivine&&seen?"#ff6600":"var(--tx1)",marginTop:1,
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {isDivine?"???":seen?m.name:"????"}
          </div>
          <span style={{fontSize:8,fontWeight:800,padding:"1px 4px",borderRadius:6,
            background:isDivine?"rgba(255,102,0,0.15)":`${RCOL[m.rarity]||"#888"}18`,
            color:isDivine?"#ff6600":RCOL[m.rarity]||"#888",
            border:`1px solid ${isDivine?"rgba(255,102,0,0.3)":RCOL[m.rarity]+"25"}`}}>
            {isDivine?"???":m.rarity}
          </span>
          {owned&&owned.monType&&<div style={{fontSize:10,color:TYPES[owned.monType]?.color,marginTop:1}}>{TYPES[owned.monType]?.emoji}</div>}
        </div>;
      })}
    </div>}
  </div>;
}

function SideAch({myS,acHex,claimAchReward}){
  const [achFilter,setAchFilter]=React.useState("all");
  const achDone=(myS.achievements||[]);
  const achClaimed=(myS.achClaimed||[]);

  // 업적 카테고리 분류
  const categories=[
    {id:"all",    label:"전체",emoji:"🏆"},
    {id:"catch",  label:"도감",emoji:"📖"},
    {id:"fight",  label:"전투",emoji:"⚔️"},
    {id:"grow",   label:"성장",emoji:"📈"},
    {id:"explore",label:"탐험",emoji:"⛏️"},
    {id:"collect",label:"기타",emoji:"⭐"},
  ];
  // 업적별 카테고리 매핑
  const getAchCat=(a)=>{
    if(["catch1","catch5","catch10","catch20","catch30","catch50","catch_all"].includes(a.id))return "catch";
    if(["win3","win10","win30","win100","pvp3","pvp10","pvp30","boss_titan_k","boss_titan_5","boss_void_k","boss_void_5","boss_storm_k","boss_storm_5","boss_all","boss_all_10","loss"].includes(a.id))return "fight";
    if(["lv5","lv10","lv25","enhance5","enhance10","evo1","evo5","fusion1","fusion5","legend1","mutant_c","awaken1","breed1"].includes(a.id))return "grow";
    if(["dungeon1","dungeon10","release1","release10","shop1","monthly7","monthly30","tamer10","tamer30","tamer50","revive1"].includes(a.id))return "explore";
    return "collect";
  };

  const filtered=ACHS.filter(a=>achFilter==="all"||getAchCat(a)===achFilter);
  const doneCount=achDone.length;
  const claimable=ACHS.filter(a=>achDone.includes(a.id)&&!achClaimed.includes(a.id)).length;

  return <div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
      <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)"}}>
        🏆 업적 <span style={{fontSize:10,color:"var(--tx3)",fontWeight:400}}>{doneCount}/{ACHS.length}</span>
      </div>
      {claimable>0&&<span style={{fontSize:9,fontWeight:800,color:"var(--gold)",
        background:"rgba(245,158,11,0.15)",padding:"2px 7px",borderRadius:10}}>
        🆕 수령 {claimable}개
      </span>}
    </div>
    {/* 진행도 바 */}
    <div style={{background:"rgba(0,0,0,0.07)",borderRadius:5,height:5,overflow:"hidden",marginBottom:8}}>
      <div style={{width:`${Math.min(100,doneCount/ACHS.length*100)}%`,height:"100%",
        background:`linear-gradient(90deg,${acHex},${acHex}aa)`,borderRadius:5,transition:"width 0.4s"}}/>
    </div>
    {/* 카테고리 필터 */}
    <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:8}}>
      {categories.map(({id,label,emoji})=>(
        <button key={id} onClick={()=>setAchFilter(id)}
          style={{padding:"3px 7px",borderRadius:8,
            border:`1px solid ${achFilter===id?acHex:"rgba(0,0,0,0.08)"}`,
            background:achFilter===id?`${acHex}12`:"white",
            color:achFilter===id?acHex:"var(--tx3)",
            fontSize:9,fontWeight:achFilter===id?800:400,cursor:"pointer",fontFamily:"inherit"}}>
          {emoji} {label}
        </button>
      ))}
    </div>
    {/* 업적 목록 */}
    {filtered.map(a=>{
      const done=achDone.includes(a.id);
      const claimed=achClaimed.includes(a.id);
      const rStr=a.reward?Object.entries(a.reward).map(([id,v])=>{
        const all=[...FOODS,...CONSUMABLES,...BOSS_ITEMS,
          {id:"battle_token",emoji:"🪙"},{id:"stone1",emoji:"💠"},
          {id:"stone2",emoji:"🔷"},{id:"stone2",emoji:"🌀"}].find(x=>x.id===id);
        return all?`${all.emoji}×${v}`:"";
      }).filter(Boolean).join(" "):"";
      return <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
        borderRadius:10,border:`1px solid ${done?acHex+"25":"rgba(0,0,0,0.05)"}`,
        marginBottom:4,background:done?`${acHex}05`:"rgba(0,0,0,0.01)",
        opacity:done?1:0.5}}>
        <div style={{fontSize:16,width:22,textAlign:"center",flexShrink:0}}>{a.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,fontWeight:700,color:done?acHex:"var(--tx2)",
            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {a.name}{done&&!claimed&&<span style={{color:"var(--gold)",marginLeft:3}}>🆕</span>}
          </div>
          <div style={{fontSize:9,color:"var(--tx3)"}}>{a.desc}</div>
          {a.reward&&<div style={{fontSize:9,color:"var(--gold)"}}>{rStr}{a.title?` + 칭호"${a.title}"`:""}</div>}
        </div>
        {done&&!claimed&&<button onClick={()=>claimAchReward(a.id)}
          style={{padding:"3px 8px",borderRadius:7,border:"none",
            background:"linear-gradient(135deg,var(--gold),#cc8800)",
            color:"#fff",fontSize:9,fontWeight:800,cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>
          수령
        </button>}
        {claimed&&<span style={{fontSize:12,color:"var(--green)",flexShrink:0}}>✅</span>}
        {!done&&<span style={{fontSize:12,color:"rgba(0,0,0,0.15)",flexShrink:0}}>🔒</span>}
      </div>;
    })}
  </div>;
}
