function rollFusion(gradeA,gradeB){
  let useGrade=gradeA,mutantBonus=false;
  const isMutA=gradeA==="MUTANT",isMutB=gradeB==="MUTANT";
  if(isMutA||isMutB){
    mutantBonus=true;
    useGrade=isMutA?gradeB:gradeA;
    if(useGrade==="MUTANT")useGrade="EPIC";
  }
  const table=FUSION_TABLE[useGrade]||FUSION_TABLE["COMMON"];
  let r=Math.random();
  for(const row of table){r-=row.r;if(r<=0){if(row.g==="fail")return null;let g=row.g;if(mutantBonus&&Math.random()<0.5){const idx=GRADE_ORDER.indexOf(g);const up=Math.random()<0.5;if(up&&idx<GRADE_ORDER.length-3)g=GRADE_ORDER[idx+1];else if(!up&&idx>0)g=GRADE_ORDER[idx-1];}return g;}}
  return null;
}

// 진화 조건 충족 여부 체크 함수
function checkEvoConds(chain, c, myS){
  if(!chain||!chain.conds)return true;
  return chain.conds.every(cond=>{
    if(cond.type==="lv")        return (c.lv||1)>=cond.val;
    if(cond.type==="enhance")   return (c.enhance||0)>=cond.val;
    if(cond.type==="hunt")      return (c.huntWins||0)>=cond.val;
    if(cond.type==="feed")      return (c.feedCount||0)>=cond.val;
    if(cond.type==="dungeon")   return (myS.totalDungeons||0)>=cond.val;
    if(cond.type==="pvp")       return (myS.pvpWins||0)>=cond.val;
    if(cond.type==="boss")      return Object.values(myS.bossKills||{}).reduce((a,b)=>a+b,0)>=cond.val;
    if(cond.type==="tamerLv")   return (myS.tamerLv||1)>=cond.val;
    return true;
  });
}

// 이스터에그 조건 (내부용 - 절대 노출 금지)
// 조건 A: localStorage "_og_ts" 없거나 현재시간 - _og_ts > 90일(ms)
// 조건 B: 현재 분(minute)의 초(second)가 [0..5] 이내 (타이밍)
// 조건 C: 보유 ball1 개수가 소수(prime number)
// 조건 D: 탱귤이를 3마리 이상 보유
// A+B+C+D 모두 만족 시 0.3% 확률로 출현
// → 실질 출현율 극히 낮음, 3개월 쿨다운으로 재출현 제한
function _isPrime(n){if(n<2)return false;for(let i=2;i<=Math.sqrt(n);i++)if(n%i===0)return false;return true;}
function _checkDivineConditions(myS){
  try{
    const ts=localStorage.getItem("_og_ts");
    const now=Date.now();
    if(ts&&now-Number(ts)<90*24*60*60*1000)return false; // 3개월 쿨다운
    const d=new Date();
    if(d.getSeconds()>7)return false; // 매 분 0~7초 사이
    const ball1=(myS?.balls?.ball1||0);
    if(!_isPrime(ball1))return false; // ball1 수량이 소수
    const tangyCount=(myS?.collection||[]).filter(c=>c.id==="tangy"||c.baseId==="tangy").length;
    if(tangyCount<3)return false; // 탱귤이 3마리 이상
    return true;
  }catch(e){return false;}
}

function safe(s){
  const d=initState();
  if(!s)return d;
  return{
    ...d,...s,
    tamerLv:Math.max(1,s.tamerLv||1),tamerExp:s.tamerExp||0,
    balls:{...d.balls,...(s.balls||{})},
    foods:{...d.foods,...(s.foods||{})},
    stones:{...d.stones,...(s.stones||{})},
    specials:{...d.specials,...(s.specials||{})},
    consumables:{...d.consumables,...(s.consumables||{})},
    bossItems:{...d.bossItems,...(s.bossItems||{})},
    battleItems:{...d.battleItems,...(s.battleItems||{})},
    collection:Array.isArray(s.collection)?s.collection:[],
    dexSeen:Array.isArray(s.dexSeen)?s.dexSeen:[],
    achievements:Array.isArray(s.achievements)?s.achievements:[],
    achClaimed:Array.isArray(s.achClaimed)?s.achClaimed:[],
    titles:Array.isArray(s.titles)?s.titles:[],
    monthlyClaimedDays:Array.isArray(s.monthlyClaimedDays)?s.monthlyClaimedDays:[],
    bossKills:s.bossKills||{},
    online:s.online||false,
    stamina:s.stamina!==undefined?s.stamina:d.stamina,
    activeTitle:s.activeTitle||null,
    shopDailyDate:s.shopDailyDate||null,
    shopDaily:s.shopDaily||{},
    dexRewardsClaimed:Array.isArray(s.dexRewardsClaimed)?s.dexRewardsClaimed:[],
  };
}

function addTamerExp(s,amt){
  if(!s)return s;
  if((s.tamerLv||1)>=MAX_TAMER_LV)return s;
  let lv=s.tamerLv||1,exp=(s.tamerExp||0)+amt;
  while(lv<MAX_TAMER_LV&&exp>=tamerExpNeeded(lv)){exp-=tamerExpNeeded(lv);lv++;}
  if(lv>=MAX_TAMER_LV)exp=0;
  return{...s,tamerLv:lv,tamerExp:exp};
}

function addItem(s,id,amt){
  // 아이템 추가 헬퍼 - 어느 카테고리든 자동 탐색
  const keys=["balls","foods","stones","specials","consumables","bossItems","battleItems"];
  for(const k of keys){
    if(s[k]&&id in s[k]){
      return{...s,[k]:{...s[k],[id]:(s[k][id]||0)+amt}};
    }
  }
  // 없으면 consumables에 추가
  return{...s,consumables:{...s.consumables,[id]:(s.consumables[id]||0)+amt}};
}

function resetDaily(s){
  const today=new Date().toDateString();
  if(s.lastBattleDate===today)return s;
  return{...s,dailyBattles:0,lastBattleDate:today};
}
function refillStamina(s){
  const now=Date.now();
  const last=s.lastStaminaRefill||now;
  const elapsed=Math.floor((now-last)/3600000);
  if(elapsed<=0)return s;
  const ns=Math.min(s.maxStamina||10,(s.stamina||0)+elapsed);
  return{...s,stamina:ns,lastStaminaRefill:now};
}

function checkAch(s){
  if(!s)return s;
  const achs=Array.isArray(s.achievements)?s.achievements:[];
  const u=ACHS.filter(a=>!achs.includes(a.id)&&a.cond(s)).map(a=>a.id);
  if(!u.length)return s;
  // 칭호도 자동 추가
  let titles=[...(s.titles||[])];
  u.forEach(id=>{const a=ACHS.find(x=>x.id===id);if(a?.title&&!titles.includes(a.title))titles.push(a.title);});
  return{...s,achievements:[...achs,...u],titles};
}

function prepare(data){
  let s=safe(data);
  s=resetDaily(s);
  s=refillStamina(s);
  return checkAch(s);
}

function HpBar({cur,max,color}){
  const p=Math.max(0,Math.min(1,(cur||0)/Math.max(1,max||1)));
  const c=color||(p>0.5?"var(--green)":p>0.25?"var(--gold)":"var(--red)");
  return <div style={{background:"rgba(0,0,0,0.08)",borderRadius:6,height:7,width:"100%",overflow:"hidden"}}>
    <div style={{width:`${p*100}%`,height:"100%",background:c,borderRadius:6,transition:"width 0.3s",boxShadow:`0 0 6px ${c}66`}}/>
  </div>;
}

function Btn({onClick,disabled,color,children,sm,outline}){
  if(outline)return <button onClick={onClick} disabled={disabled} style={{
    padding:sm?"7px 0":"11px 0",borderRadius:10,border:`2px solid ${disabled?"rgba(0,0,0,0.1)":color}`,width:"100%",cursor:disabled?"default":"pointer",
    background:"transparent",color:disabled?"rgba(0,0,0,0.2)":color,fontSize:sm?12:14,fontWeight:700,
  }}>{children}</button>;
  return <button onClick={onClick} disabled={disabled} style={{
    padding:sm?"8px 0":"12px 0",borderRadius:11,border:"none",width:"100%",cursor:disabled?"default":"pointer",
    background:disabled?"rgba(0,0,0,0.06)":`linear-gradient(135deg,${color},${color}dd)`,
    color:disabled?"rgba(0,0,0,0.22)":"white",fontSize:sm?12:14,fontWeight:800,
    boxShadow:disabled?"none":`0 3px 14px ${color}50`,letterSpacing:0.3,
  }}>{children}</button>;
}

function Card({children,color,style={},onClick}){
  return <div onClick={onClick} style={{
    border:`1.5px solid ${color?color+"28":"rgba(139,92,246,0.10)"}`,
    borderRadius:"var(--radius)",padding:"11px 13px",marginBottom:8,
    background:"var(--card)",
    boxShadow:color?`0 2px 12px ${color}18`:"var(--shadow)",
    borderLeftColor:color||undefined,borderLeftWidth:color?4:undefined,
    cursor:onClick?"pointer":undefined,
    transition:"transform 0.1s,box-shadow 0.1s",
    ...style
  }}>{children}</div>;
}

function Badge({text,color}){
  return <span style={{
    fontSize:17,fontWeight:800,padding:"2px 7px",borderRadius:20,
    background:`${color}18`,color,border:`1.5px solid ${color}30`,
    letterSpacing:0.5,textTransform:"uppercase",

}

function TypeBadge({type}){
  if(!type)return null;
  const t=TYPES[type];if(!t)return null;
  return <span style={{fontSize:17,fontWeight:700,padding:"1px 5px",borderRadius:8,background:`${t.color}15`,color:t.color,border:`1px solid ${t.color}30`}}>{t.emoji}{t.name}</span>;
}

function generateCode(prefix){
  return prefix+Math.floor(1000+Math.random()*9000);
}
async function checkCodeExists(code){
  const snap=await db.ref("accounts/"+code).once("value");
  return snap.exists();
}
async function createAccount(code,player,nickname,charIdx){
  await db.ref("accounts/"+code).set({player,nickname,charIdx:charIdx||0,createdAt:Date.now()});
  await db.ref("players/"+code).set(initState());
}
async function loginAccount(code){
  const snap=await db.ref("accounts/"+code).once("value");
  return snap.exists()?snap.val():null;
}

    const c=(code||loginCode).toUpperCase().trim();
    if(!c){setLoginError("코드를 입력해주세요");return;}
    setLoginLoading(true);setLoginError("");

    const p=acc.player||"sik";
    // 내 데이터 구독
    db.ref("players/"+c).on("value",snap=>setMyS(prepare(snap.val())));
    // 상대방 데이터 구독
    const oppP=p==="sik"?"jing":"sik";
    db.ref("accounts").once("value",snap=>{
      const accounts=snap.val()||{};
      const oppCode=Object.keys(accounts).find(k=>accounts[k].player===oppP);
      if(oppCode)db.ref("players/"+oppCode).on("value",s=>setOppS(prepare(s.val())));
    });
    db.ref("players/"+c+"/online").set(true);
    db.ref("players/"+c+"/online").onDisconnect().set(false);
    localStorage.setItem("wt_code",c);
    setMyCode(c);setMyCharIdx(acc.charIdx||0);setMyNickname(acc.nickname||"");
    setPlayer(p);setScreen("game");setLoginLoading(false);
  };

  const doRegister=async()=>{
    if(!regNickname.trim()){setRegError("닉네임을 입력해주세요");return;}
    if(regNickname.length>8){setRegError("닉네임은 8자 이내로");return;}
    setLoginLoading(true);setRegError("");
    const playerMap=["sik","jing","sik","jing"];
    const prefixMap=["SK","JJ","TK","TT"];
    const p=playerMap[regChar];
    const prefix=prefixMap[regChar];
    let code="",tries=0;
    do{code=generateCode(prefix);tries++;}while(await checkCodeExists(code)&&tries<10);
    await createAccount(code,p,regNickname,regChar);
    setRegCode(code);setRegStep(3);setLoginLoading(false);
  };

  const doFindCode=async()=>{
    if(!findNick.trim())return;
    setLoginLoading(true);
    const snap=await db.ref("accounts").once("value");
    const acc=snap.val()||{};
    const found=Object.entries(acc).filter(([k,v])=>v.nickname===findNick.trim()).map(([k])=>k);
    setFoundCodes(found);setFindDone(true);setLoginLoading(false);

function SidePanel({sideTabTop,setSideTabTop,sideTabBot,setSideTabBot,
  SIDE_TABS_TOP,SIDE_TABS_BOT,myS,col,tLv,tExpNeed,maxStorage,acHex,isSik,
  todayDay,claimMonthly,dgExploring,dgRes,setDgRes,runDungeon,DUNGEONS,unlocks,aliveCols,
  useStaminaPot,fa,fb,setFa,setFb,fuse,fusRes,fusAnim,bs,blog,lr,attack,resetB,
  oppS,myPick,setMyPick,oppPick,setOppPick,oppHas,battleLeft,startPvp,claimAchReward,
  MAX_ENHANCE,MONS,RCOL,sideScrollRef,sideScrollPos,setMy,toast}){

  // ── 위쪽 탭 콘텐츠 렌더 ──
  const renderTop=()=>{
    if(sideTabTop==="tamer") return <SideTamer myS={myS} tLv={tLv} tExpNeed={tExpNeed} col={col} maxStorage={maxStorage} acHex={acHex} setMy={setMy}/>;
    if(sideTabTop==="monthly") return <SideMonthly myS={myS} todayDay={todayDay} claimMonthly={claimMonthly}/>;
    if(sideTabTop==="dungeon") return <SideDungeon myS={myS} dgExploring={dgExploring} dgRes={dgRes} setDgRes={setDgRes} runDungeon={runDungeon} DUNGEONS={DUNGEONS} unlocks={unlocks} aliveCols={aliveCols} useStaminaPot={useStaminaPot}/>;
    if(sideTabTop==="raid") return <SideRaid myS={myS} col={col} setMy={setMy} toast={toast} aliveCols={aliveCols} acHex={acHex}/>;
    if(sideTabTop==="breed") return <SideBreed myS={myS} col={col} setMy={setMy} toast={toast} aliveCols={aliveCols} acHex={acHex}/>;
    return null;
  };
  // ── 아래쪽 탭 콘텐츠 렌더 ──
  const renderBot=()=>{
    if(sideTabBot==="dex") return <SideDex myS={myS} col={col} acHex={acHex} setMy={setMy}/>;
    if(sideTabBot==="ach") return <SideAch myS={myS} acHex={acHex} claimAchReward={claimAchReward}/>;
    if(sideTabBot==="stonelab") return <SideStoneLab myS={myS} col={col} setMy={setMy} toast={toast} acHex={acHex}/>;
    if(sideTabBot==="help") return <SideHelp acHex={acHex}/>;
    if(sideTabBot==="prob") return <SideProb/>;
    return null;
  };

  return <>
    {/* ── 위 영역 ── */}
    <div className="side-top">
      <div className="side-top-tabs">
        {SIDE_TABS_TOP.map(([k,icon,name])=>(
          <button key={k} className={`side-tab${sideTabTop===k?" active":""}`}
            onMouseDown={e=>{e.preventDefault();setSideTabTop(k);}}>
            {icon}<br/>{name}
          </button>
        ))}
      </div>
      <div className="side-top-content"
        ref={el=>{if(el)sideScrollRef.current=el;}}
        onScroll={e=>{sideScrollPos.current=e.currentTarget.scrollTop;}}
        onWheel={e=>e.stopPropagation()}>
        {renderTop()}
      </div>
    </div>
    {/* ── 아래 영역 ── */}
    <div className="side-bottom">
      <div className="side-bottom-tabs">
        {SIDE_TABS_BOT.map(([k,icon,name])=>(
          <button key={k} className={`side-tab${sideTabBot===k?" active":""}`}
            onMouseDown={e=>{e.preventDefault();setSideTabBot(k);}}>
            {icon}<br/>{name}
          </button>
        ))}
      </div>
      <div className="side-bottom-content"
        onWheel={e=>e.stopPropagation()}>
        {renderBot()}
      </div>
    </div>
  </>;
}

// ── 스탯/장비 헬퍼 ──
function getEquipBonus(equipsOn, equips){
  let atk=0, def=0;
  if(!equipsOn||!equips)return{atk,def};
  BOSS_EQUIPS.forEach(eq=>{
    if(equips[eq.id]&&equipsOn[eq.slot]){atk+=eq.atk;def+=eq.def;}
  });
  return{atk,def};
}

function getEnhanceBonus(enhance){
  const e=enhance||0;
  let atkPct=0,hpPct=0,defPct=0;
  const t1=Math.min(e,3);
  atkPct+=t1*3; hpPct+=t1*2;
  const t2=Math.min(Math.max(e-3,0),3);
  atkPct+=t2*3; hpPct+=t2*2; defPct+=t2*2;
  const t3=Math.min(Math.max(e-6,0),3);
  atkPct+=t3*4; hpPct+=t3*3; defPct+=t3*3;
  if(e>=10){atkPct+=5;hpPct+=5;defPct+=5;}
  return{atkPct,hpPct,defPct};
}

function calcStats(c, MONS, TYPES){
  if(!c)return{hp:0,atk:0,def:0};
  const bm=MONS.find(m=>m.id===(c.baseId||c.id))||MONS.find(m=>m.id===c.id)||{atk:10,hp:30};
  const lv=c.lv||1;
  const tBonus=c.monType?TYPES[c.monType]?.bonus||{}:{};
  const hpMult=1+(tBonus.hp||0);
  const atkMult=1+(tBonus.atk||0);
  const eb=getEnhanceBonus(c.enhance||0);
  const fb=c.fusionBonus||{atk:0,hp:0};
  const hp=Math.floor((bm.hp+(lv-1)*5)*hpMult*(1+eb.hpPct/100))+fb.hp;
  const atk=Math.floor((bm.atk+(lv-1)*2)*atkMult*(1+eb.atkPct/100))+fb.atk;
  const def=eb.defPct;
  return{hp,atk,def,enhance:c.enhance||0};
}

function StatBadges({c,MONS,TYPES,small}){
  const s=calcStats(c,MONS,TYPES);
  const fs=small?10:11;
  return <div style={{display:"flex",gap:small?3:4,flexWrap:"wrap",marginTop:2}}>
    <span style={{fontSize:fs,fontWeight:700,color:"#ef4444",background:"rgba(239,68,68,0.08)",padding:"1px 5px",borderRadius:6}}>❤️{s.hp}</span>
    <span style={{fontSize:fs,fontWeight:700,color:"#f97316",background:"rgba(249,115,22,0.08)",padding:"1px 5px",borderRadius:6}}>⚔️{s.atk}</span>
    <span style={{fontSize:fs,fontWeight:700,color:"#3b82f6",background:"rgba(59,130,246,0.08)",padding:"1px 5px",borderRadius:6}}>🛡️{s.def>0?`+${s.def}%`:"0"}</span>
  </div>;
}

    const pool=WILD_IDS.map(id=>MONS.find(m=>m.id===id)).filter(Boolean);
    const uncommonW=Math.min(50,20+tLv);

    const t=w.reduce((a,b)=>a+b,0);let r=Math.random()*t;
    for(let i=0;i<pool.length;i++){r-=w[i];if(r<=0){setWild(pool[i]);break;}}
    setCr(null);
  },[wildFixed,tLv,myS]);

  useEffect(()=>{if(tab==="field"&&!wildFixed)spawnWild();},[tab,wildFixed]);

  const throwBall=()=>{
    if(!wild||cr)return;
    if(wild.rarity==="DIVINE")return; // 신성 존재는 포획 불가
    if(isBossWild){toast("⚠️ 보스는 포획불가! 소환수로 토벌하세요","var(--red)");return;}
    if((myS.balls[sb]||0)<=0)return;
    const col=myS.collection||[];
    if(col.length>=maxStorage){toast(`보관함 가득! (${maxStorage}칸)`,"var(--red)");return;}
    if(!unlocks.balls.includes(sb)){toast("테이머 레벨업 필요!","var(--red)");return;}
    const sameCount=col.filter(c=>c.id===wild.id).length;
    if(sameCount>=MAX_SAME){toast(`같은 소환수 최대 ${MAX_SAME}마리!`,"var(--red)");return;}
    const ball=BALLS.find(b=>b.id===sb);
    const eyeBonus=(myS.bossItems?.boss_eye||0)>0;
    const catchRate=CATCH_RATES[wild.rarity]||0.1;

    }
    setMy(s=>{
      let ns={...s,stones:{...s.stones,[chain.stone]:(s.stones[chain.stone]||1)-1}};
      if(useShardOverride)ns={...ns,bossItems:{...ns.bossItems,ancient_shard:Math.max(0,(ns.bossItems.ancient_shard||1)-1)}};
      if(evoResult==="fail"){
        ns=addItem(ns,"enhance_stone",3);
        return checkAch({...ns,evoFails:(ns.evoFails||0)+1});
      }
      if(evoResult==="fatal"){
        // 소환수 사망
        const nc=(ns.collection||[]).map((ci,i)=>i!==idx?ci:{...ci,alive:false,curHp:0});
        return checkAch({...ns,collection:nc,evoFails:(ns.evoFails||0)+1});
      }
      // 성공 or 대성공
      const toId=evoResult==="great"&&chain.altTo ? chain.altTo : chain.to;
      const eb=MONS.find(m=>m.id===toId);
      if(!eb)return ns;
      // 대성공 보너스: 스탯 +10%
      const greatBonus=evoResult==="great"?1.1:1;
      const nc=(ns.collection||[]).map((ci,i)=>i!==idx?ci:{
        id:eb.id,lv:1,exp:0,
        maxHp:Math.floor(eb.hp*greatBonus),hp:Math.floor(eb.hp*greatBonus),curHp:Math.floor(eb.hp*greatBonus),
        alive:true,enhance:0,
        monType:MON_BASE_TYPE[eb.id]||null,
        atkBonus:(MON_BASE_TYPE[eb.id]?TYPES[MON_BASE_TYPE[eb.id]]?.bonus?.atk||0:0),
        feedCount:0,huntWins:0,
      });
      const newId=toId;
      const newDex=(ns.dexSeen||[]).includes(newId)?ns.dexSeen:[...(ns.dexSeen||[]),newId];
      return addTamerExp({...ns,collection:nc,dexSeen:newDex,totalEvos:(ns.totalEvos||0)+1},evoResult==="great"?60:30);
    });
    if(evoResult==="great"){
      const altName=chain.altName||chain.name;
      toast(`🌟 대성공! ${altName}으로 진화!`,"#f59e0b");
    }else if(evoResult==="success"){
      toast(`✨ ${chain.name} 진화 성공!`,"var(--purple)");
    }else if(evoResult==="fail"){
      toast("💔 진화 실패... 🔩×3 위로 보상","var(--orange)");
    }else{
      toast("💀 대실패!! 소환수가 사망했다...","var(--red)");
    }
  };

  const reviveMon=(idx)=>{
    if((myS.specials?.revive||0)<=0){toast("부활권 없음!","var(--red)");return;}
    setMy(s=>{
      const nc=(s.collection||[]).map((c,i)=>{
        if(i!==idx)return c;
        const bm=MONS.find(m=>m.id===c.id)||{hp:30};
        const half=Math.floor((bm.hp+(c.lv-1)*5)/2);
        return{...c,alive:true,curHp:half,hp:half,maxHp:bm.hp+(c.lv-1)*5};
      });
      return{...s,collection:nc,specials:{...s.specials,revive:(s.specials.revive||1)-1},totalRevives:(s.totalRevives||0)+1};
    });
    toast("💊 부활 성공!","var(--blue)");
  };

  const releaseMon=(idx)=>{
    const c=(myS.collection||[])[idx];
    const bm=MONS.find(m=>m.id===(c.baseId||c.id))||MONS.find(m=>m.id===c.id)||{rarity:"COMMON"};
    const rwdList=RELEASE_REWARD[bm.rarity]||[{id:"food1",amt:1}];
    // 소환수 Lv 보너스: Lv마다 10%씩 추가 (최대 2배)
    const lvBonus=Math.min(2.0, 1.0 + (c.lv||1)*0.05);
    setMy(s=>{
      let ns={...s,collection:(s.collection||[]).filter((_,i)=>i!==idx),totalReleases:(s.totalReleases||0)+1};
      rwdList.forEach(({id,amt})=>{ns=addItem(ns,id,Math.max(1,Math.round(amt*lvBonus)));});
      return addTamerExp(ns,10);
    });
    const desc=rwdList.map(({id,amt})=>{
      const it=[...BALLS,...FOODS,...EVO_STONES,...CONSUMABLES].find(x=>x.id===id)||{emoji:"📦"};
      return `${it.emoji}×${Math.max(1,Math.round(amt*lvBonus))}`;
    }).join(" ");
    toast(`🕊️ ${bm.name} 방생! ${desc}`,"var(--gold)");
    setReleaseIdx(null);
  };

  const gm=(col,idx)=>{
    const c=(col||[])[idx];if(!c)return null;
    const baseId=c.baseId||c.id;
    const bm=MONS.find(m=>m.id===baseId)||MONS.find(m=>m.id===c.id)||{atk:10,spd:10,hp:30};
    const lv=c.lv||1;
    const tBonus=c.monType?TYPES[c.monType]?.bonus||{}:{};
    const hpMult=1+(tBonus.hp||0);
    const baseHp=Math.floor((bm.hp+(lv-1)*5)*hpMult);
    return{...bm,...c,lv,maxHp:baseHp,curHp:baseHp,atk:bm.atk+(lv-1)*2,
      atkBonus:tBonus.atk||0,spdBonus:tBonus.spd||0,monType:c.monType||null,baseId};
  };

  const startHunt=()=>{
    if(myPick===null)return;
    const m1=gm(myS.collection,myPick);
    const newCount=huntCount+1;
    setHuntCount(newCount);
    // 보스 출현: 100회 기반 누적 확률 (비공개)
    // 40회 이상부터 확률 시작, 70회부터 급증, 100회는 100%
    const bossChance=newCount>=100?1:newCount>=70?(newCount-70)/30*0.6+0.15:newCount>=40?(newCount-40)/30*0.15:0;
    if(tLv>=15&&Math.random()<bossChance){
      const bossId=BOSS_IDS[Math.floor(Math.random()*BOSS_IDS.length)];
      const bm=MONS.find(m=>m.id===bossId);
      const lv=Math.max(5,tLv);
      const boss={...bm,lv,maxHp:bm.hp+(lv-1)*8,curHp:bm.hp+(lv-1)*8,atk:bm.atk+(lv-1)*3};
      toast(`🌋 보스 ${bm.emoji}${bm.name} 출현!`,"var(--red)");
      setBossFight({bossId,boss,myMon:m1,myIdx:myPick,over:false,winner:null});
      setBossLog([`🌋 보스 ${boss.emoji}${boss.name} 출현!`]);
      setHuntCount(0); // 보스 출현 시 카운터 리셋
      setBs(null);
      return;
    }
    const pool=WILD_IDS.map(id=>MONS.find(m=>m.id===id)).filter(Boolean);
    const eb=pool[Math.floor(Math.random()*pool.length)];
    const lv=Math.max(1,Math.floor(tLv*(0.5+Math.random()*0.5)));
    const m2={...eb,lv,maxHp:eb.hp+(lv-1)*5,curHp:eb.hp+(lv-1)*5,atk:eb.atk+(lv-1)*2};
    setBs({m1,m2,m1idx:myPick,turn:"m1",over:false,winner:null,mode:"hunt"});
    setBlog([`🗺 ${m1.emoji}${m1.name} Lv.${m1.lv} VS 야생 ${m2.emoji}${m2.name} Lv.${lv}`]);
  };

  const getBattleLeft=()=>{
    const today=new Date().toDateString();
    const used=myS.lastBattleDate===today?(myS.dailyBattles||0):0;
    return Math.max(0,MAX_DAILY_BATTLES-used)+(myS.consumables?.battle_ticket||0);
  };

  const startPvp=()=>{
    if(myPick===null||oppPick===null)return;
    const m1=gm(myS.collection,myPick),m2=gm(oppS.collection,oppPick);
    if(!m1||!m2)return;
    if(Math.abs(m1.lv-m2.lv)>MAX_LV_DIFF){toast(`레벨 차이 ${MAX_LV_DIFF} 초과!`,"var(--red)");return;}
    const today=new Date().toDateString();
    const used=myS.lastBattleDate===today?(myS.dailyBattles||0):0;
    const tickets=myS.consumables?.battle_ticket||0;
    if(used>=MAX_DAILY_BATTLES&&tickets<=0){toast("배틀 횟수 소진!","var(--red)");return;}
    setMy(s=>{
      const todayUsed=s.lastBattleDate===today?(s.dailyBattles||0):0;
      if(todayUsed>=MAX_DAILY_BATTLES)return{...s,consumables:{...s.consumables,battle_ticket:Math.max(0,(s.consumables?.battle_ticket||1)-1)}};
      return{...s,dailyBattles:todayUsed+1,lastBattleDate:today};
    });
    setBs({m1,m2,m1idx:myPick,m2idx:oppPick,turn:"m1",over:false,winner:null,mode:"pvp"});
    setBlog([`⚔ ${m1.emoji}${m1.name} Lv.${m1.lv} VS ${m2.emoji}${m2.name} Lv.${m2.lv}`]);
  };

  const attack=()=>{
    if(!bs||bs.over)return;
    const{m1,m2,turn}=bs;
    const atk=turn==="m1"?m1:m2,def=turn==="m1"?m2:m1;
    const atkType=atk.monType||(MON_BASE_TYPE[atk.baseId||atk.id]);
    const defType=def.monType||(MON_BASE_TYPE[def.baseId||def.id]);
    const typeMult=getTypeMult(atkType,defType);
    const divineAtkMult=turn==="m1"&&myS.divineItem?1.20:1;
    const enhBonusAtk=getEnhanceBonus(atk.enhance||0).atkPct/100;
    const equipB=turn==="m1"?getEquipBonus(myS.equipsOn,myS.equips):{atk:0,def:0};
    const atkStat=Math.floor((atk.atk+(atk.lv-1)*2)*(1+(atk.atkBonus||0))*(1+enhBonusAtk)*(1+equipB.atk/100)*divineAtkMult)+(atk.fusionBonus?.atk||0);
    const rawDmg=Math.max(1,atkStat+Math.floor(Math.random()*6)-2);
    const dmg=Math.max(1,Math.round(rawDmg*typeMult));
    // divine item + 강화 DEF: 내 소환수가 방어할 때 피해 감소
    const divineDefBonus=turn==="m2"&&myS.divineItem?15:0;
    const enhDefBonus=turn==="m2"?getEnhanceBonus(def.enhance||0).defPct:0;
    const equipDefBonus=turn==="m2"?getEquipBonus(myS.equipsOn,myS.equips).def:0;
    const totalDef=Math.min(65,divineDefBonus+enhDefBonus+equipDefBonus);
    const nhp=Math.max(0,def.curHp-Math.floor(dmg*(1-totalDef/100)));
    const typeMsg=typeMult>1?"⚡효과적!":typeMult<1?"💤비효과적...":"";
    if(nhp<=0){
      setBs(s=>({...s,[turn==="m1"?"m2":"m1"]:{...def,curHp:0},over:true,winner:turn}));
      setBlog(l=>[...l,`${atk.emoji}→${def.emoji} ${dmg}dmg ${typeMsg}`,`🏆 ${atk.name} 승리!`]);
      if(turn==="m1"){
        const esAmt=3+Math.floor(Math.random()*4);
        const tokenAmt=2+Math.floor(Math.random()*4);
        if(bs.mode==="hunt"){
          const ballDrop=Math.floor(Math.random()*3);
          setMy(s=>{let ns={...s,huntWins:(s.huntWins||0)+1};
            // 소환수 개별 사냥 승리 누적
            ns={...ns,collection:(ns.collection||[]).map((c,ci)=>ci===bs.m1idx?{...c,huntWins:(c.huntWins||0)+1}:c)};
            if(ballDrop>0)ns.balls={...ns.balls,ball1:(ns.balls.ball1||0)+ballDrop};
            ns=addItem(ns,"enhance_stone",esAmt);
            return addTamerExp(ns,30);});
          toast(`🏆 사냥 승리! 🔩×${esAmt}${ballDrop>0?` 🟠×${ballDrop}`:""}`,"var(--green)");
        }else{
          let specialDrop=null;
          if(Math.random()<0.05)specialDrop="boss_crystal";
          else if(Math.random()<0.08)specialDrop="ancient_shard";
          setMy(s=>{let ns={...s,pvpWins:(s.pvpWins||0)+1};
            ns=addItem(ns,"enhance_stone",esAmt);
            ns=addItem(ns,"battle_token",tokenAmt);
            if(specialDrop)ns=addItem(ns,specialDrop,1);
            return addTamerExp(ns,50);});
          toast(`🏆 배틀 승리! 🔩×${esAmt} 🪙×${tokenAmt}`,"var(--green)");
        }
      }else{
        setMy(s=>{let ns={...s,losses:(s.losses||0)+1,
          collection:(s.collection||[]).map((c,i)=>i===bs.m1idx?{...c,alive:false,curHp:0}:c)};
          return addTamerExp(ns,10);});
        if(bs.mode==="pvp"&&bs.m2idx!==undefined)
          setOpp(s=>({...s,collection:(s.collection||[]).map((c,i)=>i===bs.m2idx?{...c,alive:false,curHp:0}:c)}));
        toast("😵 패배... 소환수가 쓰러졌다!","var(--red)");
      }
    }else{
      setBs(s=>({...s,[turn==="m1"?"m2":"m1"]:{...def,curHp:nhp},turn:turn==="m1"?"m2":"m1"}));
      setBlog(l=>[...l,`${atk.emoji}→${def.emoji} ${dmg}dmg ${typeMsg}`]);
    }
  };

  const resetB=()=>{setBs(null);setBlog([]);setMyPick(null);setOppPick(null);};

  const enhanceMon=(idx)=>{
    const c=(myS.collection||[])[idx];if(!c)return;
    const cur=c.enhance||0;
    if(cur>=MAX_ENHANCE){toast("이미 최고 강화!","var(--gold)");return;}
    const bm2=MONS.find(m=>m.id===(c.baseId||c.id))||{rarity:"COMMON"};
    const cost=getEnhanceCost(bm2.rarity, cur);
    const have=(myS.consumables?.enhance_stone||0);
    if(have<cost){toast(`강화석 ${cost}개 필요! (보유 ${have}개)`,"var(--red)");return;}
    const ok=Math.random()<ENHANCE_RATES[cur];
    const gradeIdx=GRADE_ORDER.indexOf(bm2.rarity);
    // COMMON/UNCOMMON/RARE(0~2): 실패해도 유지
    // UNIQUE(3)~: 실패 시 하락
    // EPIC(5)~: 실패 시 파괴 확률 추가
    const isSafe=gradeIdx<=2;
    const canDestroy=gradeIdx>=5; // EPIC 이상
    let destroyRate=0;
    if(canDestroy&&!ok){
      if(bm2.rarity==="EPIC")    destroyRate=cur>=7?0.12:cur>=5?0.06:0;
      else if(bm2.rarity==="LEGEND"||bm2.rarity==="MUTANT") destroyRate=cur>=6?0.15:cur>=3?0.08:0.03;
      else if(bm2.rarity==="BOSS"||bm2.rarity==="DIVINE")   destroyRate=cur>=5?0.20:0.08;
    }
    const destroyed=!ok&&canDestroy&&Math.random()<destroyRate;
    setMy(s=>{
      let ns=addItem(s,"enhance_stone",-cost);
      const nc=(ns.collection||[]).map((c2,i)=>{
        if(i!==idx)return c2;
        if(ok)return{...c2,enhance:cur+1};
        if(destroyed)return{...c2,alive:false,curHp:0,enhance:0};
        if(isSafe)return{...c2};
        return{...c2,enhance:Math.max(0,cur-1)};
      });
      return{...ns,collection:nc};
    });
    if(ok)toast(`🔩 +${cur+1}강 성공!`,"var(--green)");
    else if(destroyed)toast(`💀 강화 파괴!! 소환수가 쓰러졌다!`,"var(--red)");
    else if(isSafe)toast(`💥 강화 실패... (+${cur}강 유지)`,"var(--orange)");
    else toast(`💥 강화 실패! +${cur>0?cur-1:0}강으로 하락`,"var(--red)");
  };

  const typeEvolveRandom=(idx)=>{
    if((myS.stones?.stone1||0)<5){toast("진화석 5개 필요!","var(--red)");return;}
    const c2=(myS.collection||[])[idx];
    const typeKeys=Object.keys(TYPES).filter(t=>c2&&t!==c2.monType);
    if(!typeKeys.length)return;
    const rndType=typeKeys[Math.floor(Math.random()*typeKeys.length)];
    setMy(s=>({...s,stones:{...s.stones,stone1:Math.max(0,(s.stones.stone1||5)-5)}}));
    typeEvolve(idx,rndType);
  };

  const typeEvolve=(idx,type)=>{
    const c=(myS.collection||[])[idx];if(!c)return;
    const stoneId=`tstone_${type}`;
    if((myS.typeStones?.[stoneId]||0)<=0){toast(`${TYPES[type]?.emoji}속성석 없음!`,"var(--red)");return;}
    const baseId=c.baseId||c.id;
    const baseMon=MONS.find(m=>m.id===baseId);
    if(!baseMon){toast("진화 불가 몬스터","var(--red)");return;}
    if(baseMon.rarity==="LEGEND"||baseMon.rarity==="BOSS"){toast("해당 등급은 속성 진화 불가!","var(--red)");return;}
    const t=TYPES[type];
    const bonus=t.bonus||{};
    const newMon={...c,id:`${baseId}_T_${type}`,name:`${t.emoji}${baseMon.name}`,
      monType:type,baseId,maxHp:Math.floor((baseMon.hp+(c.lv-1)*5)*(1+(bonus.hp||0))),
      hp:Math.floor((baseMon.hp+(c.lv-1)*5)*(1+(bonus.hp||0))),
      curHp:Math.floor((baseMon.hp+(c.lv-1)*5)*(1+(bonus.hp||0))),
      atkBonus:bonus.atk||0,spdBonus:bonus.spd||0,alive:true};
    setMy(s=>{
      let ns=addItem(s,stoneId,-1);
      const nc=(ns.collection||[]).map((ci,i)=>i===idx?newMon:ci);
      const typeEvoId=`${baseId}_T_${type}`;
      const newDex=(ns.dexSeen||[]).includes(typeEvoId)?ns.dexSeen:[...(ns.dexSeen||[]),typeEvoId];
      return addTamerExp({...ns,collection:nc,dexSeen:newDex},20);
    });
    toast(`${t.emoji} ${baseMon.name} → ${t.name} 속성 진화!`,"var(--purple)");
  };

  const claimAchReward=(id)=>{
    const a=ACHS.find(x=>x.id===id);if(!a||!a.reward)return;
    setMy(s=>{
      let ns={...s,achClaimed:[...(s.achClaimed||[]),id]};
      Object.entries(a.reward).forEach(([rid,amt])=>{ns=addItem(ns,rid,amt);});
      return ns;
    });
    toast(`🎁 ${a.name} 보상 수령!`,"var(--gold)");
  };

  const fuse=()=>{
    if(fa===null||fb===null||fa===fb){toast("두 마리 선택!","var(--red)");return;}
    const col=myS.collection||[];
    const a=col[fa],b=col[fb];if(!a||!b)return;
    const bmA=MONS.find(m=>m.id===a.id)||{rarity:"COMMON"};
    const bmB=MONS.find(m=>m.id===b.id)||{rarity:"COMMON"};
    const isMutA=bmA.rarity==="MUTANT",isMutB=bmB.rarity==="MUTANT";
    if(!isMutA&&!isMutB&&bmA.rarity!==bmB.rarity){toast("같은 등급끼리만! (또는 MUTANT 포함)","var(--red)");return;}
    if(isMutA&&isMutB){toast("MUTANT끼리는 합성 불가!","var(--red)");return;}
    if(bmA.rarity==="LEGEND"||bmB.rarity==="LEGEND"){toast("LEGEND는 합성 불가!","var(--red)");return;}
    if(bmA.rarity==="BOSS"||bmB.rarity==="BOSS"){toast("BOSS는 합성 불가!","var(--red)");return;}
    if((a.enhance||0)<MAX_ENHANCE||(b.enhance||0)<MAX_ENHANCE){toast("두 소환수 모두 +10강 필요!","var(--red)");return;}
    const useCrystal=(myS.bossItems?.boss_crystal||0)>0;
    const resultGrade=rollFusion(bmA.rarity,bmB.rarity,useCrystal);
    setFusRes(null);setFusAnim(null);
    if(!resultGrade){
      // 대실패: 양쪽 등급에서 많이 차이날수록, 또는 확률상 최악
      const isBust=Math.random()<0.3;
      setFusAnim(isBust?"bust":"fail");
      setTimeout(()=>setFusAnim(null),2200);
      toast("💥 합성 실패! B 소환수 소멸","var(--red)");
      setMy(s=>{
        const idxAdj=fb>fa?fb:fb;
        const nc=(s.collection||[]).filter((_,i)=>i!==idxAdj);
        return addTamerExp({...s,collection:nc},5);
      });
      setFa(null);setFb(null);return;
    }
    const pool=FUSION_POOL[resultGrade];
    if(!pool||!pool.length){toast("합성 결과 없음","var(--red)");return;}
    const resultId=pool[Math.floor(Math.random()*pool.length)];
    const res=MONS.find(m=>m.id===resultId);if(!res)return;
    // 결과 등급에 따른 애니 결정
    const gradeIdx=GRADE_ORDER.indexOf(resultGrade);
    const inputIdx=GRADE_ORDER.indexOf(bmA.rarity);
    const isGreat=gradeIdx>=inputIdx+2||(resultGrade==="LEGEND");
    setFusAnim(isGreat?"great":"success");
    setTimeout(()=>setFusAnim(null),2200);
    if(useCrystal)setMy(s=>({...s,bossItems:{...s.bossItems,boss_crystal:Math.max(0,(s.bossItems.boss_crystal||1)-1)}}));
    setMy(s=>{
      const sortedRemove=[fa,fb].sort((a,b)=>b-a);
      let nc=[...(s.collection||[])];
      sortedRemove.forEach(ri=>nc.splice(ri,1));
      // 등급별 합성 보너스 스탯 (랜덤)
      const fusionBonusTable={
        "RARE":{atk:[1,2],hp:[1,2]},
        "UNIQUE":{atk:[1,3],hp:[1,3]},
        "SUPER":{atk:[1,3],hp:[1,3]},
        "EPIC":{atk:[2,4],hp:[2,4]},
        "LEGEND":{atk:[2,4],hp:[2,4]},
      };
      const fbt=fusionBonusTable[resultGrade]||{atk:[1,2],hp:[1,2]};
      const rndRange=(r)=>r[0]+Math.floor(Math.random()*(r[1]-r[0]+1));
      const fusionBonus={atk:rndRange(fbt.atk),hp:rndRange(fbt.hp)};
      nc.push({id:res.id,lv:1,exp:0,maxHp:res.hp+fusionBonus.hp,hp:res.hp+fusionBonus.hp,curHp:res.hp+fusionBonus.hp,alive:true,enhance:0,fusionBonus});
      return addTamerExp({...s,collection:nc,totalFusions:(s.totalFusions||0)+1},40);
    });
    setFusRes({res,grade:resultGrade,bonus:fusionBonus});setFa(null);setFb(null);
    toast(`🔮 ${res.name} [${resultGrade}] 합성!`,"var(--purple)");
  };

  const useStaminaPot=()=>{
    if((myS.consumables?.stamina_pot||0)<=0){toast("스태미나포션 없음!","var(--red)");return;}
    setMy(s=>{const ns=Math.min(s.maxStamina||10,(s.stamina||0)+5);
      return{...s,stamina:ns,consumables:{...s.consumables,stamina_pot:Math.max(0,(s.consumables.stamina_pot||1)-1)}};});
    toast("⚡ 스태미나 +5!","var(--cyan)");
  };

  const runDungeon=(dg,times=1)=>{
    if(!unlocks.dungeons.includes(dg.id)){toast("테이머 레벨업 필요!","var(--red)");return;}
    const maxRuns=times===-1?Math.floor((myS.stamina||0)/dg.stamina):times; // -1=일괄
    const actualRuns=Math.max(1,Math.min(maxRuns,Math.floor((myS.stamina||0)/dg.stamina)));
    if(actualRuns<=0||(myS.stamina||0)<dg.stamina){toast("스태미나 부족!","var(--red)");return;}
    const eligible=(myS.collection||[]).filter(c=>c.alive!==false);
    if(eligible.length===0){toast("소환수가 없어요!","var(--red)");return;}
    const picked=eligible[Math.floor(Math.random()*eligible.length)];
    setDgExploring({dg,mon:picked,runs:actualRuns});
    setDgRes(null);
    const delay=actualRuns===1?2200:Math.min(2200,800+actualRuns*200);
    setTimeout(()=>{
      // actualRuns 횟수만큼 드롭 누적
      const totalDrops={};
      for(let r=0;r<actualRuns;r++){
        dg.drops.forEach(d=>{if(Math.random()<d.rate)totalDrops[d.id]=(totalDrops[d.id]||0)+d.amt;});
      }
      setMy(s=>{
        let ns={...s,
          stamina:Math.max(0,(s.stamina||0)-dg.stamina*actualRuns),
          totalDungeons:(s.totalDungeons||0)+actualRuns,
          lastStaminaRefill:s.lastStaminaRefill||Date.now()};
        Object.entries(totalDrops).forEach(([id,amt])=>{
          if(id==="TYPE_STONE_RANDOM"){
            const typeKeys=Object.keys(TYPES);
            const rndType=typeKeys[Math.floor(Math.random()*typeKeys.length)];
            ns=addItem(ns,`tstone_${rndType}`,amt);
          }else{ns=addItem(ns,id,amt);}
        });
        return addTamerExp(ns,30*actualRuns);
      });
      const dt=Object.entries(totalDrops).filter(([id])=>id!=="TYPE_STONE_RANDOM")
        .map(([id,amt])=>{const it=[...FOODS,...EVO_STONES,{id:"enhance_stone",emoji:"🔩"}].find(i=>i.id===id);return it?`${it.emoji}×${amt}`:""})
        .filter(Boolean).join(" ")||"없음";
      setDgExploring(null);
      setDgRes({dt,dg,runs:actualRuns});
      toast(`🏰 ${dg.name} ×${actualRuns}회! ${dt}`,"var(--green)");
    },delay);
  };

  const buyShop=(item)=>{
    const canBuy=Object.entries(item.cost).every(([id,amt])=>getItemAmt(id)>=amt);
    if(!canBuy){toast("재료 부족!","var(--red)");return;}
    // 일일 제한 체크
    const today=new Date().toDateString();
    if(item.dailyLimit){
      const sdd=myS.shopDailyDate===today?myS.shopDaily||{}:{};
      const bought=sdd[item.id]||0;
      if(bought>=item.dailyLimit){toast(`오늘 구매 한도 초과! (${item.dailyLimit}회/일)`,"var(--red)");return;}
    }
    setMy(s=>{
      const today2=new Date().toDateString();
      const sdd2=s.shopDailyDate===today2?s.shopDaily||{}:{};
      let ns={...s,totalShops:(s.totalShops||0)+1,
        shopDailyDate:today2,
        shopDaily:{...sdd2,[item.id]:(sdd2[item.id]||0)+1}};
      Object.entries(item.cost).forEach(([id,amt])=>{ns=addItem(ns,id,-amt);});
      Object.entries(item.give).forEach(([id,amt])=>{ns=addItem(ns,id,amt);});
      return ns;
    });
    toast(`✅ ${item.name} 교환!`,"var(--green)");
  };

  const claimMonthly=(day)=>{

    const reward=MONTHLY_REWARDS.find(r=>r.day===day);if(!reward)return;
    setMy(s=>{
      let ns={...s,monthlyClaimedDays:[...(s.monthlyClaimedDays||[]),day],monthlyDays:(s.monthlyDays||0)+1};
      reward.items.forEach(({id,amt})=>{ns=addItem(ns,id,amt);});
      return addTamerExp(ns,50);

    toast(`🎁 ${day}일 출석! ${reward.label}`,"var(--gold)");
  };

  const startBossFight=(bossId,pickedIdx)=>{
    const bm=MONS.find(m=>m.id===bossId);if(!bm)return;
    const lv=Math.max(5,tLv);
    const boss={...bm,lv,maxHp:bm.hp+(lv-1)*8,curHp:bm.hp+(lv-1)*8,atk:bm.atk+(lv-1)*3};

    setBossFight({bossId,boss,myMon,myIdx:pickedIdx,over:false,winner:null});
    setBossLog([`🌋 보스 ${boss.emoji}${boss.name} 출현!`]);
    setWild(null);setWildFixed(false);setCr(null);
  };

  const attackBoss=()=>{
    if(!bossFight||bossFight.over)return;
    const{boss,myMon}=bossFight;
    const myType=myMon.monType||(MON_BASE_TYPE[myMon.baseId||myMon.id]);
    const bossType=MON_BASE_TYPE[bossFight.bossId]||"fire";
    const bMult=getTypeMult(myType,bossType);
    const myAtkStat=Math.floor((myMon.atk+(myMon.lv-1)*2)*(1+(myMon.atkBonus||0)));
    const dmg=Math.max(1,Math.round((myAtkStat+Math.floor(Math.random()*8)-3)*bMult));
    const bDmg=Math.max(1,boss.atk+Math.floor(Math.random()*6)-2);
    const newBossHp=Math.max(0,boss.curHp-dmg);
    const newMyHp=Math.max(0,myMon.curHp-bDmg);
    const typeMsg=bMult>1?"⚡효과적!":bMult<1?"💤비효과적...":"";
    if(newBossHp<=0){
      const drops=BOSS_DROPS[bossFight.bossId]||{};
      const got={};
      if(Math.random()<(drops.crystal||0))got.boss_crystal=1;
      if(Math.random()<(drops.shard||0))got.ancient_shard=1;
      if(Math.random()<(drops.eye||0))got.boss_eye=1;
      if(Math.random()<(drops.trophy||0))got.trophy=1;
      let gotTypeStone=null;
      if(Math.random()<(drops.type_stone||0)){
        const typeKeys=Object.keys(TYPES);
        gotTypeStone=typeKeys[Math.floor(Math.random()*typeKeys.length)];
      }
      // 장비 드롭: 해당 보스 전용 장비 중 랜덤 1개, 30% 확률
      let gotEquip=null;
      const equipPool=drops.equip||[];
      if(equipPool.length>0&&Math.random()<0.30){
        gotEquip=equipPool[Math.floor(Math.random()*equipPool.length)];
      }
      setBossFight(bf=>({...bf,boss:{...bf.boss,curHp:0},over:true,winner:"player"}));
      setBossLog(l=>[...l,`${myMon.emoji}→${boss.emoji} ${dmg}dmg ${typeMsg}`,`🏆 보스 토벌!`]);
      setMy(s=>{
        let ns={...s};
        const nb={...s.bossItems};
        Object.entries(got).forEach(([k,v])=>nb[k]=(nb[k]||0)+v);
        ns={...ns,bossItems:nb};
        if(gotTypeStone)ns=addItem(ns,`tstone_${gotTypeStone}`,1);
        if(gotEquip)ns={...ns,equips:{...(ns.equips||{}),[gotEquip]:true}};
        const bk={...(ns.bossKills||{}),[bossFight.bossId]:(ns.bossKills?.[bossFight.bossId]||0)+1};
        return addTamerExp({...ns,bossKills:bk},100);
      });
      const tsInfo=gotTypeStone?TYPES[gotTypeStone]:null;
      const eqInfo=gotEquip?BOSS_EQUIPS.find(e=>e.id===gotEquip):null;
      const dt=[...Object.entries(got).map(([k,v])=>{const it=BOSS_ITEMS.find(i=>i.id===k);return it?`${it.emoji}×${v}`:""}),
        tsInfo?`${tsInfo.emoji}×1`:"",
        eqInfo?`${eqInfo.emoji}${eqInfo.name}`:""
      ].filter(Boolean).join(" ")||"없음";
      toast(`🏆 보스 토벌! ${dt}`,"var(--gold)");
    }else if(newMyHp<=0){
      setBossFight(bf=>({...bf,boss:{...bf.boss,curHp:newBossHp},myMon:{...bf.myMon,curHp:0},over:true,winner:"boss"}));
      setBossLog(l=>[...l,`${myMon.emoji}→${boss.emoji} ${dmg}dmg`,`${boss.emoji}→${myMon.emoji} ${bDmg}dmg`,`😵 패배...`]);
      setMy(s=>({...s,losses:(s.losses||0)+1,collection:(s.collection||[]).map((c,i)=>i===bossFight.myIdx?{...c,alive:false,curHp:0}:c)}));
      toast("😵 보스에게 패배!","var(--red)");

      setBossFight(bf=>({...bf,boss:{...bf.boss,curHp:newBossHp},myMon:{...bf.myMon,curHp:newMyHp}}));
      setBossLog(l=>[...l,`${myMon.emoji}→${boss.emoji} ${dmg}dmg ${typeMsg}`,`${boss.emoji}→${myMon.emoji} ${bDmg}dmg`]);
    }
  };

  const SIDE_TABS_TOP=[["tamer","🏅","테이머"],["dungeon","🏰","던전"],["monthly","📅","출석"],["raid","⚔️","레이드"],["breed","🥚","교배"]];
  const SIDE_TABS_BOT=[["dex","📖","도감"],["ach","🏆","업적"],["stonelab","💎","진화석"],["help","❓","도움말"],["prob","📊","확률표"]];

  return <div className="app-outer">

      <div style={{width:"100%",background:"white",borderRadius:"24px 24px 0 0",
        padding:"16px 14px 36px",boxShadow:"0 -8px 32px rgba(139,92,246,0.18)"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{width:40,height:4,borderRadius:2,background:"rgba(139,92,246,0.2)",margin:"0 auto 12px"}}/>
        <div style={{fontSize:17,fontWeight:800,color:"var(--purple)",marginBottom:10,textAlign:"center"}}>MENU</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {MENU_TABS.map(([k,icon,name])=>(
            <button key={k} onClick={()=>{setTab(k);setMenuOpen(false);resetB();}} style={{
              padding:"12px 0 10px",borderRadius:14,

        </div>

    </div>}

    {/* 방생 확인 모달 */}

    <div style={{flexShrink:0,display:"flex",borderBottom:"1.5px solid rgba(139,92,246,0.08)",

          flex:"0 0 auto",padding:"8px 10px 5px",border:"none",

      {!isBossWild&&wild?.rarity!=="DIVINE"&&<>
        <div style={{display:"flex",gap:8,padding:"10px 14px 4px"}}>

                      color:isOn?info.color:have>0?info.color:"var(--tx3)",fontWeight:isOn?700:400}}>

                <div style={{fontSize:17,fontWeight:700,color:"var(--tx1)"}}>{item.name}{locked?" (잠금)":""}</div>

      const shopCats=[
        {cat:"볼",label:"🎯 볼 교환",color:"#3b82f6"},

function DivineEncounter({phase}){
  if(!phase)return null;
  const particles=[...Array(16)].map((_,i)=>({
    dx:`${Math.cos(i/16*Math.PI*2)*220}px`,
    dy:`${Math.sin(i/16*Math.PI*2)*220}px`,
    emoji:i%4===0?"🍊":i%4===1?"✨":i%4===2?"🌟":"💫",
    delay:`${i*0.08}s`,
  }));
  return <div style={{
    position:"fixed",inset:0,zIndex:9999,
    background:phase===3?"rgba(0,0,0,0)":"rgba(0,0,0,0.88)",
    display:"flex",alignItems:"center",justifyContent:"center",
    flexDirection:"column",gap:0,
    transition:"background 1s ease",
    pointerEvents:"all",
    overflow:"hidden",
  }}>
    {/* 방사형 빛 */}
    {phase>=1&&[...Array(12)].map((_,i)=>(
      <div key={i} style={{
        position:"absolute",
        top:"50%",left:"50%",
        width:4,height:"60vh",
        background:"linear-gradient(to bottom,#ff6600,transparent)",
        transform:`translate(-50%,-100%) rotate(${i*30}deg)`,
        transformOrigin:"bottom center",
        opacity:phase===2?0.35:0.15,
        transition:"opacity 0.8s",
        animation:"youngsooRay 2.5s ease-in-out infinite",
        animationDelay:`${i*0.15}s`,
      }}/>
    ))}

    {/* 파티클 */}
    {phase===2&&particles.map((p,i)=>(
      <div key={i} style={{
        position:"absolute",top:"50%",left:"50%",
        fontSize:22,
        "--pdx":p.dx,"--pdy":p.dy,
        animation:"youngsooParticle 2s ease-out infinite",
        animationDelay:p.delay,
      }}>{p.emoji}</div>
    ))}

    {/* 메인 오렌지 */}
    {phase>=1&&<div style={{
      fontSize:phase===2?140:80,
      filter:"drop-shadow(0 0 40px #ff6600) drop-shadow(0 0 80px #ff4400)",
      animation:phase===1?"youngsooAppear 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards":
               phase===2?"youngsooFloat 2s ease-in-out infinite":
               "youngsooAppear 0.5s ease-in reverse forwards",
      transition:"font-size 0.5s",
      marginBottom:16,
    }}>🍊</div>}

    {/* 이름 + 텍스트 */}
    {phase===2&&<>
      <div style={{
        fontSize:36,fontWeight:900,color:"#ff6600",
        textShadow:"0 0 30px #ff6600,0 0 60px #ff4400,0 2px 8px rgba(0,0,0,0.8)",
        letterSpacing:6,
        animation:"youngsooText 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards",
        fontFamily:"inherit",
      }}>???</div>
      <div style={{
        fontSize:14,color:"rgba(255,180,80,0.9)",marginTop:10,
        fontWeight:700,letterSpacing:2,
        animation:"youngsooText 0.8s 0.2s both",
        fontFamily:"inherit",
      }}>전설의 오렌지가 나타났다!</div>
      <div style={{
        marginTop:20,padding:"8px 20px",
        background:"rgba(255,102,0,0.15)",
        border:"1px solid rgba(255,102,0,0.4)",
        borderRadius:20,
        fontSize:11,color:"rgba(255,180,80,0.7)",
        fontFamily:"inherit",
        animation:"youngsooText 0.8s 0.5s both",
      }}>포획 불가 · 도감 등록 · 아이템 획득</div>
      {/* 흔들리는 파티클 링 */}
      {[...Array(8)].map((_,i)=>(
        <div key={i} style={{
          position:"absolute",
          top:`calc(50% + ${Math.sin(i/8*Math.PI*2)*160}px)`,
          left:`calc(50% + ${Math.cos(i/8*Math.PI*2)*160}px)`,
          fontSize:20,
          animation:`youngsooFloat ${1.4+i*0.15}s ease-in-out infinite`,
          animationDelay:`${i*0.18}s`,
        }}>🍊</div>
      ))}
    </>}

    {/* 획득 알림 */}
    {phase===3&&<div style={{
      fontSize:18,fontWeight:800,color:"#ff6600",
      textShadow:"0 0 20px #ff6600",
      animation:"youngsooText 0.6s ease-out",
      fontFamily:"inherit",
    }}>🍊 오렌지의 가호 획득!</div>}
  </div>;
}

      borderRadius:10,padding:"7px 10px",height:70,overflowY:"auto",fontSize:16,

      {log.map((l,i)=><div key={i} style={{color:l.includes("토벌")||l.includes("승리")?"var(--green)":l.includes("패배")?"var(--red)":"var(--tx2)"}}>{l}</div>)}
    </div>
    {!bf.over
      ?<Btn onClick={attackBoss} color="var(--red)">⚔ 공격!</Btn>
      :<Btn onClick={onEnd} color="var(--purple)" outline>← 돌아가기</Btn>
    }
  </div>;
}


function BV({bs,log,lr,ac,attack,resetB}){
  const [atkFlash,setAtkFlash]=React.useState(null);
  const [showEffect,setShowEffect]=React.useState(null);
  const [bframe,setBframe]=React.useState(0);
  React.useEffect(()=>{const id=setInterval(()=>setBframe(f=>f+1),300);return()=>clearInterval(id);},[]);

  const handleAtk=()=>{
    const turn=bs.turn;
    setAtkFlash(turn);
    const m=bs[turn];
    const mType=m.monType||(MON_BASE_TYPE[m.baseId||m.id]);
    if(mType)setShowEffect({type:mType,side:turn});
    setTimeout(()=>{setAtkFlash(null);setShowEffect(null);},600);
    attack();
  };

  const m1=bs.m1, m2=bs.m2;
  const m1Type=m1.monType||(MON_BASE_TYPE[m1.baseId||m1.id]);
  const m2Type=m2.monType||(MON_BASE_TYPE[m2.baseId||m2.id]);
  const m1Info=m1Type?TYPES[m1Type]:null;
  const m2Info=m2Type?TYPES[m2Type]:null;
  const fh=220;

  return <div>
    {/* ── 배틀 필드 ── */}
    <div style={{position:"relative",borderRadius:16,overflow:"hidden",marginBottom:10,boxShadow:"var(--shadow-lg)"}}>
      <svg width="100%" height={fh} viewBox={`0 0 600 ${fh}`} style={{display:"block"}}>
        <defs>
          <linearGradient id="bsky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#1e1b4b"/><stop offset="100%" stopColor="#312e81"/>
          </linearGradient>
        </defs>
        {/* 배틀 배경 */}
        <rect width={600} height={fh} fill="url(#bsky)"/>
        {/* 별 */}
        {[[40,15],[120,8],[220,22],[340,10],[460,18],[550,8],[80,45],[300,38]].map(([sx,sy],i)=>(
          <circle key={i} cx={sx} cy={sy} r={i%2===0?1.5:1} fill="white" opacity={0.6+i%3*0.1}/>
        ))}
        {/* 달 */}
        <circle cx={520} cy={35} r={22} fill="#fffde7" opacity={0.9}/>
        <circle cx={530} cy={28} r={18} fill="#312e81"/>
        {/* 지면 */}
        <rect x={0} y={fh*0.68} width={600} height={fh*0.32} fill="#1e3a1e"/>
        <rect x={0} y={fh*0.68} width={600} height={6} fill="#2d6a2d"/>
        {/* 아군 플랫폼 */}
        <ellipse cx={130} cy={fh*0.72} rx={55} ry={10} fill="#4ade80" opacity={0.25}/>
        {/* 적 플랫폼 */}
        <ellipse cx={470} cy={fh*0.72} rx={55} ry={10} fill="#f87171" opacity={0.25}/>
        {/* 아군 속성 이펙트 */}
        {showEffect?.side==="m1"&&m1Info&&<TypeEffect type={m1Type} x={130} y={fh*0.45} active={true}/>}
        {/* 적 속성 이펙트 */}
        {showEffect?.side==="m2"&&m2Info&&<TypeEffect type={m2Type} x={470} y={fh*0.45} active={true}/>}
        {/* 아군 몬스터 */}
        <g transform={`translate(0,${Math.sin(bframe*0.8)*2})`}
           style={{animation:atkFlash==="m1"?"monHit 0.4s ease-out":undefined}}>
          <circle cx={130} cy={fh*0.5} r={50} fill={m1Info?.color||"#6366f1"} opacity={0.08}/>
          <text x={130} y={fh*0.62} textAnchor="middle" fontSize={62}>{m1.emoji}</text>
          {m1Info&&<>
            <rect x={90} y={fh*0.67} width={80} height={14} rx={7} fill={m1Info.color} opacity={0.9}/>
            <text x={130} y={fh*0.677} textAnchor="middle" fontSize={9} fill="white" fontWeight="bold">{m1Info.emoji}{m1Info.name}</text>
          </>}
        </g>
        {/* 적 몬스터 (좌우 반전) */}
        <g transform={`translate(600,${Math.sin(bframe*0.8+1.5)*2}) scale(-1,1)`}
           style={{animation:atkFlash==="m2"?"monHit 0.4s ease-out":undefined}}>
          <circle cx={130} cy={fh*0.5} r={50} fill={m2Info?.color||"#ef4444"} opacity={0.08}/>
          <text x={130} y={fh*0.62} textAnchor="middle" fontSize={62}>{m2.emoji}</text>
          {m2Info&&<>
            <rect x={90} y={fh*0.67} width={80} height={14} rx={7} fill={m2Info.color} opacity={0.9}/>
            <text x={130} y={fh*0.677} textAnchor="middle" fontSize={9} fill="white" fontWeight="bold">{m2Info.emoji}{m2Info.name}</text>
          </>}
        </g>
        {/* VS 텍스트 */}
        {!bs.over&&<>
          <text x={300} y={fh*0.45} textAnchor="middle" fontSize={20} fontWeight="900" fill="white" opacity={0.4}>VS</text>
          {/* 턴 표시 */}
          <rect x={240} y={fh*0.52} width={120} height={18} rx={9} fill="rgba(255,255,255,0.12)"/>
          <text x={300} y={fh*0.535} textAnchor="middle" fontSize={10} fill="white" opacity={0.9}>
            {bs.turn==="m1"?"🟢 내 차례":"🔴 상대 차례"}
          </text>
        </>}
        {/* 승리 패배 오버레이 */}
        {bs.over&&<>
          <rect x={150} y={fh*0.35} width={300} height={60} rx={20} fill={bs.winner==="m1"?"rgba(74,222,128,0.95)":"rgba(248,113,113,0.95)"}/>
          <text x={300} y={fh*0.52} textAnchor="middle" fontSize={22} fontWeight="900" fill="white">
            {bs.winner==="m1"?"🏆 승리!":"😵 패배..."}
          </text>
        </>}
      </svg>
    </div>

    {/* ── HP 바 + 속성 정보 ── */}
    <div style={{display:"flex",gap:8,marginBottom:8}}>
      {[{k:"m1",m:m1,mType:m1Type,mInfo:m1Info,c:ac,label:"나"},{k:"m2",m:m2,mType:m2Type,mInfo:m2Info,c:"var(--red)",label:"상대"}].map(({k,m,mType,mInfo,c,label})=>{
        // 상성 계산
        const vsType=k==="m1"?m2Type:m1Type;
        const mult=getTypeMult(mType,vsType);
        const multLabel=mult>1?"⚡유리":mult<1?"💤불리":null;
        const multColor=mult>1?"var(--green)":mult<1?"var(--red)":null;
        return <div key={k} style={{flex:1,padding:"8px 10px",borderRadius:12,background:"white",
          border:`1.5px solid ${c}30`,boxShadow:atkFlash===k?`0 0 16px ${c}55`:"var(--shadow)",
          transition:"box-shadow 0.2s"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
            <div style={{fontSize:13,fontWeight:700,color:c}}>{label} {m.emoji}{m.name}</div>
            {multLabel&&<span style={{fontSize:11,fontWeight:800,color:multColor,
              background:`${multColor}15`,padding:"1px 6px",borderRadius:8}}>{multLabel}</span>}
          </div>
          {mInfo&&<div style={{fontSize:11,color:mInfo.color,fontWeight:700,marginBottom:3}}>
            {mInfo.emoji} {mInfo.name}속성
          </div>}
          {/* 스탯 */}
          <div style={{display:"flex",gap:3,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:10,fontWeight:700,color:"#ef4444",background:"rgba(239,68,68,0.08)",padding:"1px 5px",borderRadius:5}}>❤️{m.maxHp}</span>
            <span style={{fontSize:10,fontWeight:700,color:"#f97316",background:"rgba(249,115,22,0.08)",padding:"1px 5px",borderRadius:5}}>⚔️{Math.floor(m.atk*(1+(m.atkBonus||0))*(1+getEnhanceBonus(m.enhance||0).atkPct/100))+(m.fusionBonus?.atk||0)}</span>
            {(m.enhance||0)>0&&<span style={{fontSize:10,fontWeight:700,color:"#3b82f6",background:"rgba(59,130,246,0.08)",padding:"1px 5px",borderRadius:5}}>🛡️+{(m.enhance||0)*3}%</span>}
          </div>
          <HpBar cur={Math.max(0,m.curHp)} max={m.maxHp}/>
          <div style={{fontSize:12,color:"var(--tx3)",marginTop:2,textAlign:"right"}}>{Math.max(0,m.curHp)}/{m.maxHp}</div>
        </div>;
      })}
    </div>

    {/* ── 배틀 로그 ── */}
    <div ref={lr} style={{background:"rgba(30,27,75,0.06)",border:"1px solid rgba(139,92,246,0.12)",
      borderRadius:12,padding:"8px 10px",height:80,overflowY:"auto",
      fontSize:17,marginBottom:10,color:"var(--tx2)",lineHeight:1.9}}>
      {log.map((l,i)=><div key={i} style={{color:l.includes("승리")||l.includes("성공")?"var(--green)":l.includes("패배")||l.includes("실패")?"var(--red)":"var(--tx2)"}}>{l}</div>)}
    </div>

    {/* ── 버튼 ── */}
    {!bs.over
      ?<Btn onClick={handleAtk} color={ac}>⚔ 공격!</Btn>
      :<Btn onClick={resetB} color="var(--purple)" outline>← 돌아가기</Btn>
    }
  </div>;
}

    {RAID_BOSSES.filter(b=>(myS.equips||{})[b.id+"_set"]).map(b=>(
      <div key={b.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:10,

          <span key={label} style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:`${c}15`,color:c,border:`1px solid ${c}30`,fontWeight:700}}>{label}</span>
        ))}

      {BOSS_EQUIPS.map(eq=>{

        const on=(myS.equipsOn||{})[eq.slot];

          <div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:"var(--tx1)"}}>{eq.name}</div><div style={{fontSize:10,color:"var(--tx3)"}}>{eq.desc}</div></div>

}

// ── 월간 출석 ──
function SideMonthly({myS,todayDay,claimMonthly}){
  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:4}}>📅 월간 출석</div>
    <div style={{fontSize:10,color:"var(--tx3)",marginBottom:8,padding:"5px 8px",
      background:"rgba(245,158,11,0.05)",borderRadius:8,border:"1px solid rgba(245,158,11,0.15)"}}>
      오늘 {todayDay}일 · 출석 {myS.monthlyDays||0}일 · <span style={{color:"var(--red)"}}>당일만 수령</span>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:3}}>
      {MONTHLY_REWARDS.map(r=>{
        const claimed=(myS.monthlyClaimedDays||[]).includes(r.day);
        const isToday=r.day===todayDay;
        const canClaim=isToday&&!claimed;
        const isPast=r.day<todayDay&&!claimed;
        const isSpecial=r.label.includes("⭐")||r.label.includes("👑");
        return <div key={r.day} onClick={()=>canClaim&&claimMonthly(r.day)} style={{
          borderRadius:8,padding:"5px 3px",textAlign:"center",cursor:canClaim?"pointer":"default",
          border:`1.5px solid ${claimed?"rgba(245,158,11,0.3)":canClaim?"rgba(245,158,11,0.8)":isPast?"rgba(239,68,68,0.25)":"rgba(0,0,0,0.06)"}`,
          background:claimed?"rgba(245,158,11,0.08)":canClaim?"rgba(245,158,11,0.12)":isPast?"rgba(239,68,68,0.04)":"rgba(0,0,0,0.02)",
          opacity:r.day>todayDay?0.35:1,position:"relative",
          boxShadow:canClaim?"0 0 0 2px rgba(245,158,11,0.4)":undefined}}>
          {isSpecial&&!claimed&&<div style={{position:"absolute",top:-3,right:-3,fontSize:9}}>⭐</div>}
          <div style={{fontSize:10,color:claimed?"var(--gold)":canClaim?"var(--gold)":isPast?"var(--red)":"var(--tx3)",fontWeight:700}}>{r.day}일</div>
          <div style={{fontSize:10,margin:"1px 0"}}>{claimed?"✅":canClaim?"🎁":isPast?"❌":"🔒"}</div>
          <div style={{fontSize:6,color:"var(--tx3)",lineHeight:1.2}}>{r.label.split(" ")[0]}</div>
        </div>;})}
    </div>
  </div>;
}

// ── 던전 ──

        ⚡포션({myS.consumables?.stamina_pot||0})</button>}

        <rect width={300} height={70} fill="#1c1917"/>
        <ellipse cx={150} cy={45} rx={90} ry={30} fill="#f59e0b" opacity={0.1}/>
        <g style={{animation:"dungeonRun 2.2s linear forwards"}}>
          <text x={25} y={55} textAnchor="middle" fontSize={26}>{dgExploring.mon?.emoji||"❓"}</text>

    </div>}
    {dgRes&&!dgExploring&&<div style={{borderRadius:9,padding:"7px 9px",marginBottom:7,
      background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.2)"}}>
      <div style={{fontSize:11,fontWeight:700,color:"var(--green)"}}>✅ {dgRes.dg.name} 클리어!</div>
      <div style={{fontSize:10,color:"var(--tx2)",marginTop:1}}>{dgRes.dt||"드롭 없음"}</div>
      <button onClick={()=>setDgRes(null)} style={{marginTop:4,fontSize:10,padding:"2px 7px",borderRadius:5,border:"none",background:"rgba(16,185,129,0.12)",color:"var(--green)",cursor:"pointer",fontFamily:"inherit"}}>닫기</button>

        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{fontSize:18}}>{locked?"🔒":dg.emoji}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--tx1)"}}>{dg.name} <span style={{color:"var(--gold)"}}>⚡{dg.stamina}</span></div>
            <div style={{fontSize:9,color:"var(--tx3)"}}>{dg.drops.map(d=>{const it=[...FOODS,...EVO_STONES,{id:"enhance_stone",emoji:"🔩"}].find(i=>i.id===d.id);return it?`${it.emoji}(${Math.round(d.rate*100)}%)`:""}).filter(Boolean).join(" ")}</div>
          </div>
          <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
            <button onClick={()=>!locked&&canEnter&&runDungeon(dg,1)} disabled={!canEnter}
              style={{padding:"3px 7px",borderRadius:6,border:"none",fontFamily:"inherit",
                background:canEnter?"var(--green)":"rgba(0,0,0,0.06)",
                color:canEnter?"white":"rgba(0,0,0,0.25)",fontSize:9,fontWeight:700,cursor:canEnter?"pointer":"default"}}>
              {locked?"🔒":canEnter?"1회":"부족"}
            </button>
            {canEnter&&[3,-1].map(n=>{
              const cnt=n===-1?Math.floor((myS.stamina||0)/dg.stamina):n;
              const ok2=(myS.stamina||0)>=dg.stamina*(n===-1?cnt:n)&&cnt>0;
              return <button key={n} onClick={()=>ok2&&runDungeon(dg,n)}
                style={{padding:"3px 6px",borderRadius:6,border:"none",fontFamily:"inherit",
                  background:ok2?"rgba(16,185,129,0.15)":"rgba(0,0,0,0.04)",
                  color:ok2?"var(--green)":"var(--tx3)",fontSize:9,fontWeight:700,cursor:ok2?"pointer":"default"}}>
                {n===-1?`전체(${cnt})`:n+"회"}
              </button>;
            })}
          </div>
        </div>
      </div>;
    })}
  </div>;
}

// ── 2인 레이드 ──
// 레이드 보스 정의
const RAID_BOSSES=[
  {id:"raid_dragon",name:"심연의 고룡",emoji:"🐲",color:"#7f0000",hp:800,atk:45,phases:[
    {hp:0.6,msg:"🔥 격노 돌입! ATK +30%",atkMult:1.3},
    {hp:0.3,msg:"💀 최후의 발악! ATK +60%",atkMult:1.6},
  ],rewards:{enhance_stone:30,stone3:1,food3:3,boss_crystal:1},
  setBonus:{atk:12,def:8,name:"고룡의 세트"}},
  {id:"raid_titan",name:"거신 콜로서스",emoji:"⛰️",color:"#37474f",hp:1000,atk:35,phases:[
    {hp:0.5,msg:"🪨 방어막 발동! DEF +50%",defMult:1.5},
    {hp:0.25,msg:"💥 분쇄 공격! ATK +50%",atkMult:1.5},
  ],rewards:{enhance_stone:25,stone2:2,food3:3,ancient_shard:1},
  setBonus:{atk:8,def:15,name:"거신의 세트"}},
  {id:"raid_void",name:"허공의 군주",emoji:"🌑",color:"#1a237e",hp:700,atk:55,phases:[
    {hp:0.5,msg:"🌀 차원 분열! 전원 피해!",aoe:true},
    {hp:0.2,msg:"💀 소멸 공격!",atkMult:2.0},
  ],rewards:{enhance_stone:20,stone3:2,food3:2,boss_eye:1},
  setBonus:{atk:15,def:5,name:"허공의 세트"}},
];

function SideRaid({myS,col,setMy,toast,aliveCols,acHex}){
  const [raidState,setRaidState]=React.useState(null); // null | {bossId,bossHp,phase,log,over,win}
  const [pickedIdx,setPickedIdx]=React.useState(null);

  const startRaid=(bossId)=>{
    if(pickedIdx===null){toast("소환수를 선택하세요!","var(--red)");return;}
    const boss=RAID_BOSSES.find(b=>b.id===bossId);
    if(!boss)return;
    setRaidState({bossId,bossHp:boss.hp,myHp:null,phase:0,log:[`⚔️ ${boss.emoji}${boss.name} 레이드 시작!`],over:false,win:false});
  };

  const attackRaid=()=>{
    if(!raidState||raidState.over||pickedIdx===null)return;
    const boss=RAID_BOSSES.find(b=>b.id===raidState.bossId);
    const c=aliveCols[pickedIdx];if(!c||!boss)return;
    const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{atk:10,hp:30};
    const myAtk=Math.floor((bm.atk+(c.lv||1)*2)*(1+(c.atkBonus||0))*(1+((c.enhance||0)*3)/100));
    // 페이즈 체크
    let curPhase=raidState.phase;
    const phaseInfo=boss.phases[curPhase];
    const atkMult=phaseInfo?.atkMult||1;
    const defMult=phaseInfo?.defMult||1;
    // 내 공격
    const myDmg=Math.max(1,Math.floor(myAtk*(0.8+Math.random()*0.4)/defMult));
    // 보스 반격
    const bDmg=Math.max(1,Math.floor(boss.atk*atkMult*(0.8+Math.random()*0.4)));
    const newBossHp=Math.max(0,raidState.bossHp-myDmg);
    const newLog=[...raidState.log,`⚔️ ${myDmg}dmg → 보스HP:${newBossHp}/${boss.hp}`,`💢 보스반격 ${bDmg}dmg`];
    // 페이즈 전환
    let newPhase=curPhase;
    const nextPhase=boss.phases[curPhase+1];
    if(nextPhase&&newBossHp/boss.hp<=nextPhase.hp){
      newPhase=curPhase+1;
      newLog.push(`⚠️ ${boss.phases[newPhase].msg}`);
    }
    if(newBossHp<=0){
      // 승리
      setMy(s=>{
        let ns={...s};
        Object.entries(boss.rewards).forEach(([id,amt])=>{ns=addItem(ns,id,amt);});
        // 세트 장비 획득
        ns={...ns,equips:{...(ns.equips||{}),[boss.id+"_set"]:true}};
        return addTamerExp(ns,150);
      });
      newLog.push(`🏆 레이드 클리어! 세트 장비 [${boss.setBonus.name}] 획득!`);
      setRaidState(s=>({...s,bossHp:0,phase:newPhase,log:newLog,over:true,win:true}));
    }else{
      setRaidState(s=>({...s,bossHp:newBossHp,phase:newPhase,log:newLog}));
    }
  };

  if(raidState){
    const boss=RAID_BOSSES.find(b=>b.id===raidState.bossId);
    const pct=Math.max(0,raidState.bossHp/boss.hp*100);
    return <div>
      <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:8}}>⚔️ 레이드 진행중</div>
      <div style={{textAlign:"center",fontSize:28,marginBottom:4}}>{boss.emoji}</div>
      <div style={{fontSize:11,fontWeight:700,color:boss.color,textAlign:"center",marginBottom:6}}>{boss.name}</div>
      <div style={{background:"rgba(0,0,0,0.08)",borderRadius:6,height:10,marginBottom:4,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:pct>50?"var(--green)":pct>25?"var(--gold)":"var(--red)",borderRadius:6,transition:"width 0.3s"}}/>
      </div>
      <div style={{fontSize:10,color:"var(--tx3)",textAlign:"right",marginBottom:8}}>{raidState.bossHp}/{boss.hp}</div>
      <div style={{maxHeight:90,overflowY:"auto",background:"rgba(0,0,0,0.04)",borderRadius:8,padding:"6px 8px",marginBottom:8,fontSize:9,lineHeight:1.6,color:"var(--tx2)"}}>
        {raidState.log.slice(-6).map((l,i)=><div key={i} style={{color:l.includes("🏆")?"var(--gold)":l.includes("⚠️")?"var(--red)":"var(--tx2)"}}>{l}</div>)}
      </div>
      {!raidState.over
        ?<button onClick={attackRaid} style={{width:"100%",padding:"8px 0",borderRadius:10,border:"none",background:`linear-gradient(135deg,${boss.color},${boss.color}cc)`,color:"white",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>⚔️ 공격!</button>
        :<div>
          {raidState.win&&<div style={{padding:"8px",borderRadius:9,background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",marginBottom:6,fontSize:10,color:"var(--gold)",textAlign:"center",fontWeight:700}}>
            🎁 {Object.entries(boss.rewards).map(([id,amt])=>{const it=[...CONSUMABLES,...EVO_STONES,...BOSS_ITEMS,...FOODS].find(x=>x.id===id)||{emoji:"📦"};return `${it.emoji}×${amt}`;}).join(" ")}
          </div>}
          <button onClick={()=>{setRaidState(null);setPickedIdx(null);}} style={{width:"100%",padding:"7px 0",borderRadius:9,border:"1px solid rgba(139,92,246,0.2)",background:"transparent",color:"var(--purple)",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>← 돌아가기</button>
        </div>
      }
    </div>;
  }

  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:4}}>⚔️ 2인 레이드</div>
    <div style={{fontSize:9,color:"var(--tx3)",marginBottom:8,padding:"5px 8px",background:"rgba(239,68,68,0.05)",borderRadius:7,border:"1px solid rgba(239,68,68,0.15)"}}>
      강력한 레이드 보스 도전! 클리어 시 <b>세트 장비</b> 획득
    </div>
    {/* 소환수 선택 */}
    <div style={{fontSize:10,fontWeight:700,color:"var(--tx2)",marginBottom:5}}>출전 소환수</div>
    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
      {aliveCols.map((c,i)=>{
        const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{emoji:"❓"};
        return <button key={i} onClick={()=>setPickedIdx(i)}
          style={{padding:"4px 6px",borderRadius:8,border:`1.5px solid ${pickedIdx===i?acHex:"rgba(0,0,0,0.1)"}`,
            background:pickedIdx===i?`${acHex}15`:"white",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
          {bm.emoji}<span style={{fontSize:8,color:"var(--tx3)",marginLeft:2}}>Lv{c.lv}</span>
        </button>;
      })}
    </div>
    {/* 레이드 보스 목록 */}
    {RAID_BOSSES.map(boss=>{
      const cleared=(myS.equips||{})[boss.id+"_set"];
      return <div key={boss.id} style={{border:`1.5px solid ${boss.color}30`,borderRadius:11,padding:"9px 11px",marginBottom:7,
        background:cleared?"rgba(245,158,11,0.04)":"white"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
          <span style={{fontSize:22}}>{boss.emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:800,color:boss.color}}>{boss.name}</div>
            <div style={{fontSize:9,color:"var(--tx3)"}}>HP:{boss.hp} · ATK:{boss.atk} · {boss.phases.length}페이즈</div>
          </div>
          {cleared&&<span style={{fontSize:9,color:"var(--gold)",fontWeight:700}}>✅클리어</span>}
        </div>
        <div style={{fontSize:9,color:"var(--tx3)",marginBottom:5}}>
          🎁 {Object.entries(boss.rewards).map(([id,amt])=>{const it=[...CONSUMABLES,...EVO_STONES,...BOSS_ITEMS,...FOODS].find(x=>x.id===id)||{emoji:"📦"};return `${it.emoji}×${amt}`;}).join(" ")}
          <span style={{color:"var(--gold)",marginLeft:4}}>+⚔️{boss.setBonus.name}</span>
        </div>
        <button onClick={()=>startRaid(boss.id)} style={{width:"100%",padding:"6px 0",borderRadius:8,border:"none",
          background:`linear-gradient(135deg,${boss.color},${boss.color}99)`,color:"white",
          fontSize:10,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
          ⚔️ 레이드 도전!
        </button>
      </div>;
    })}
  </div>;
}

// ── HYBRID 교배/육아 시스템 ──
// HYBRID 등급: 두 소환수 교배로 탄생, 부모 속성 혼합
function SideBreed({myS,col,setMy,toast,aliveCols,acHex}){
  const [parentA,setParentA]=React.useState(null);
  const [parentB,setParentB]=React.useState(null);
  const [egg,setEgg]=React.useState(null); // {monId,hatch:0,need:10,parentA,parentB}
  const [nurseCount,setNurseCount]=React.useState(0);

  // 알 품기 (먹이 소모)
  const nurseEgg=()=>{
    if(!egg||egg.hatch>=egg.need){toast("알이 없거나 이미 부화됨!","var(--red)");return;}
    if((myS.foods?.food1||0)<=0){toast("일반 먹이가 필요합니다!","var(--red)");return;}
    setMy(s=>({...s,foods:{...s.foods,food1:Math.max(0,(s.foods.food1||1)-1)}}));
    setEgg(e=>({...e,hatch:Math.min(e.need,e.hatch+1)}));
    setNurseCount(n=>n+1);
  };

  // 부화
  const hatchEgg=()=>{
    if(!egg||egg.hatch<egg.need){return;}
    const bmA=MONS.find(m=>m.id===egg.parentA)||{rarity:"COMMON"};
    const bmB=MONS.find(m=>m.id===egg.parentB)||{rarity:"COMMON"};
    // HYBRID 스탯: 부모 평균 + 보너스
    const gradeA=GRADE_ORDER.indexOf(bmA.rarity),gradeB=GRADE_ORDER.indexOf(bmB.rarity);
    const hybridGradeIdx=Math.min(GRADE_ORDER.length-3,Math.floor((gradeA+gradeB)/2)+1);
    const hybridRarity=GRADE_ORDER[hybridGradeIdx]||"RARE";
    // 부모 속성 혼합
    const typeA=MON_BASE_TYPE[egg.parentA]||null;
    const typeB=MON_BASE_TYPE[egg.parentB]||null;
    const hybridType=Math.random()<0.5?typeA:typeB;
    const tBonus=hybridType?TYPES[hybridType]?.bonus||{}:{};
    const baseHp=Math.floor(((bmA.hp||30)+(bmB.hp||30))/2*1.2*(1+(tBonus.hp||0)));
    const baseAtk=Math.floor(((bmA.atk||10)+(bmB.atk||10))/2*1.2*(1+(tBonus.atk||0)));
    const hybridMon={
      id:`hybrid_${egg.parentA}_${egg.parentB}_${Date.now()}`,
      name:`🧬${bmA.name.slice(0,3)}×${bmB.name.slice(0,3)}`,
      emoji:"🧬",rarity:hybridRarity,
      hp:baseHp,atk:baseAtk,
      lv:1,exp:0,maxHp:baseHp,curHp:baseHp,alive:true,enhance:0,
      monType:hybridType,atkBonus:tBonus.atk||0,
      isHybrid:true,parentA:egg.parentA,parentB:egg.parentB,
    };
    setMy(s=>{
      const nc=[...(s.collection||[]),hybridMon];
      return addTamerExp({...s,collection:nc},50);
    });
    toast(`🧬 HYBRID 탄생! [${hybridRarity}] ${hybridMon.name}`,"var(--purple)");
    setEgg(null);setParentA(null);setParentB(null);
  };

  // 교배 시작
  const startBreed=()=>{
    if(parentA===null||parentB===null||parentA===parentB){toast("다른 소환수 2마리 선택!","var(--red)");return;}
    const a=aliveCols[parentA],b=aliveCols[parentB];
    if(!a||!b)return;
    const bmA=MONS.find(m=>m.id===(a.baseId||a.id))||{rarity:"COMMON"};
    const bmB=MONS.find(m=>m.id===(b.baseId||b.id))||{rarity:"COMMON"};
    // 조건: 둘 다 Lv5 이상
    if((a.lv||1)<5||(b.lv||1)<5){toast("두 소환수 모두 Lv.5 이상 필요!","var(--red)");return;}
    const gradeA=GRADE_ORDER.indexOf(bmA.rarity),gradeB=GRADE_ORDER.indexOf(bmB.rarity);
    const need=3+gradeA+gradeB; // 등급 합산으로 부화 필요 먹이 수
    setEgg({parentA:bmA.id,parentB:bmB.id,hatch:0,need,nameA:bmA.name,nameB:bmB.name});
    toast(`🥚 교배 시작! 먹이 ${need}개로 부화`,"var(--purple)");
  };

  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:4}}>🥚 HYBRID 교배/육아</div>
    <div style={{fontSize:9,color:"var(--tx3)",marginBottom:8,padding:"5px 8px",
      background:"rgba(139,92,246,0.05)",borderRadius:7,border:"1px solid rgba(139,92,246,0.15)"}}>
      두 소환수를 교배해 <b style={{color:"var(--purple)"}}>HYBRID</b> 탄생! 부모 속성·등급 혼합
    </div>

    {/* 알 부화 중 */}
    {egg&&<div style={{borderRadius:12,padding:"12px",background:"rgba(139,92,246,0.06)",
      border:"1.5px solid rgba(139,92,246,0.2)",marginBottom:10,textAlign:"center"}}>
      <div style={{fontSize:28,marginBottom:4,animation:"float 1.5s ease-in-out infinite",display:"inline-block"}}>🥚</div>
      <div style={{fontSize:10,fontWeight:700,color:"var(--purple)",marginBottom:4}}>
        {egg.nameA} × {egg.nameB}
      </div>
      <div style={{background:"rgba(0,0,0,0.07)",borderRadius:6,height:8,marginBottom:6,overflow:"hidden"}}>
        <div style={{width:`${egg.hatch/egg.need*100}%`,height:"100%",background:"var(--purple)",borderRadius:6,transition:"width 0.3s"}}/>
      </div>
      <div style={{fontSize:10,color:"var(--tx3)",marginBottom:8}}>🍖 {egg.hatch}/{egg.need} 먹이 완료</div>
      {egg.hatch>=egg.need
        ?<button onClick={hatchEgg} style={{width:"100%",padding:"7px 0",borderRadius:9,border:"none",
            background:"linear-gradient(135deg,var(--purple),#6d28d9)",color:"white",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
            🥚 지금 부화!
          </button>
        :<button onClick={nurseEgg} disabled={(myS.foods?.food1||0)<=0}
            style={{width:"100%",padding:"7px 0",borderRadius:9,border:"none",
            background:(myS.foods?.food1||0)>0?"rgba(139,92,246,0.15)":"rgba(0,0,0,0.06)",
            color:(myS.foods?.food1||0)>0?"var(--purple)":"var(--tx3)",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
            🌾 먹이주기 (보유: {myS.foods?.food1||0}개)
          </button>
      }
    </div>}

    {!egg&&<>
      {/* 부모 선택 */}
      <div style={{fontSize:10,fontWeight:700,color:"var(--tx2)",marginBottom:4}}>부모 소환수 선택 (각 1마리)</div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        {["A","B"].map((slot,si)=>{
          const idx=si===0?parentA:parentB;
          const c=idx!==null?aliveCols[idx]:null;
          const bm=c?MONS.find(m=>m.id===(c.baseId||c.id)):null;
          return <div key={slot} style={{flex:1,borderRadius:10,padding:"8px",
            border:`1.5px solid ${idx!==null?acHex:"rgba(0,0,0,0.1)"}`,
            background:idx!==null?`${acHex}08`:"rgba(0,0,0,0.02)",textAlign:"center",cursor:"pointer"}}
            onClick={()=>{if(si===0)setParentA(null);else setParentB(null);}}>
            {bm?<><div style={{fontSize:20}}>{bm.emoji}</div><div style={{fontSize:9,color:"var(--tx1)",fontWeight:700}}>{bm.name}</div><div style={{fontSize:8,color:"var(--tx3)"}}>Lv{c.lv}</div></>
              :<div style={{fontSize:10,color:"var(--tx3)"}}>부모 {slot}<br/>선택</div>}
          </div>;
        })}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4,marginBottom:8}}>
        {aliveCols.map((c,i)=>{
          const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{emoji:"❓"};
          const isA=parentA===i,isB=parentB===i;
          return <button key={i} onClick={()=>{
            if(isA){setParentA(null);}
            else if(isB){setParentB(null);}
            else if(parentA===null)setParentA(i);
            else if(parentB===null)setParentB(i);
          }} style={{padding:"5px 3px",borderRadius:8,border:`1.5px solid ${isA?"#f97316":isB?"#8b5cf6":"rgba(0,0,0,0.08)"}`,
            background:isA?"rgba(249,115,22,0.1)":isB?"rgba(139,92,246,0.1)":"white",
            cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
            <div style={{fontSize:16}}>{bm.emoji}</div>
            <div style={{fontSize:7,color:"var(--tx3)"}}>Lv{c.lv}</div>
            {isA&&<div style={{fontSize:7,color:"#f97316",fontWeight:700}}>A</div>}
            {isB&&<div style={{fontSize:7,color:"#8b5cf6",fontWeight:700}}>B</div>}
          </button>;
        })}
      </div>
      <button onClick={startBreed} disabled={parentA===null||parentB===null||parentA===parentB}
        style={{width:"100%",padding:"8px 0",borderRadius:10,border:"none",
          background:parentA!==null&&parentB!==null&&parentA!==parentB?"linear-gradient(135deg,var(--purple),#6d28d9)":"rgba(0,0,0,0.06)",
          color:parentA!==null&&parentB!==null&&parentA!==parentB?"white":"rgba(0,0,0,0.2)",
          fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
        🥚 교배 시작!
      </button>
    </>}
