                  {c.star?<div style={{position:"absolute",top:3,right:5,fontSize:10,color:"var(--gold)"}}>⭐</div>:null}
                  <div style={{fontSize:8,fontWeight:800,color:rCol,marginBottom:2}}>{bm.rarity}</div>
                  <div style={{fontSize:22}}>{bm.emoji}</div>
                  <div style={{fontSize:11,fontWeight:700}}>{bm.name}</div>
                  <div style={{fontSize:10,color:(c.enhance||0)>=10?"var(--gold)":"var(--tx3)"}}>
                    Lv.{c.lv} {(c.enhance||0)>0?`+${c.enhance}강`:''}
                  </div>
                  {tInfo&&<div style={{fontSize:9,color:tInfo.color,fontWeight:700,marginTop:1}}>{tInfo.emoji}{tInfo.name}</div>}
                  <StatBadges c={c} MONS={MONS} TYPES={TYPES} small={true}/>
                </div>;
              })}
            </div>
          </>
        )}
        {bs&&<BV bs={bs} log={blog} lr={lr} ac={acHex} attack={attack} resetB={resetB}/>}
        {bossFight&&!bs&&<div>
          <div style={{fontSize:17,color:"var(--red)",fontWeight:700,marginBottom:8,
            padding:"7px 10px",background:"rgba(239,68,68,0.07)",borderRadius:10,
            border:"1px solid rgba(239,68,68,0.15)"}}>
            🌋 보스 출현! 사냥터에서 만났다!
          </div>
          <BossFightView bf={bossFight} log={bossLog} blr={blr}
            acHex={acHex} attackBoss={attackBoss}
            onEnd={()=>{setBossFight(null);setBossLog([]);setBossPick(null);setMyPick(null);}}/>
        </div>}
      </div>
    </div>}

    {/* ── 던전 ── */}
    {tab==="pvp"&&<div>
      {/* 헤더 배너 */}
      <div style={{position:"relative",overflow:"hidden"}}>
        <svg width="100%" height={80} viewBox="0 0 600 80" style={{display:"block",width:"100%"}}>
          <defs><linearGradient id="pvpsky" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#1e1b4b"/><stop offset="100%" stopColor="#4c1d95"/>
          </linearGradient></defs>
          <rect width={600} height={80} fill="url(#pvpsky)"/>
          {[[40,12],[140,20],[300,8],[460,18],[550,12]].map(([sx,sy],i)=>(
            <circle key={i} cx={sx} cy={sy} r={i%2===0?2:1.2} fill="white" opacity={0.5}/>
          ))}
          <rect x={0} y={58} width={600} height={22} fill="#2e1065"/>
          <rect x={0} y={58} width={600} height={3} fill="#a855f7"/>
          <text x={300} y={38} textAnchor="middle" fontSize={18} fontWeight="900" fill="white">👥 대전</text>
          <text x={300} y={54} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,0.6)">실시간 배틀 · 레이드 보스 도전 · 패배 시 몬스터 전사</text>
        </svg>
      </div>
      {/* 서브탭 */}
      <div style={{display:"flex",borderBottom:"2px solid rgba(139,92,246,0.1)",background:"white"}}>
        {[["battle","⚔️ 배틀"],["raid","🌋 레이드"]].map(([k,l])=>(
          <button key={k} onClick={()=>setPvpSubTab(k)} style={{
            flex:1,padding:"10px 0",border:"none",background:"transparent",
            fontSize:13,fontWeight:pvpSubTab===k?800:500,fontFamily:"inherit",cursor:"pointer",
            color:pvpSubTab===k?acHex:"var(--tx3)",
            borderBottom:`3px solid ${pvpSubTab===k?acHex:"transparent"}`,
            transition:"all 0.15s"}}>
            {l}
          </button>
        ))}
      </div>
      {/* 레이드 서브탭 */}
      {pvpSubTab==="raid"&&<div style={{padding:"10px 12px"}}>
        <SideRaid myS={myS} col={col} setMy={setMy} toast={toast} aliveCols={aliveCols} acHex={acHex}/>
      </div>}
      {/* 배틀 서브탭 */}
      {pvpSubTab==="battle"&&<div style={{padding:"10px 12px"}}>

        {/* 배틀 요청 수신 */}
        {myS.battleRequest&&<div style={{padding:"12px",borderRadius:14,background:"rgba(139,92,246,0.08)",
          border:"2px solid rgba(139,92,246,0.3)",marginBottom:10,animation:"pulse 1s ease-in-out infinite"}}>
          <div style={{fontSize:14,fontWeight:800,color:"var(--purple)",marginBottom:6}}>
            ⚔️ {myS.battleRequest.nickname}의 배틀 요청!
          </div>
          <div style={{fontSize:12,color:"var(--tx2)",marginBottom:8}}>
            {myS.battleRequest.monEmoji} {myS.battleRequest.monName} 으로 도전!
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>acceptBattleRequest(myS.battleRequest.roomId,myS.battleRequest.from)}
              disabled={myPick===null}
              style={{flex:2,padding:"8px 0",borderRadius:10,border:"none",
                background:myPick!==null?"var(--purple)":"rgba(0,0,0,0.06)",
                color:myPick!==null?"white":"rgba(0,0,0,0.2)",fontSize:13,fontWeight:800,
                cursor:myPick!==null?"pointer":"default",fontFamily:"inherit"}}>
              {myPick!==null?"✅ 수락":"소환수 먼저 선택!"}
            </button>
            <button onClick={()=>{setMy(s=>{const ns={...s};delete ns.battleRequest;return ns;});}}
              style={{flex:1,padding:"8px 0",borderRadius:10,border:"1px solid rgba(0,0,0,0.1)",
                background:"transparent",color:"var(--tx2)",fontSize:13,fontWeight:700,
                cursor:"pointer",fontFamily:"inherit"}}>거절</button>
          </div>
        </div>}

        {/* 실시간 배틀룸 진행 중 */}
        {battleRoom&&battleRoomId&&<div>
          {battleRoom.status==="waiting"&&<div style={{textAlign:"center",padding:"20px 0",color:"var(--tx3)"}}>
            <div style={{fontSize:28,marginBottom:8,animation:"pulse 1s infinite"}}>⏳</div>
            <div style={{fontSize:14,fontWeight:700}}>상대방 수락 대기 중...</div>
            <button onClick={leaveRealtime} style={{marginTop:12,padding:"7px 20px",borderRadius:10,
              border:"1px solid rgba(0,0,0,0.1)",background:"transparent",color:"var(--red)",
              fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>취소</button>
          </div>}
          {battleRoom.status==="ongoing"&&(()=>{
            const isHost=battleRoom.host===player;
            const myMon=isHost?battleRoom.hostMon:battleRoom.guestMon;
            const oppMon=isHost?battleRoom.guestMon:battleRoom.hostMon;
            const myHp=isHost?battleRoom.hostHp:battleRoom.guestHp;
            const oppHp2=isHost?battleRoom.guestHp:battleRoom.hostHp;
            const isMyTurn=(battleRoom.turn==="host"&&isHost)||(battleRoom.turn==="guest"&&!isHost);
            return <div>
              {/* 배틀 화면 */}
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                {[{m:myMon,hp:myHp,label:"나",c:acHex},{m:oppMon,hp:oppHp2,label:"상대",c:"var(--red)"}].map(({m,hp,label,c})=>(
                  <div key={label} style={{flex:1,padding:"10px",borderRadius:12,background:"white",border:`1.5px solid ${c}30`,boxShadow:"var(--shadow)"}}>
                    <div style={{fontSize:11,fontWeight:700,color:c,marginBottom:3}}>{label}</div>
                    <div style={{fontSize:24,textAlign:"center",marginBottom:4}}>{m?.emoji||"❓"}</div>
                    <div style={{fontSize:11,fontWeight:700,textAlign:"center",marginBottom:4}}>{m?.name}</div>
                    <HpBar cur={hp} max={m?.maxHp||1}/>
                    <div style={{fontSize:10,color:"var(--tx3)",textAlign:"right",marginTop:2}}>{hp}/{m?.maxHp}</div>
                  </div>
                ))}
              </div>
              {/* 배틀 로그 */}
              <div style={{maxHeight:80,overflowY:"auto",background:"rgba(30,27,75,0.05)",borderRadius:10,
                padding:"7px 10px",marginBottom:8,fontSize:11,color:"var(--tx2)",lineHeight:1.7}}>
                {(battleRoom.log||[]).slice(-5).map((l,i)=>(
                  <div key={i} style={{color:l.includes("승리")?"var(--gold)":l.includes("효과적")?"var(--green)":"var(--tx2)"}}>{l}</div>
                ))}
              </div>
              {/* 공격 버튼 */}
              {battleRoom.status==="ongoing"
                ?<Btn onClick={attackRealtime} disabled={!isMyTurn} color={isMyTurn?acHex:"var(--tx3)"}>
                  {isMyTurn?"⚔️ 공격!":"⏳ 상대 차례..."}
                </Btn>
                :<Btn onClick={leaveRealtime} color="var(--purple)" outline>← 나가기</Btn>}
            </div>;
          })()}
          {battleRoom.status==="over"&&<div style={{textAlign:"center",padding:"16px 0"}}>
            <div style={{fontSize:32,marginBottom:8}}>
              {battleRoom.winner===(battleRoom.host===player?"host":"guest")?"🏆":"😵"}
            </div>
            <div style={{fontSize:18,fontWeight:800,color:battleRoom.winner===(battleRoom.host===player?"host":"guest")?"var(--gold)":"var(--red)",marginBottom:12}}>
              {battleRoom.winner===(battleRoom.host===player?"host":"guest")?"승리!":"패배..."}
            </div>
            <Btn onClick={leaveRealtime} color="var(--purple)" outline>← 돌아가기</Btn>
          </div>}
        </div>}

        {/* 일반 대전 UI (배틀룸 없을 때) */}
        {!battleRoom&&<>
          {/* 내 몬스터 선택 */}
          <div style={{fontSize:13,fontWeight:700,color:acHex,marginBottom:5}}>⚔️ 출전 몬스터 선택</div>
          {aliveCols.length===0
            ?<div style={{color:"var(--tx3)",fontSize:13,marginBottom:10}}>살아있는 몬스터 없음</div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:12}}>
              {/* 즐겨찾기 먼저 */}
              {[...aliveCols].sort((a,b)=>{
                const fi=(myS.favMons||[]).includes(col.indexOf(a));
                const fj=(myS.favMons||[]).includes(col.indexOf(b));
                return fj-fi;
              }).map(c=>{
                const ri=col.indexOf(c);
                const bm=MONS.find(m=>m.id===(c.baseId||c.id))||c;
                const enh=c.enhance||0;
                const enhColor=enh>=7?"var(--gold)":enh>=4?"var(--purple)":"var(--blue)";
                const isFav=(myS.favMons||[]).includes(ri);
                const myAtk=Math.floor((bm.atk+(c.lv||1)*2)*(1+(c.atkBonus||0))*(1+enh*3/100));
                const tInfo=c.monType?TYPES[c.monType]:null;
                return <div key={ri} onClick={()=>setMyPick(ri===myPick?null:ri)} style={{
                  border:`2px solid ${myPick===ri?(RCOL[bm.rarity]||acHex):"rgba(0,0,0,0.08)"}`,
                  borderRadius:11,padding:"7px 6px",cursor:"pointer",textAlign:"center",
                  background:myPick===ri?`${RCOL[bm.rarity]||acHex}10`:"white",
                  boxShadow:myPick===ri?`0 2px 10px ${RCOL[bm.rarity]||acHex}30`:"0 1px 4px rgba(0,0,0,0.05)",
                  position:"relative",transition:"all 0.15s"}}>
                  {isFav&&<span style={{position:"absolute",top:2,left:4,fontSize:9}}>⭐</span>}
                  <div style={{position:"absolute",top:2,right:4,fontSize:7,fontWeight:800,
                    color:RCOL[bm.rarity]||"#888"}}>{bm.rarity?.slice(0,3)}</div>
                  <div style={{fontSize:20,marginTop:2}}>{bm.emoji}</div>
                  <div style={{fontSize:9,fontWeight:700,marginBottom:1,
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name||bm.name}</div>
                  <div style={{display:"flex",justifyContent:"center",gap:3,fontSize:8,marginBottom:2}}>
                    <span style={{color:"var(--tx3)"}}>Lv{c.lv}</span>
                    {enh>0&&<span style={{color:enhColor,fontWeight:800}}>+{enh}</span>}
                    {c.gender&&<span style={{color:c.gender==="♂"?"#3b82f6":"#ec4899"}}>{c.gender}</span>}
                  </div>
                  <div style={{display:"flex",justifyContent:"center",gap:4,fontSize:8}}>
                    <span style={{color:"var(--red)"}}>⚔{myAtk}</span>
                    {tInfo&&<span style={{color:tInfo.color}}>{tInfo.emoji}</span>}
                  </div>
                </div>;
              })}
            </div>
          }

          {/* 온라인 유저 목록 */}
          <div style={{borderTop:"1px solid rgba(0,0,0,0.06)",paddingTop:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:13,fontWeight:700,color:"var(--tx2)"}}>
                🟢 접속 중 ({Object.keys(onlineUsers).length}명)
              </div>
              <Badge text={`오늘 ${battleLeft}회`} color={battleLeft>0?"var(--green)":"var(--red)"}/>
            </div>
            {Object.keys(onlineUsers).length===0
              ?<div style={{textAlign:"center",padding:"24px 0",color:"var(--tx3)"}}>
                <div style={{fontSize:28,marginBottom:6}}>👥</div>
                <div style={{fontSize:13,fontWeight:600}}>접속 중인 유저가 없어요</div>
                <div style={{fontSize:11,marginTop:3}}>상대방이 접속하면 여기에 표시됩니다</div>
              </div>
              :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                {Object.entries(onlineUsers).map(([code,info])=>(
                  <div key={code} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                    borderRadius:12,background:"white",border:"1px solid rgba(0,0,0,0.07)",boxShadow:"var(--shadow)"}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"rgba(139,92,246,0.12)",
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🎮</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:"var(--tx1)"}}>{info.nickname||code}</div>
                      <div style={{fontSize:11,color:"var(--tx3)"}}>테이머 Lv.{info.tamerLv||1}</div>
                    </div>
                    <button onClick={()=>sendBattleRequest(code)}
                      disabled={myPick===null||battleLeft<=0}
                      style={{padding:"6px 14px",borderRadius:10,border:"none",
                        background:myPick!==null&&battleLeft>0?"var(--purple)":"rgba(0,0,0,0.06)",
                        color:myPick!==null&&battleLeft>0?"white":"rgba(0,0,0,0.2)",
                        fontSize:12,fontWeight:800,cursor:myPick!==null&&battleLeft>0?"pointer":"default",
                        fontFamily:"inherit",boxShadow:myPick!==null&&battleLeft>0?"0 3px 10px rgba(139,92,246,0.3)":"none"}}>
                      ⚔️ 도전!
                    </button>
                  </div>
                ))}
              </div>
            }
            {battleLeft<=0&&<div style={{fontSize:12,color:"var(--red)",textAlign:"center",marginTop:6}}>배틀권⚔️으로 추가 가능!</div>}
          </div>

          {bs&&<BV bs={bs} log={blog} lr={lr} ac={acHex} attack={attack} resetB={resetB}/>}
        </>}
      </div>}
    </div>}

    {/* ── 합성 ── */}
    {tab==="fusion"&&<div style={{padding:12,position:"relative"}}>
      {/* 합성 결과 애니메이션 오버레이 */}
      {fusAnim&&<div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",
        background:fusAnim==="great"?"rgba(139,92,246,0.55)":fusAnim==="success"?"rgba(16,185,129,0.45)":fusAnim==="fail"?"rgba(239,68,68,0.45)":"rgba(30,10,10,0.65)",
        backdropFilter:"blur(4px)",pointerEvents:"none"}}>
        <div style={{textAlign:"center",animation:"catchSuccess 0.4s ease-out"}}>
          {fusAnim==="great"&&<>
            <div style={{fontSize:72,marginBottom:8,filter:"drop-shadow(0 0 24px #a855f7)",animation:"pulse 0.6s ease-in-out infinite"}}>✨</div>
            <div style={{fontSize:36,fontWeight:900,color:"#fff",textShadow:"0 0 30px #a855f7,0 2px 8px rgba(0,0,0,0.5)",letterSpacing:3}}>대성공!</div>
            <div style={{fontSize:16,color:"rgba(255,255,255,0.8)",marginTop:6}}>등급이 크게 상승했다!</div>
            {[...Array(8)].map((_,i)=>(
              <div key={i} style={{position:"absolute",fontSize:20,
                top:`${20+Math.sin(i/8*Math.PI*2)*35}%`,left:`${50+Math.cos(i/8*Math.PI*2)*30}%`,
                animation:`float ${0.8+i*0.1}s ease-in-out infinite`,animationDelay:`${i*0.12}s`,opacity:0.85}}>
                {["✨","💫","⭐","🌟","💥","🔮","🌈","✨"][i]}
              </div>
            ))}
          </>}
          {fusAnim==="success"&&<>
            <div style={{fontSize:64,marginBottom:8,filter:"drop-shadow(0 0 16px #10b981)"}}>🔮</div>
            <div style={{fontSize:32,fontWeight:900,color:"#fff",textShadow:"0 0 20px #10b981,0 2px 8px rgba(0,0,0,0.4)",letterSpacing:2}}>성공!</div>
            <div style={{fontSize:17,color:"rgba(255,255,255,0.75)",marginTop:6}}>합성 완료!</div>
          </>}
          {fusAnim==="fail"&&<>
            <div style={{fontSize:64,marginBottom:8,filter:"drop-shadow(0 0 12px #ef4444)",animation:"shake 0.4s ease-out"}}>💔</div>
            <div style={{fontSize:32,fontWeight:900,color:"#fff",textShadow:"0 0 16px #ef4444,0 2px 8px rgba(0,0,0,0.4)",letterSpacing:2}}>실패...</div>
            <div style={{fontSize:17,color:"rgba(255,255,255,0.7)",marginTop:6}}>B 소환수가 소멸했다</div>
          </>}
          {fusAnim==="bust"&&<>
            <div style={{fontSize:64,marginBottom:8,filter:"drop-shadow(0 0 20px #991b1b)",animation:"shake 0.3s ease-out 3"}}>💥</div>
            <div style={{fontSize:32,fontWeight:900,color:"#ff4444",textShadow:"0 0 24px #ff0000,0 2px 12px rgba(0,0,0,0.6)",letterSpacing:2}}>대실패!</div>
            <div style={{fontSize:17,color:"rgba(255,180,180,0.85)",marginTop:6}}>B 소환수가 완전히 파괴됐다!</div>
          </>}
        </div>
      </div>}
      {/* ── 제련소 헤더 + 서브탭 ── */}
      <div style={{background:`linear-gradient(135deg,#8b5cf622,#f97316ll)`,
        borderBottom:"2px solid rgba(139,92,246,0.1)",padding:"10px 14px 0",flexShrink:0}}>
        <div style={{fontSize:16,fontWeight:900,color:"var(--tx1)",marginBottom:8}}>⚗️ 제련소</div>
        <div style={{display:"flex",gap:0,borderRadius:10,overflow:"hidden",border:"1.5px solid rgba(0,0,0,0.08)",marginBottom:0}}>
          {[["fuse","🔮 합성"],["enhance","🔩 강화"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFuseTab(k)}
              style={{flex:1,padding:"8px 0",border:"none",fontFamily:"inherit",
                background:fuseTab===k?`linear-gradient(135deg,${k==="fuse"?"#8b5cf6":"#f97316"},${k==="fuse"?"#6d28d9":"#ea580c"})`:"white",
                color:fuseTab===k?"white":"var(--tx2)",
                fontSize:14,fontWeight:fuseTab===k?800:500,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* 합성 서브탭 */}
      {fuseTab==="fuse"&&<div style={{padding:12,overflowY:"auto",flex:1}}>
        <div style={{fontSize:13,color:"var(--tx3)",marginBottom:10,padding:"7px 10px",
          background:"rgba(139,92,246,0.04)",borderRadius:10,lineHeight:1.6,border:"1px solid rgba(139,92,246,0.1)"}}>
          ⚠️ <b>두 마리 모두 +10강 필요</b> · 같은 등급끼리<br/>
          실패 시 A 소멸, B는 50% 생존 · 🔴크리스탈로 등급UP<br/>
          💡 MUTANT+EPIC = 랜덤 레전드 70%!
        </div>
        {col.length<2?<div style={{textAlign:"center",padding:"24px 0",color:"var(--tx3)"}}>몬스터 2마리 이상 필요!</div>:<>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:12}}>
            {col.map((c,i)=>{
              const bm=MONS.find(m=>m.id===c.id)||c;
              const sa=fa===i,sb2=fb===i;
              const isT=bm.rarity==="LEGEND";
              const notMax=(c.enhance||0)<MAX_ENHANCE;
              const isMut=bm.rarity==="MUTANT";
              return <div key={i} onClick={()=>{if(isT)return;if(sa)setFa(null);else if(sb2)setFb(null);else if(fa===null)setFa(i);else if(fb===null)setFb(i);}}
                style={{border:sa?`2px solid ${acHex}`:sb2?`2px solid var(--purple)`:"1px solid rgba(0,0,0,0.08)",
                  borderRadius:12,padding:"9px 10px",cursor:isT?"default":"pointer",textAlign:"center",minWidth:70,
                  background:sa?`${acHex}15`:sb2?"#8b5cf620":isMut?"rgba(0,172,193,0.08)":"white",
                  opacity:isT?0.35:1,boxShadow:"var(--shadow)"}}>
                <div style={{fontSize:22}}>{bm.emoji}</div>
                <div style={{fontSize:12,fontWeight:600,color:isMut?"#00acc1":"var(--tx1)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:64}}>{bm.name}</div>
                <Badge text={bm.rarity} color={isMut?"#00acc1":RCOL[bm.rarity]||"#888"}/>
                <div style={{fontSize:12,color:(c.enhance||0)>=MAX_ENHANCE?"var(--green)":"var(--tx3)"}}>
                  Lv.{c.lv} +{c.enhance||0}강
                </div>
                {sa&&<div style={{fontSize:13,color:acHex,fontWeight:700}}>A</div>}
                {sb2&&<div style={{fontSize:13,color:"var(--purple)",fontWeight:700}}>B</div>}

                  {isDrop&&<span style={{fontSize:10,padding:"2px 6px",borderRadius:6,
                    background:"rgba(245,158,11,0.1)",color:"var(--gold)",fontWeight:700}}>⚠하락</span>}

                </button>
              </div>;
            })}
          </div>}
      </div>}
    </div>}

    {/* ── 월간 출석 ── */}
    {tab==="monthly"&&<div style={{padding:12}}>
      <div style={{fontSize:16,fontWeight:800,color:"var(--tx1)",marginBottom:4}}>📅 월간 출석</div>
      <div style={{fontSize:17,color:"var(--tx3)",marginBottom:12,padding:"7px 10px",
        background:"rgba(245,158,11,0.05)",borderRadius:10,border:"1px solid rgba(245,158,11,0.15)"}}>

          const claimed=(myS.monthlyClaimedDays||[]).includes(r.day);
          const isToday=r.day===todayDay;
          const canClaim=isToday&&!claimed;
          const isPast=r.day<todayDay&&!claimed;

            borderRadius:12,padding:"7px 5px",textAlign:"center",

            border:`1.5px solid ${claimed?"rgba(245,158,11,0.3)":canClaim?"rgba(245,158,11,0.8)":isPast?"rgba(239,68,68,0.25)":"rgba(0,0,0,0.06)"}`,

            <div style={{fontSize:17,color:claimed?"var(--gold)":canClaim?"var(--gold)":isPast?"var(--red)":"var(--tx3)",fontWeight:700}}>{r.day}일</div>
            <div style={{fontSize:16,margin:"2px 0"}}>{claimed?"✅":canClaim?"🎁":isPast?"❌":"🔒"}</div>

    </div>}

    {/* ── 테이머 ── */}

    {/* ── 도감 ── */}
    {tab==="dex"&&<div style={{padding:12}}><SideDex myS={myS} col={col} acHex={acHex} setMy={setMy}/></div>}

    {/* ── 업적 ── */}
    {tab==="ach"&&<div style={{padding:12}}><SideAch myS={myS} acHex={acHex} claimAchReward={claimAchReward}/></div>}

    {/* ── 진화석 연구소 ── */}

    {/* ── 도움말 ── */}

    {/* ── 확률표 ── */}

    </div>{/* 콘텐츠 끝 */}

    </div>{/* game-col 끝 */}
    <div className="side-col" id="side-col-panel">
      <SidePanel
        sideTabTop={sideTabTop} setSideTabTop={setSideTabTop}
        myS={myS} col={col} tLv={tLv} tExpNeed={tExpNeed} maxStorage={maxStorage}
        acHex={acHex} isSik={isSik}
        todayDay={todayDay} claimMonthly={claimMonthly}
        dgExploring={dgExploring} dgRes={dgRes} setDgRes={setDgRes}
        runDungeon={runDungeon} DUNGEONS={DUNGEONS} unlocks={unlocks} aliveCols={aliveCols}
        useStaminaPot={useStaminaPot}
        bs={bs} blog={blog} lr={lr} attack={attack} resetB={resetB}
        oppS={oppS} myPick={myPick} setMyPick={setMyPick}
        oppPick={oppPick} setOppPick={setOppPick} oppHas={oppHas}
        battleLeft={battleLeft} startPvp={startPvp}

        setMy={setMy} toast={toast}
      />
    </div>
  </div>;
}


function DivineEncounter({phase}){
  if(!phase)return null;
  const particles=[...Array(16)].map((_,i)=>({
    dx:`${Math.cos(i/16*Math.PI*2)*220}px`,
    dy:`${Math.sin(i/16*Math.PI*2)*220}px`,
    emoji:i%4===0?"🍊":i%4===1?"✨":i%4===2?"🌟":"💫",
    delay:`${i*0.08}s`,
  }));
  return <div style={{
    position:"fixed",inset:0,zIndex:9999,
    background:phase===3?"rgba(0,0,0,0)":"rgba(0,0,0,0.88)",
    display:"flex",alignItems:"center",justifyContent:"center",
    flexDirection:"column",gap:0,
    transition:"background 1s ease",
    pointerEvents:"all",
    overflow:"hidden",
  }}>
    {/* 방사형 빛 */}
    {phase>=1&&[...Array(12)].map((_,i)=>(
      <div key={i} style={{
        position:"absolute",
        top:"50%",left:"50%",
        width:4,height:"60vh",
        background:"linear-gradient(to bottom,#ff6600,transparent)",
        transform:`translate(-50%,-100%) rotate(${i*30}deg)`,
        transformOrigin:"bottom center",
        opacity:phase===2?0.35:0.15,
        transition:"opacity 0.8s",
        animation:"youngsooRay 2.5s ease-in-out infinite",
        animationDelay:`${i*0.15}s`,
      }}/>
    ))}

    {/* 파티클 */}
    {phase===2&&particles.map((p,i)=>(
      <div key={i} style={{
        position:"absolute",top:"50%",left:"50%",
        fontSize:22,
        "--pdx":p.dx,"--pdy":p.dy,
        animation:"youngsooParticle 2s ease-out infinite",
        animationDelay:p.delay,
      }}>{p.emoji}</div>
    ))}

    {/* 메인 오렌지 */}
    {phase>=1&&<div style={{
      fontSize:phase===2?140:80,
      filter:"drop-shadow(0 0 40px #ff6600) drop-shadow(0 0 80px #ff4400)",
      animation:phase===1?"youngsooAppear 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards":
               phase===2?"youngsooFloat 2s ease-in-out infinite":
               "youngsooAppear 0.5s ease-in reverse forwards",
      transition:"font-size 0.5s",
      marginBottom:16,
    }}>🍊</div>}

    {/* 이름 + 텍스트 */}
    {phase===2&&<>
      <div style={{
        fontSize:36,fontWeight:900,color:"#ff6600",
        textShadow:"0 0 30px #ff6600,0 0 60px #ff4400,0 2px 8px rgba(0,0,0,0.8)",
        letterSpacing:6,
        animation:"youngsooText 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards",
        fontFamily:"inherit",
      }}>???</div>
      <div style={{
        fontSize:14,color:"rgba(255,180,80,0.9)",marginTop:10,
        fontWeight:700,letterSpacing:2,
        animation:"youngsooText 0.8s 0.2s both",
        fontFamily:"inherit",
      }}>전설의 오렌지가 나타났다!</div>
      <div style={{
        marginTop:20,padding:"8px 20px",
        background:"rgba(255,102,0,0.15)",
        border:"1px solid rgba(255,102,0,0.4)",
        borderRadius:20,
        fontSize:11,color:"rgba(255,180,80,0.7)",
        fontFamily:"inherit",
        animation:"youngsooText 0.8s 0.5s both",
      }}>포획 불가 · 도감 등록 · 아이템 획득</div>
      {/* 흔들리는 파티클 링 */}
      {[...Array(8)].map((_,i)=>(
        <div key={i} style={{
          position:"absolute",
          top:`calc(50% + ${Math.sin(i/8*Math.PI*2)*160}px)`,
          left:`calc(50% + ${Math.cos(i/8*Math.PI*2)*160}px)`,
          fontSize:20,
          animation:`youngsooFloat ${1.4+i*0.15}s ease-in-out infinite`,
          animationDelay:`${i*0.18}s`,
        }}>🍊</div>
      ))}
    </>}

    {/* 획득 알림 */}
    {phase===3&&<div style={{
      fontSize:18,fontWeight:800,color:"#ff6600",
      textShadow:"0 0 20px #ff6600",
      animation:"youngsooText 0.6s ease-out",
      fontFamily:"inherit",
    }}>🍊 오렌지의 가호 획득!</div>}
  </div>;
}

      borderRadius:10,padding:"7px 10px",height:70,overflowY:"auto",fontSize:16,
      marginBottom:8,color:"var(--tx2)",lineHeight:1.8}}>
      {log.map((l,i)=><div key={i} style={{color:l.includes("토벌")||l.includes("승리")?"var(--green)":l.includes("패배")?"var(--red)":"var(--tx2)"}}>{l}</div>)}
    </div>
    {!bf.over
      ?<Btn onClick={attackBoss} color="var(--red)">⚔ 공격!</Btn>
      :<Btn onClick={onEnd} color="var(--purple)" outline>← 돌아가기</Btn>
    }
  </div>;
}


function BV({bs,log,lr,ac,attack,resetB}){
  const [atkFlash,setAtkFlash]=React.useState(null);
  const [showEffect,setShowEffect]=React.useState(null);
  const [bframe,setBframe]=React.useState(0);
  React.useEffect(()=>{const id=setInterval(()=>setBframe(f=>f+1),300);return()=>clearInterval(id);},[]);

  const handleAtk=()=>{
    const turn=bs.turn;
    setAtkFlash(turn);
    const m=bs[turn];
    const mType=m.monType||(MON_BASE_TYPE[m.baseId||m.id]);
    if(mType)setShowEffect({type:mType,side:turn});
    setTimeout(()=>{setAtkFlash(null);setShowEffect(null);},600);
    attack();
  };

  const m1=bs.m1, m2=bs.m2;
  const m1Type=m1.monType||(MON_BASE_TYPE[m1.baseId||m1.id]);
  const m2Type=m2.monType||(MON_BASE_TYPE[m2.baseId||m2.id]);
  const m1Info=m1Type?TYPES[m1Type]:null;
  const m2Info=m2Type?TYPES[m2Type]:null;
  const fh=220;

  return <div>
    {/* ── 배틀 필드 ── */}
    <div style={{position:"relative",borderRadius:16,overflow:"hidden",marginBottom:10,boxShadow:"var(--shadow-lg)"}}>
      <svg width="100%" height={fh} viewBox={`0 0 600 ${fh}`} style={{display:"block"}}>
        <defs>
          <linearGradient id="bsky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#1e1b4b"/><stop offset="100%" stopColor="#312e81"/>
          </linearGradient>
        </defs>
        {/* 배틀 배경 */}
        <rect width={600} height={fh} fill="url(#bsky)"/>
        {/* 별 */}
        {[[40,15],[120,8],[220,22],[340,10],[460,18],[550,8],[80,45],[300,38]].map(([sx,sy],i)=>(
          <circle key={i} cx={sx} cy={sy} r={i%2===0?1.5:1} fill="white" opacity={0.6+i%3*0.1}/>
        ))}
        {/* 달 */}
        <circle cx={520} cy={35} r={22} fill="#fffde7" opacity={0.9}/>
        <circle cx={530} cy={28} r={18} fill="#312e81"/>
        {/* 지면 */}
        <rect x={0} y={fh*0.68} width={600} height={fh*0.32} fill="#1e3a1e"/>
        <rect x={0} y={fh*0.68} width={600} height={6} fill="#2d6a2d"/>
        {/* 아군 플랫폼 */}
        <ellipse cx={130} cy={fh*0.72} rx={55} ry={10} fill="#4ade80" opacity={0.25}/>
        {/* 적 플랫폼 */}
        <ellipse cx={470} cy={fh*0.72} rx={55} ry={10} fill="#f87171" opacity={0.25}/>
        {/* 아군 속성 이펙트 */}
        {showEffect?.side==="m1"&&m1Info&&<TypeEffect type={m1Type} x={130} y={fh*0.45} active={true}/>}
        {/* 적 속성 이펙트 */}
        {showEffect?.side==="m2"&&m2Info&&<TypeEffect type={m2Type} x={470} y={fh*0.45} active={true}/>}
        {/* 아군 몬스터 */}
        <g transform={`translate(0,${Math.sin(bframe*0.8)*2})`}
           style={{animation:atkFlash==="m1"?"monHit 0.4s ease-out":undefined}}>
          <circle cx={130} cy={fh*0.5} r={50} fill={m1Info?.color||"#6366f1"} opacity={0.08}/>
          <text x={130} y={fh*0.62} textAnchor="middle" fontSize={62}>{m1.emoji}</text>
          {m1Info&&<>
            <rect x={90} y={fh*0.67} width={80} height={14} rx={7} fill={m1Info.color} opacity={0.9}/>
            <text x={130} y={fh*0.677} textAnchor="middle" fontSize={9} fill="white" fontWeight="bold">{m1Info.emoji}{m1Info.name}</text>
          </>}
        </g>
        {/* 적 몬스터 (좌우 반전) */}
        <g transform={`translate(600,${Math.sin(bframe*0.8+1.5)*2}) scale(-1,1)`}
           style={{animation:atkFlash==="m2"?"monHit 0.4s ease-out":undefined}}>
          <circle cx={130} cy={fh*0.5} r={50} fill={m2Info?.color||"#ef4444"} opacity={0.08}/>
          <text x={130} y={fh*0.62} textAnchor="middle" fontSize={62}>{m2.emoji}</text>
          {m2Info&&<>
            <rect x={90} y={fh*0.67} width={80} height={14} rx={7} fill={m2Info.color} opacity={0.9}/>
            <text x={130} y={fh*0.677} textAnchor="middle" fontSize={9} fill="white" fontWeight="bold">{m2Info.emoji}{m2Info.name}</text>
          </>}
        </g>
        {/* VS 텍스트 */}
        {!bs.over&&<>
          <text x={300} y={fh*0.45} textAnchor="middle" fontSize={20} fontWeight="900" fill="white" opacity={0.4}>VS</text>
          {/* 턴 표시 */}
          <rect x={240} y={fh*0.52} width={120} height={18} rx={9} fill="rgba(255,255,255,0.12)"/>
          <text x={300} y={fh*0.535} textAnchor="middle" fontSize={10} fill="white" opacity={0.9}>
            {bs.turn==="m1"?"🟢 내 차례":"🔴 상대 차례"}
          </text>
        </>}
        {/* 승리 패배 오버레이 */}
        {bs.over&&<>
          <rect x={150} y={fh*0.35} width={300} height={60} rx={20} fill={bs.winner==="m1"?"rgba(74,222,128,0.95)":"rgba(248,113,113,0.95)"}/>
          <text x={300} y={fh*0.52} textAnchor="middle" fontSize={22} fontWeight="900" fill="white">
            {bs.winner==="m1"?"🏆 승리!":"😵 패배..."}
          </text>
        </>}
      </svg>
    </div>

    {/* ── HP 바 + 속성 정보 ── */}
    <div style={{display:"flex",gap:8,marginBottom:8}}>
      {[{k:"m1",m:m1,mType:m1Type,mInfo:m1Info,c:ac,label:"나"},{k:"m2",m:m2,mType:m2Type,mInfo:m2Info,c:"var(--red)",label:"상대"}].map(({k,m,mType,mInfo,c,label})=>{
        // 상성 계산
        const vsType=k==="m1"?m2Type:m1Type;
        const mult=getTypeMult(mType,vsType);
        const multLabel=mult>1?"⚡유리":mult<1?"💤불리":null;
        const multColor=mult>1?"var(--green)":mult<1?"var(--red)":null;
        return <div key={k} style={{flex:1,padding:"8px 10px",borderRadius:12,background:"white",
          border:`1.5px solid ${c}30`,boxShadow:atkFlash===k?`0 0 16px ${c}55`:"var(--shadow)",
          transition:"box-shadow 0.2s"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
            <div style={{fontSize:13,fontWeight:700,color:c}}>{label} {m.emoji}{m.name}</div>
            {multLabel&&<span style={{fontSize:11,fontWeight:800,color:multColor,
              background:`${multColor}15`,padding:"1px 6px",borderRadius:8}}>{multLabel}</span>}
          </div>
          {mInfo&&<div style={{fontSize:11,color:mInfo.color,fontWeight:700,marginBottom:3}}>
            {mInfo.emoji} {mInfo.name}속성
          </div>}
          {/* 스탯 */}
          <div style={{display:"flex",gap:3,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:10,fontWeight:700,color:"#ef4444",background:"rgba(239,68,68,0.08)",padding:"1px 5px",borderRadius:5}}>❤️{m.maxHp}</span>
            <span style={{fontSize:10,fontWeight:700,color:"#f97316",background:"rgba(249,115,22,0.08)",padding:"1px 5px",borderRadius:5}}>⚔️{Math.floor(m.atk*(1+(m.atkBonus||0))*(1+getEnhanceBonus(m.enhance||0).atkPct/100))+(m.fusionBonus?.atk||0)}</span>
            {(m.enhance||0)>0&&<span style={{fontSize:10,fontWeight:700,color:"#3b82f6",background:"rgba(59,130,246,0.08)",padding:"1px 5px",borderRadius:5}}>🛡️+{(m.enhance||0)*3}%</span>}
          </div>
          <HpBar cur={Math.max(0,m.curHp)} max={m.maxHp}/>
          <div style={{fontSize:12,color:"var(--tx3)",marginTop:2,textAlign:"right"}}>{Math.max(0,m.curHp)}/{m.maxHp}</div>
        </div>;
      })}
    </div>

    {/* ── 배틀 로그 ── */}
    <div ref={lr} style={{background:"rgba(30,27,75,0.06)",border:"1px solid rgba(139,92,246,0.12)",
      borderRadius:12,padding:"8px 10px",height:80,overflowY:"auto",
      fontSize:17,marginBottom:10,color:"var(--tx2)",lineHeight:1.9}}>
      {log.map((l,i)=><div key={i} style={{color:l.includes("승리")||l.includes("성공")?"var(--green)":l.includes("패배")||l.includes("실패")?"var(--red)":"var(--tx2)"}}>{l}</div>)}
    </div>

    {/* ── 버튼 ── */}
    {!bs.over
      ?<Btn onClick={handleAtk} color={ac}>⚔ 공격!</Btn>
      :<Btn onClick={resetB} color="var(--purple)" outline>← 돌아가기</Btn>
    }
  </div>;
}

    </div>
    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
      {[{v:myS.consumables?.enhance_stone||0,c:"var(--orange)",e:"🔩"},{v:myS.battleItems?.battle_token||0,c:"var(--cyan)",e:"🪙"},{v:(myS.titles||[]).length,c:"var(--gold)",e:"🏅"}].map(({v,c,e},i)=>(

          <div style={{fontSize:11,fontWeight:800,color:c}}>{v}</div>
          <div style={{fontSize:11,color:"var(--tx3)"}}>{e}</div>
        </div>
      ))}

    {myS.divineItem&&<div style={{marginTop:10,padding:"10px 12px",borderRadius:12,
      background:"linear-gradient(135deg,rgba(255,102,0,0.12),rgba(255,180,0,0.08))",
      border:"1.5px solid rgba(255,102,0,0.35)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>

        <div>
          <div style={{fontSize:11,fontWeight:800,color:"#ff6600"}}>오렌지의 가호</div>
          <div style={{fontSize:10,color:"rgba(255,102,0,0.7)"}}>전설의 오렌지가 인정한 테이머</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {[{label:"ATK +20%",c:"#ef4444"},{label:"DEF +15%",c:"#3b82f6"},{label:"포획률 +20%",c:"#10b981"}].map(({label,c})=>(
          <span key={label} style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:`${c}15`,color:c,border:`1px solid ${c}30`,fontWeight:700}}>{label}</span>
        ))}
      </div>
    </div>}
    {/* 레이드 장비 슬롯 UI */}
    <div style={{marginTop:10}}>
      <div style={{fontSize:13,fontWeight:800,color:"var(--tx1)",marginBottom:8}}>⚔️ 장비 슬롯</div>
      {/* 캐릭터 장비 슬롯 그리드 - 5부위 */}
      {(()=>{
        const myEquips=myS.equips||{};
        const myOn=myS.equipsOn||{};
        const equippedCount=BOSS_EQUIPS.filter(e=>myOn[e.slot]&&myEquips[e.id]).length;
        const bonus=getEquipBonus(myOn,myEquips);
        const isFullSet=equippedCount===BOSS_EQUIPS.length;
        const totalAtk=bonus.atk+(isFullSet?FULL_SET_BONUS.atk:0);
        const totalDef=bonus.def+(isFullSet?FULL_SET_BONUS.def:0);

        return <>
          {/* 장착 효과 요약 바 */}
          <div style={{padding:"8px 12px",borderRadius:10,marginBottom:10,
            background:isFullSet?"linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05))":"rgba(0,0,0,0.04)",
            border:`1.5px solid ${isFullSet?"rgba(245,158,11,0.5)":"rgba(0,0,0,0.08)"}`,
            display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,fontWeight:800,color:isFullSet?"var(--gold)":"var(--tx2)"}}>
                {isFullSet?"✨ 풀셋 완성! +ATK+5% DEF+5%":"장착 보너스"}
              </div>
              <div style={{fontSize:10,marginTop:2}}>
                <span style={{color:"#ef4444",fontWeight:700}}>⚔ ATK +{totalAtk}%</span>
                <span style={{marginLeft:8,color:"#3b82f6",fontWeight:700}}>🛡 DEF +{totalDef}%</span>
              </div>
            </div>
            <div style={{fontSize:11,color:"var(--tx3)"}}>{equippedCount}/{BOSS_EQUIPS.length}착용</div>
          </div>

          {/* 슬롯 그리드 */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:8}}>
            {BOSS_EQUIPS.map(eq=>{
              const have=myEquips[eq.id];
              const on=myOn[eq.slot]===eq.id;
              const slotLabels={helm:"투구",armor:"갑옷",glove:"장갑",boots:"신발",weapon:"무기"};
              return <div key={eq.id} onClick={()=>{
                  if(!have)return;
                  const cur=myOn[eq.slot];
                  setMy(s=>({...s,equipsOn:{...(s.equipsOn||{}),[eq.slot]:cur===eq.id?undefined:eq.id}}));
                }}
                style={{borderRadius:10,padding:"8px 4px",textAlign:"center",
                  cursor:have?"pointer":"default",
                  background:on?"rgba(245,158,11,0.12)":have?"white":"rgba(0,0,0,0.03)",
                  border:`2px solid ${on?"rgba(245,158,11,0.6)":have?"rgba(0,0,0,0.15)":"rgba(0,0,0,0.06)"}`,
                  boxShadow:on?"0 2px 8px rgba(245,158,11,0.3)":"none",
                  opacity:have?1:0.5,transition:"all 0.15s",position:"relative"}}>
                {/* 착용 표시 */}
                {on&&<div style={{position:"absolute",top:-4,right:-4,width:14,height:14,
                  borderRadius:"50%",background:"var(--gold)",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:8}}>✓</div>}
                <div style={{fontSize:22}}>{have?eq.emoji:"❓"}</div>
                <div style={{fontSize:8,fontWeight:700,color:on?"var(--gold)":have?"var(--tx2)":"var(--tx3)",
                  marginTop:2,lineHeight:1.2}}>
                  {have?eq.name:slotLabels[eq.slot]||eq.slot}
                </div>
                {have&&!on&&(()=>{
                  const boss=RAID_BOSSES.find(b=>b.id===eq.bossId);
                  return <div style={{fontSize:6,color:"var(--tx3)",marginTop:1}}>{boss?.emoji}{boss?.name}</div>;
                })()}
                {have&&<div style={{fontSize:7,color:on?"var(--gold)":"var(--tx3)",marginTop:1}}>
                  {on?"✓착용중":"클릭착용"}
                </div>}
                {!have&&<div style={{fontSize:7,color:"var(--tx3)",marginTop:1}}>미획득</div>}
              </div>;
            })}
          </div>

          {/* 개별 스탯 상세 */}
          {BOSS_EQUIPS.some(e=>myEquips[e.id])&&<div style={{display:"flex",flexDirection:"column",gap:3}}>
            {BOSS_EQUIPS.filter(e=>myEquips[e.id]).map(eq=>{
              const on=myOn[eq.slot]===eq.id;
              return <div key={eq.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",
                borderRadius:7,background:on?"rgba(245,158,11,0.06)":"rgba(0,0,0,0.02)",
                border:`1px solid ${on?"rgba(245,158,11,0.2)":"rgba(0,0,0,0.05)"}`}}>
                <span style={{fontSize:14}}>{eq.emoji}</span>
                <div style={{flex:1,fontSize:10,fontWeight:600,color:on?"var(--tx1)":"var(--tx3)"}}>
                  {eq.name}
                </div>
                <div style={{fontSize:9,color:"var(--tx3)"}}>{eq.desc}</div>
                <button onClick={()=>{
                  const cur=myOn[eq.slot];
                  setMy(s=>({...s,equipsOn:{...(s.equipsOn||{}),[eq.slot]:cur===eq.id?undefined:eq.id}}));
                }} style={{padding:"2px 8px",borderRadius:6,border:"none",fontFamily:"inherit",flexShrink:0,
                  background:on?"var(--gold)":"rgba(139,92,246,0.1)",
                  color:on?"#000":"var(--purple)",fontSize:9,fontWeight:700,cursor:"pointer"}}>
                  {on?"해제":"착용"}
                </button>
              </div>;
            })}
          </div>}

          {!BOSS_EQUIPS.some(e=>myEquips[e.id])&&<div style={{textAlign:"center",padding:"12px 0",
            color:"var(--tx3)",fontSize:10,lineHeight:1.7}}>
            레이드를 클리어하면<br/>장비가 랜덤 드롭됩니다
          </div>}
        </>;
      })()}
    </div>
  </div>;
}

function SideMonthly({myS,todayDay,claimMonthly}){
  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:4}}>📅 월간 출석</div>
    <div style={{fontSize:10,color:"var(--tx3)",marginBottom:8,padding:"5px 8px",
      background:"rgba(245,158,11,0.05)",borderRadius:8,border:"1px solid rgba(245,158,11,0.15)"}}>
      오늘 {todayDay}일 · 출석 {myS.monthlyDays||0}일 · <span style={{color:"var(--red)"}}>당일만 수령</span>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:3}}>
      {MONTHLY_REWARDS.map(r=>{
        const claimed=(myS.monthlyClaimedDays||[]).includes(r.day);
        const isToday=r.day===todayDay;
        const canClaim=isToday&&!claimed;
        const isPast=r.day<todayDay&&!claimed;
        const isSpecial=r.label.includes("⭐")||r.label.includes("👑");
        return <div key={r.day} onClick={()=>canClaim&&claimMonthly(r.day)} style={{
          borderRadius:8,padding:"5px 3px",textAlign:"center",cursor:canClaim?"pointer":"default",
          border:`1.5px solid ${claimed?"rgba(245,158,11,0.3)":canClaim?"rgba(245,158,11,0.8)":isPast?"rgba(239,68,68,0.25)":"rgba(0,0,0,0.06)"}`,
          background:claimed?"rgba(245,158,11,0.08)":canClaim?"rgba(245,158,11,0.12)":isPast?"rgba(239,68,68,0.04)":"rgba(0,0,0,0.02)",
          opacity:r.day>todayDay?0.35:1,position:"relative",
          boxShadow:canClaim?"0 0 0 2px rgba(245,158,11,0.4)":undefined}}>
          {isSpecial&&!claimed&&<div style={{position:"absolute",top:-3,right:-3,fontSize:9}}>⭐</div>}
          <div style={{fontSize:10,color:claimed?"var(--gold)":canClaim?"var(--gold)":isPast?"var(--red)":"var(--tx3)",fontWeight:700}}>{r.day}일</div>
          <div style={{fontSize:10,margin:"1px 0"}}>{claimed?"✅":canClaim?"🎁":isPast?"❌":"🔒"}</div>
          <div style={{fontSize:6,color:"var(--tx3)",lineHeight:1.2}}>{r.label.split(" ")[0]}</div>
        </div>;})}
    </div>
  </div>;
}

// ── 던전 ──
function SideDungeon({myS,dgExploring,dgRes,setDgRes,runDungeon,DUNGEONS,unlocks,aliveCols,useStaminaPot}){
  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:5}}>🏰 던전</div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
      <span style={{fontSize:11,color:"var(--tx2)",fontWeight:600}}>⚡{myS.stamina||0}/{myS.maxStamina||10}</span>
      {(myS.consumables?.stamina_pot||0)>0&&<button onClick={useStaminaPot}
        style={{padding:"3px 8px",borderRadius:7,border:"none",background:"rgba(6,182,212,0.12)",
          color:"var(--cyan)",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>
        ⚡포션({myS.consumables?.stamina_pot||0})</button>}
    </div>
    {dgExploring&&<div style={{borderRadius:10,overflow:"hidden",marginBottom:7}}>
      <svg width="100%" height={70} viewBox="0 0 300 70" style={{display:"block",width:"100%"}}>
        <rect width={300} height={70} fill="#1c1917"/>
        <ellipse cx={150} cy={45} rx={90} ry={30} fill="#f59e0b" opacity={0.1}/>
        <g style={{animation:"dungeonRun 2.2s linear forwards"}}>
          <text x={25} y={55} textAnchor="middle" fontSize={26}>{dgExploring.mon?.emoji||"❓"}</text>
        </g>
        <text x={150} y={24} textAnchor="middle" fontSize={10} fontWeight="900" fill="#fbbf24">{dgExploring.dg.emoji} {dgExploring.dg.name} 탐험중...</text>
      </svg>
    </div>}
    {dgRes&&!dgExploring&&<div style={{borderRadius:9,padding:"7px 9px",marginBottom:7,
      background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.2)"}}>
      <div style={{fontSize:11,fontWeight:700,color:"var(--green)"}}>✅ {dgRes.dg.name} 클리어!</div>
      <div style={{fontSize:10,color:"var(--tx2)",marginTop:1}}>{dgRes.dt||"드롭 없음"}</div>
      <button onClick={()=>setDgRes(null)} style={{marginTop:4,fontSize:10,padding:"2px 7px",borderRadius:5,border:"none",background:"rgba(16,185,129,0.12)",color:"var(--green)",cursor:"pointer",fontFamily:"inherit"}}>닫기</button>
    </div>}
    {!dgExploring&&DUNGEONS.map(dg=>{
      const locked=!unlocks.dungeons.includes(dg.id);
      const canEnter=!locked&&(myS.stamina||0)>=dg.stamina&&aliveCols.length>0;
      return <div key={dg.id} style={{border:`1px solid ${canEnter?"rgba(16,185,129,0.3)":"rgba(0,0,0,0.07)"}`,
        borderRadius:10,padding:"8px 10px",marginBottom:5,background:canEnter?"rgba(16,185,129,0.04)":"white",opacity:locked?0.4:1}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{fontSize:18}}>{locked?"🔒":dg.emoji}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--tx1)"}}>{dg.name} <span style={{color:"var(--gold)"}}>⚡{dg.stamina}</span></div>
            <div style={{fontSize:9,color:"var(--tx3)"}}>{dg.drops.map(d=>{const it=[...FOODS,...EVO_STONES,{id:"enhance_stone",emoji:"🔩"}].find(i=>i.id===d.id);return it?`${it.emoji}(${Math.round(d.rate*100)}%)`:""}).filter(Boolean).join(" ")}</div>
          </div>
          <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
            <button onClick={()=>!locked&&canEnter&&runDungeon(dg,1)} disabled={!canEnter}
              style={{padding:"3px 7px",borderRadius:6,border:"none",fontFamily:"inherit",
                background:canEnter?"var(--green)":"rgba(0,0,0,0.06)",
                color:canEnter?"white":"rgba(0,0,0,0.25)",fontSize:9,fontWeight:700,cursor:canEnter?"pointer":"default"}}>
              {locked?"🔒":canEnter?"1회":"부족"}
            </button>
            {canEnter&&[3,-1].map(n=>{
              const cnt=n===-1?Math.floor((myS.stamina||0)/dg.stamina):n;
              const ok2=(myS.stamina||0)>=dg.stamina*(n===-1?cnt:n)&&cnt>0;
              return <button key={n} onClick={()=>ok2&&runDungeon(dg,n)}
                style={{padding:"3px 6px",borderRadius:6,border:"none",fontFamily:"inherit",
                  background:ok2?"rgba(16,185,129,0.15)":"rgba(0,0,0,0.04)",
                  color:ok2?"var(--green)":"var(--tx3)",fontSize:9,fontWeight:700,cursor:ok2?"pointer":"default"}}>
                {n===-1?`전체(${cnt})`:n+"회"}
              </button>;
            })}
          </div>
        </div>
      </div>;
    })}
  </div>;
}
