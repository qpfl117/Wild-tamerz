function getTypeEvoMon(baseId,type){
  const base=MONS.find(m=>m.id===baseId);
  if(!base)return null;
  const t=TYPES[type];if(!t)return null;
  const bonus=t.bonus||{};
  return{...base,id:`${baseId}_T_${type}`,name:`${t.emoji}${base.name}`,color:t.color,
    typeEvo:type,baseId,hp:Math.floor(base.hp*(1+(bonus.hp||0))),
    atk:Math.floor(base.atk*(1+(bonus.atk||0))),spd:Math.floor(base.spd*(1+(bonus.spd||0))),

function rollFusion(gradeA,gradeB){
  const useGrade=gradeA;
  const table=FUSION_TABLE[useGrade]||FUSION_TABLE["COMMON"];
  let r=Math.random();
  for(const row of table){
    r-=row.r;
    if(r<=0){
      if(row.g==="fail")return null;
      return row.g;
    }
  }
  return null;
}

// 진화 조건 충족 여부 체크 함수
function checkEvoConds(chain, c, myS){
  if(!chain||!chain.conds)return true;
  return chain.conds.every(cond=>{
    if(cond.type==="lv")        return (c.lv||1)>=cond.val;
    if(cond.type==="enhance")   return (c.enhance||0)>=cond.val;
    if(cond.type==="hunt")      return (c.huntWins||0)>=cond.val;
    if(cond.type==="feed")      return (c.feedCount||0)>=cond.val;
    if(cond.type==="dungeon")   return (myS.totalDungeons||0)>=cond.val;
    if(cond.type==="pvp")       return (myS.pvpWins||0)>=cond.val;
    if(cond.type==="boss")      return Object.values(myS.bossKills||{}).reduce((a,b)=>a+b,0)>=cond.val;
    if(cond.type==="tamerLv")   return (myS.tamerLv||1)>=cond.val;
    return true;
  });
}

// 이스터에그 조건 (내부용 - 절대 노출 금지)
// 조건 A: localStorage "_og_ts" 없거나 현재시간 - _og_ts > 90일(ms)
// 조건 B: 현재 분(minute)의 초(second)가 [0..5] 이내 (타이밍)
// 조건 C: 보유 ball1 개수가 소수(prime number)
// 조건 D: 탱귤이를 3마리 이상 보유
// A+B+C+D 모두 만족 시 0.3% 확률로 출현
// → 실질 출현율 극히 낮음, 3개월 쿨다운으로 재출현 제한
function _isPrime(n){if(n<2)return false;for(let i=2;i<=Math.sqrt(n);i++)if(n%i===0)return false;return true;}
function _checkDivineConditions(myS){
  try{
    const ts=localStorage.getItem("_og_ts");
    const now=Date.now();
    if(ts&&now-Number(ts)<90*24*60*60*1000)return false; // 3개월 쿨다운
    const d=new Date();
    if(d.getSeconds()>7)return false; // 매 분 0~7초 사이
    const ball1=(myS?.balls?.ball1||0);
    if(!_isPrime(ball1))return false; // ball1 수량이 소수
    const tangyCount=(myS?.collection||[]).filter(c=>c.id==="tangy"||c.baseId==="tangy").length;
    if(tangyCount<3)return false; // 탱귤이 3마리 이상
    return true;
  }catch(e){return false;}
}

function initState(){

    collection:[],

    shopDaily:{},        // {itemId: 구매횟수}
    dexRewardsClaimed:[],
  };
}

function safe(s){
  const d=initState();
  if(!s)return d;
  return{
    ...d,...s,
    tamerLv:Math.max(1,s.tamerLv||1),tamerExp:s.tamerExp||0,
    balls:{...d.balls,...(s.balls||{})},
    foods:{...d.foods,...(s.foods||{})},
    stones:{...d.stones,...(s.stones||{})},
    specials:{...d.specials,...(s.specials||{})},
    consumables:{...d.consumables,...(s.consumables||{})},
    bossItems:{...d.bossItems,...(s.bossItems||{})},
    battleItems:{...d.battleItems,...(s.battleItems||{})},
    collection:Array.isArray(s.collection)?s.collection:[],
    dexSeen:Array.isArray(s.dexSeen)?s.dexSeen:[],
    achievements:Array.isArray(s.achievements)?s.achievements:[],
    achClaimed:Array.isArray(s.achClaimed)?s.achClaimed:[],
    titles:Array.isArray(s.titles)?s.titles:[],
    monthlyClaimedDays:Array.isArray(s.monthlyClaimedDays)?s.monthlyClaimedDays:[],
    bossKills:s.bossKills||{},
    online:s.online||false,
    stamina:s.stamina!==undefined?s.stamina:d.stamina,
    activeTitle:s.activeTitle||null,
    shopDailyDate:s.shopDailyDate||null,
    shopDaily:s.shopDaily||{},
    dexRewardsClaimed:Array.isArray(s.dexRewardsClaimed)?s.dexRewardsClaimed:[],
  };
}

function addTamerExp(s,amt){
  if(!s)return s;
  if((s.tamerLv||1)>=MAX_TAMER_LV)return s;
  let lv=s.tamerLv||1,exp=(s.tamerExp||0)+amt;
  while(lv<MAX_TAMER_LV&&exp>=tamerExpNeeded(lv)){exp-=tamerExpNeeded(lv);lv++;}
  if(lv>=MAX_TAMER_LV)exp=0;
  return{...s,tamerLv:lv,tamerExp:exp};
}

function addItem(s,id,amt){
  // 아이템 추가 헬퍼 - 어느 카테고리든 자동 탐색
  const keys=["balls","foods","stones","specials","consumables","bossItems","battleItems"];
  for(const k of keys){
    if(s[k]&&id in s[k]){
      return{...s,[k]:{...s[k],[id]:(s[k][id]||0)+amt}};
    }
  }
  // 없으면 consumables에 추가
  return{...s,consumables:{...s.consumables,[id]:(s.consumables[id]||0)+amt}};
}

function resetDaily(s){
  const today=new Date().toDateString();
  if(s.lastBattleDate===today)return s;
  return{...s,dailyBattles:0,lastBattleDate:today};
}
function refillStamina(s){
  const now=Date.now();
  const last=s.lastStaminaRefill||now;
  // 24시간에 15개 = 96분마다 1개 회복
  const REGEN_MS=96*60*1000; // 96분
  const elapsed=Math.floor((now-last)/REGEN_MS);
  if(elapsed<=0)return s;
  const maxSt=s.maxStamina||15;
  const ns=Math.min(maxSt,(s.stamina||0)+elapsed);
  return{...s,stamina:ns,lastStaminaRefill:last+elapsed*REGEN_MS};
}

function checkAch(s){
  if(!s)return s;
  const achs=Array.isArray(s.achievements)?s.achievements:[];
  const u=ACHS.filter(a=>!achs.includes(a.id)&&a.cond(s)).map(a=>a.id);
  if(!u.length)return s;
  // 칭호도 자동 추가
  let titles=[...(s.titles||[])];
  u.forEach(id=>{const a=ACHS.find(x=>x.id===id);if(a?.title&&!titles.includes(a.title))titles.push(a.title);});
  return{...s,achievements:[...achs,...u],titles};
}

function prepare(data){
  let s=safe(data);
  s=resetDaily(s);
  s=refillStamina(s);
  return checkAch(s);
}

function HpBar({cur,max,color}){
  const p=Math.max(0,Math.min(1,(cur||0)/Math.max(1,max||1)));
  const c=color||(p>0.5?"var(--green)":p>0.25?"var(--gold)":"var(--red)");
  return <div style={{background:"rgba(0,0,0,0.08)",borderRadius:6,height:7,width:"100%",overflow:"hidden"}}>
    <div style={{width:`${p*100}%`,height:"100%",background:c,borderRadius:6,transition:"width 0.3s",boxShadow:`0 0 6px ${c}66`}}/>
  </div>;
}

function Btn({onClick,disabled,color,children,sm,outline}){
  if(outline)return <button onClick={onClick} disabled={disabled} style={{
    padding:sm?"7px 0":"11px 0",borderRadius:10,border:`2px solid ${disabled?"rgba(0,0,0,0.1)":color}`,width:"100%",cursor:disabled?"default":"pointer",
    background:"transparent",color:disabled?"rgba(0,0,0,0.2)":color,fontSize:sm?12:14,fontWeight:700,
  }}>{children}</button>;
  return <button onClick={onClick} disabled={disabled} style={{
    padding:sm?"8px 0":"12px 0",borderRadius:11,border:"none",width:"100%",cursor:disabled?"default":"pointer",
    background:disabled?"rgba(0,0,0,0.06)":`linear-gradient(135deg,${color},${color}dd)`,
    color:disabled?"rgba(0,0,0,0.22)":"white",fontSize:sm?12:14,fontWeight:800,
    boxShadow:disabled?"none":`0 3px 14px ${color}50`,letterSpacing:0.3,
  }}>{children}</button>;
}

function Card({children,color,style={},onClick}){
  return <div onClick={onClick} style={{
    border:`1.5px solid ${color?color+"28":"rgba(139,92,246,0.10)"}`,
    borderRadius:"var(--radius)",padding:"11px 13px",marginBottom:8,
    background:"var(--card)",
    boxShadow:color?`0 2px 12px ${color}18`:"var(--shadow)",
    borderLeftColor:color||undefined,borderLeftWidth:color?4:undefined,
    cursor:onClick?"pointer":undefined,
    transition:"transform 0.1s,box-shadow 0.1s",
    ...style
  }}>{children}</div>;
}

function Badge({text,color}){

    fontSize:17,fontWeight:800,padding:"2px 7px",borderRadius:20,
    background:`${color}18`,color,border:`1.5px solid ${color}30`,

function TypeBadge({type}){

}

      const wx=Math.floor(fw*0.55);
      const wy=Math.floor(fh*0.16);
      const bm=MONS.find(m=>m.id===wild.id)||{color:"#888",rarity:"COMMON"};

      return <g transform={`translate(${wx},${wy})`}>
        <ellipse cx={55} cy={95} rx={42} ry={10} fill="rgba(0,0,0,0.2)"/>
        <circle cx={55} cy={52} r={isB?68:52} fill={bm.color} opacity={0.07}/>

           style={monHitAnim?{animation:"monHit 0.4s ease-out"}:cr==="fail"?{animation:"monHit 0.4s ease-out"}:cr==="success"?{animation:"catchSuccess 0.5s ease-out"}:{animation:"monAppear 0.6s ease-out"}}>

      </g>;

    {!wild&&<text x={fw/2} y={fh*0.6} textAnchor="middle" fontSize={14} fill="rgba(100,80,150,0.4)">몬스터 출현 대기 중...</text>}
  </svg>;
}

// ── 로그인 코드 시스템 ──
function generateCode(prefix){
  return prefix+Math.floor(1000+Math.random()*9000);
}
async function checkCodeExists(code){
  const snap=await db.ref("accounts/"+code).once("value");
  return snap.exists();
}
async function createAccount(code,player,nickname,charIdx){
  await db.ref("accounts/"+code).set({player,nickname,charIdx:charIdx||0,createdAt:Date.now()});
  await db.ref("players/"+code).set(initState());
}
async function loginAccount(code){
  const snap=await db.ref("accounts/"+code).once("value");
  return snap.exists()?snap.val():null;
}

    const saved=localStorage.getItem("wt_code");

    const c=(code||loginCode).toUpperCase().trim();
    if(!c){setLoginError("코드를 입력해주세요");return;}
    setLoginLoading(true);setLoginError("");
    const acc=await loginAccount(c);
    if(!acc){setLoginError("코드를 찾을 수 없어요");setLoginLoading(false);return;}
    const p=acc.player||"sik";
    // 내 데이터 구독
    db.ref("players/"+c).on("value",snap=>setMyS(prepare(snap.val())));
    // 상대방 데이터 구독
    const oppP=p==="sik"?"jing":"sik";
    db.ref("accounts").once("value",snap=>{
      const accounts=snap.val()||{};
      const oppCode=Object.keys(accounts).find(k=>accounts[k].player===oppP);
      if(oppCode)db.ref("players/"+oppCode).on("value",s=>setOppS(prepare(s.val())));
    });
    db.ref("players/"+c+"/online").set(true);
    db.ref("players/"+c+"/online").onDisconnect().set(false);
    localStorage.setItem("wt_code",c);
    setMyCode(c);setMyCharIdx(acc.charIdx||0);setMyNickname(acc.nickname||"");
    setPlayer(p);setScreen("game");setLoginLoading(false);
  };

  const doRegister=async()=>{

    const prefix=prefixMap[regChar];
    let code="",tries=0;
    do{code=generateCode(prefix);tries++;}while(await checkCodeExists(code)&&tries<10);
    await createAccount(code,p,regNickname,regChar);
    setRegCode(code);setRegStep(3);setLoginLoading(false);

// ── 스탯/장비 헬퍼 ──
function getEquipBonus(equipsOn, equips){
  let atk=0, def=0;
  if(!equipsOn||!equips)return{atk,def};
  BOSS_EQUIPS.forEach(eq=>{
    if(equips[eq.id]&&equipsOn[eq.slot]){atk+=eq.atk;def+=eq.def;}
  });
  return{atk,def};
}

function getEnhanceBonus(enhance){
  const e=enhance||0;
  let atkPct=0,hpPct=0,defPct=0;
  const t1=Math.min(e,3);
  atkPct+=t1*3; hpPct+=t1*2;
  const t2=Math.min(Math.max(e-3,0),3);
  atkPct+=t2*3; hpPct+=t2*2; defPct+=t2*2;
  const t3=Math.min(Math.max(e-6,0),3);
  atkPct+=t3*4; hpPct+=t3*3; defPct+=t3*3;
  if(e>=10){atkPct+=5;hpPct+=5;defPct+=5;}
  return{atkPct,hpPct,defPct};
}

function calcStats(c, MONS, TYPES){
  if(!c)return{hp:0,atk:0,def:0};
  const bm=MONS.find(m=>m.id===(c.baseId||c.id))||MONS.find(m=>m.id===c.id)||{atk:10,hp:30};
  const lv=c.lv||1;
  const tBonus=c.monType?TYPES[c.monType]?.bonus||{}:{};
  const hpMult=1+(tBonus.hp||0);
  const atkMult=1+(tBonus.atk||0);
  const eb=getEnhanceBonus(c.enhance||0);
  const fb=c.fusionBonus||{atk:0,hp:0};
  const hp=Math.floor((bm.hp+(lv-1)*5)*hpMult*(1+eb.hpPct/100))+fb.hp;
  const atk=Math.floor((bm.atk+(lv-1)*2)*atkMult*(1+eb.atkPct/100))+fb.atk;
  const def=eb.defPct;
  return{hp,atk,def,enhance:c.enhance||0};
}

function StatBadges({c,MONS,TYPES,small}){
  const s=calcStats(c,MONS,TYPES);
  const fs=small?10:11;
  return <div style={{display:"flex",gap:small?3:4,flexWrap:"wrap",marginTop:2}}>
    <span style={{fontSize:fs,fontWeight:700,color:"#ef4444",background:"rgba(239,68,68,0.08)",padding:"1px 5px",borderRadius:6}}>❤️{s.hp}</span>
    <span style={{fontSize:fs,fontWeight:700,color:"#f97316",background:"rgba(249,115,22,0.08)",padding:"1px 5px",borderRadius:6}}>⚔️{s.atk}</span>
    <span style={{fontSize:fs,fontWeight:700,color:"#3b82f6",background:"rgba(59,130,246,0.08)",padding:"1px 5px",borderRadius:6}}>🛡️{s.def>0?`+${s.def}%`:"0"}</span>
  </div>;
}

  const throwBall=()=>{

          ns=addItem(ns,"enhance_stone",esAmt);

  const feed=(idx,fid)=>{

    if((myS.foods[fid]||0)<=0){toast("먹이가 없어요!","var(--red)");return;}
    const food=FOODS.find(f=>f.id===fid);
    const c=(myS.collection||[])[idx];if(!c)return;
    const bm2=MONS.find(m=>m.id===(c.baseId||c.id))||{rarity:"COMMON"};
    const maxLv=GRADE_MAX_LV[bm2.rarity]||15;

  // 일괄 먹이 (목표 레벨까지)
  const bulkFeed=(idx,fid,targetLv)=>{
    const c=(myS.collection||[])[idx];if(!c)return;
    const bm2=MONS.find(m=>m.id===(c.baseId||c.id))||{rarity:"COMMON",hp:30};
    const maxLv=GRADE_MAX_LV[bm2.rarity]||15;
    const realTarget=Math.min(targetLv,maxLv);
    const curLv=c.lv||1;
    if(curLv>=realTarget){toast(`이미 Lv${curLv} 이상!`,"var(--gold)");return;}
    const food=FOODS.find(f=>f.id===fid);
    if(!food){return;}
    const have=myS.foods[fid]||0;
    if(have<=0){toast("먹이가 없어요!","var(--red)");return;}
    // 필요 먹이 수 계산
    let simLv=curLv,simExp=c.exp||0,simFeed=0;
    while(simLv<realTarget&&simFeed<have){
      const need=simLv*30;
      simExp+=food.expGain||15;
      simFeed++;
      if(simExp>=need){simLv++;simExp-=need;}
    }
    if(simFeed===0){toast("이미 목표 레벨!","var(--gold)");return;}
    setMy(s=>{
      let remFood=s.foods[fid]||0;
      const nc=(s.collection||[]).map((cc,i)=>{
        if(i!==idx)return cc;
        const bm3=MONS.find(m=>m.id===(cc.baseId||cc.id))||{rarity:"COMMON",hp:30};
        const mLv=GRADE_MAX_LV[bm3.rarity]||15;
        let lv=cc.lv||1,exp=cc.exp||0,fc=cc.feedCount||0;
        const goal=Math.min(realTarget,mLv);
        while(lv<goal&&remFood>0){
          const need=lv*30;
          exp+=(food.expGain||15);remFood--;fc++;
          if(exp>=need){lv++;exp-=need;}
        }
        const nm=bm3.hp+(lv-1)*5;
        return{...cc,lv,exp,maxHp:nm,hp:nm,curHp:nm,feedCount:fc};
      });
      return addTamerExp({...s,collection:nc,foods:{...s.foods,[fid]:remFood}},simFeed*10);

  const evolve=(idx)=>{
    const c=(myS.collection||[])[idx];if(!c)return;
    // ★ 버그수정: baseId가 있으면 baseId로 체인 탐색
    const lookupId=c.baseId||c.id;
    const chain=EVO_CHAIN[lookupId];
    if(!chain){toast("진화 불가 소환수입니다","var(--red)");return;}
    // 조건 체크
    if(!checkEvoConds(chain,c,myS)){
      toast(`조건 미충족! ${chain.condDesc}`,"var(--orange)");return;
    }
    // 진화증표 진화 (에픽→레전드)
    const isLegendProof=chain.stone==="legend_proof";
    if(isLegendProof){
      if((myS.consumables?.legend_proof||0)<=0){
        toast("🏆 진화증표가 필요합니다! (뮤턴트 방생 시 획득)","var(--red)");return;

      if(!unlocks.stones.includes(chain.stone)){toast("테이머 레벨업 필요!","var(--red)");return;}
      if((myS.stones[chain.stone]||0)<=0){toast(`${EVO_STONES.find(s=>s.id===chain.stone)?.name} 필요!`,"var(--red)");return;}
    }
    const bm=MONS.find(m=>m.id===lookupId)||{rarity:"COMMON"};
    const useShardOverride=(myS.bossItems?.ancient_shard||0)>0;
    // 진화 결과 롤 (진화증표/고대파편은 무조건 성공)
    let evoResult; // "great"|"success"|"fail"
    if(isLegendProof){
      evoResult="success"; // 레전드 진화 확정 성공
    }else if(useShardOverride){
      evoResult="success"; // 고대파편 확정 성공
    }else{
      const rates=EVO_RATES[bm.rarity]||EVO_RATES["COMMON"];
      const roll=Math.random();
      // rates[0]=특수진화율(great), rates[1]=일반진화율(success), 나머지=실패
      if(roll<rates[0]) evoResult="great";
      else if(roll<rates[0]+rates[1]) evoResult="success";
      else evoResult="fail";
    }
    setMy(s=>{
      let ns;
      if(isLegendProof){
        ns={...s,consumables:{...s.consumables,legend_proof:Math.max(0,(s.consumables?.legend_proof||0)-1)}};
      }else{
        ns={...s,stones:{...s.stones,[chain.stone]:(s.stones[chain.stone]||1)-1}};
      }
      if(useShardOverride&&!isLegendProof)ns={...ns,bossItems:{...ns.bossItems,ancient_shard:Math.max(0,(ns.bossItems.ancient_shard||1)-1)}};
      if(evoResult==="fail"){
        ns=addItem(ns,"enhance_stone",3);
        return checkAch({...ns,evoFails:(ns.evoFails||0)+1});
      }
      // 성공 or 대성공
      const toId=evoResult==="great"&&chain.altTo ? chain.altTo : chain.to;
      const eb=MONS.find(m=>m.id===toId);
      if(!eb)return ns;
      // 대성공 보너스: 스탯 +10%
      const greatBonus=evoResult==="great"?1.1:1;
      const nc=(ns.collection||[]).map((ci,i)=>i!==idx?ci:{
        id:eb.id,lv:1,exp:0,
        maxHp:Math.floor(eb.hp*greatBonus),hp:Math.floor(eb.hp*greatBonus),curHp:Math.floor(eb.hp*greatBonus),
        alive:true,enhance:0,
        monType:MON_BASE_TYPE[eb.id]||null,
        monType2:null, // 진화 시 이중속성 리셋
        awakenLv:0,   // 각성 리셋
        atkBonus:(MON_BASE_TYPE[eb.id]?TYPES[MON_BASE_TYPE[eb.id]]?.bonus?.atk||0:0),
        feedCount:0,huntWins:0,
        gender:ci.gender, // 성별 유지
      });
      const newId=toId;
      const newDex=(ns.dexSeen||[]).includes(newId)?ns.dexSeen:[...(ns.dexSeen||[]),newId];
      return addTamerExp({...ns,collection:nc,dexSeen:newDex,totalEvos:(ns.totalEvos||0)+1},evoResult==="great"?60:30);
    });
    if(evoResult==="great"){
      const altName=chain.altName||chain.name;
      toast(`⭐ 특수진화 성공! ${altName}으로 진화!`,"#f59e0b");
    }else if(evoResult==="success"){
      toast(`✨ ${chain.name} 진화 성공!`,"var(--purple)");
    }else if(evoResult==="fail"){
      toast("💔 진화 실패... 진화석 소모 · 🔩×3 위로 보상","var(--orange)");
    }
  };

  const bulkRelease=()=>{
    if(bulkSelected.size===0){toast("방생할 몬스터를 선택하세요!","var(--red)");return;}
    // 잠금된 소환수 필터링
    const lockedCount=[...bulkSelected].filter(i=>(myS.collection||[])[i]?.locked).length;
    if(lockedCount>0){toast(`🔒 잠금된 소환수 ${lockedCount}마리 제외됨`,"var(--orange)");}
    const indices=[...bulkSelected].filter(i=>!(myS.collection||[])[i]?.locked).sort((a,b)=>b-a);
    if(indices.length===0){toast("방생할 몬스터가 없어요!","var(--red)");return;}
    let totalDesc={};
    setMy(s=>{
      let ns={...s,totalReleases:(s.totalReleases||0)+indices.length};
      // 역순으로 제거
      let col=[...ns.collection];
      indices.forEach(idx=>{
        const c=col[idx];if(!c)return;
        const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{rarity:"COMMON"};
        const rwdList=RELEASE_REWARD[bm.rarity]||[{id:"food1",amt:1}];
        const lvBonus=Math.min(2.0,1.0+(c.lv||1)*0.05);
        rwdList.forEach(({id,amt})=>{
          const finalAmt=Math.max(1,Math.round(amt*lvBonus));
          totalDesc[id]=(totalDesc[id]||0)+finalAmt;
          ns=addItem(ns,id,finalAmt);
        });
      });
      ns={...ns,collection:col.filter((_,i)=>!indices.includes(i))};
      return addTamerExp(ns,5*indices.length);
    });
    const descStr=Object.entries(totalDesc).map(([id,amt])=>{
      const it=[...BALLS,...FOODS,...EVO_STONES,...CONSUMABLES].find(x=>x.id===id)||{emoji:"📦"};
      return `${it.emoji}×${amt}`;
    }).join(" ");
    toast(`🕊️ ${indices.length}마리 방생! ${descStr}`,"var(--gold)");
    setBulkSelected(new Set());
    setBulkReleaseMode(false);
  };

  const toggleBulkSelect=(idx)=>{
    setBulkSelected(prev=>{
      const next=new Set(prev);
      if(next.has(idx))next.delete(idx);else next.add(idx);
      return next;
    });
  };

  const bulkSelectByGrade=(grade)=>{
    const indices=col.map((_,i)=>i).filter(i=>{
      const c=col[i];
      const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{rarity:"COMMON"};
      return grade==="all"||bm.rarity===grade;
    });
    setBulkSelected(new Set(indices));
  };

  const gm=(col,idx)=>{
    const c=(col||[])[idx];if(!c)return null;
    const baseId=c.baseId||c.id;
    const bm=MONS.find(m=>m.id===baseId)||MONS.find(m=>m.id===c.id)||{atk:10,spd:10,hp:30};
    const lv=c.lv||1;
    const tBonus=c.monType?TYPES[c.monType]?.bonus||{}:{};
    const hpMult=1+(tBonus.hp||0);
    const baseHp=Math.floor((bm.hp+(lv-1)*5)*hpMult);
    return{...bm,...c,lv,maxHp:baseHp,curHp:baseHp,atk:bm.atk+(lv-1)*2,
      atkBonus:tBonus.atk||0,spdBonus:tBonus.spd||0,monType:c.monType||null,baseId};
  };

  const startHunt=()=>{
    if(myPick===null)return;
    const m1=gm(myS.collection,myPick);
    const newCount=huntCount+1;
    setHuntCount(newCount);
    // 보스 출현: 100회 기반 누적 확률 (비공개)
    // 40회 이상부터 확률 시작, 70회부터 급증, 100회는 100%
    const bossChance=newCount>=100?1:newCount>=70?(newCount-70)/30*0.6+0.15:newCount>=40?(newCount-40)/30*0.15:0;
    if(tLv>=15&&Math.random()<bossChance){
      const bossId=BOSS_IDS[Math.floor(Math.random()*BOSS_IDS.length)];
      const bm=MONS.find(m=>m.id===bossId);
      const lv=Math.max(5,tLv);
      const boss={...bm,lv,maxHp:bm.hp+(lv-1)*8,curHp:bm.hp+(lv-1)*8,atk:bm.atk+(lv-1)*3};
      toast(`🌋 보스 ${bm.emoji}${bm.name} 출현!`,"var(--red)");
      setBossFight({bossId,boss,myMon:m1,myIdx:myPick,over:false,winner:null});
      setBossLog([`🌋 보스 ${boss.emoji}${boss.name} 출현!`]);
      setHuntCount(0); // 보스 출현 시 카운터 리셋
      setBs(null);
      return;
    }
    const pool=WILD_IDS.map(id=>MONS.find(m=>m.id===id)).filter(Boolean);
    // 사냥터도 필드와 동일한 테이머 Lv 기반 단계적 분포
    let gDistH;
    if(tLv<=5)       gDistH={COMMON:95, UNCOMMON:5,  RARE:0,  UNIQUE:0};
    else if(tLv<=15) gDistH={COMMON:70, UNCOMMON:28, RARE:2,  UNIQUE:0};
    else if(tLv<=30) gDistH={COMMON:45, UNCOMMON:40, RARE:12, UNIQUE:3};
    else             gDistH={COMMON:25, UNCOMMON:40, RARE:25, UNIQUE:10};
    const gRollH=Math.random()*100;
    let accH=0,selGH="COMMON";
    for(const g of ["COMMON","UNCOMMON","RARE","UNIQUE"]){
      accH+=(gDistH[g]||0);
      if(gRollH<accH){selGH=g;break;}
    }
    const gPoolH=pool.filter(m=>m.rarity===selGH);
    const eb=(gPoolH.length>0?gPoolH:pool.filter(m=>m.rarity==="COMMON"))[
      Math.floor(Math.random()*(gPoolH.length>0?gPoolH.length:pool.filter(m=>m.rarity==="COMMON").length))
    ]||pool[0];
    const lv=Math.max(1,Math.floor(tLv*(0.5+Math.random()*0.5)));
    const m2={...eb,lv,maxHp:eb.hp+(lv-1)*5,curHp:eb.hp+(lv-1)*5,atk:eb.atk+(lv-1)*2};
    setBs({m1,m2,m1idx:myPick,turn:"m1",over:false,winner:null,mode:"hunt"});
    setBlog([`🗺 ${m1.emoji}${m1.name} Lv.${m1.lv} VS 야생 ${m2.emoji}${m2.name} Lv.${lv}`]);
  };

  const getBattleLeft=()=>{
    const today=new Date().toDateString();
    const used=myS.lastBattleDate===today?(myS.dailyBattles||0):0;
    return Math.max(0,MAX_DAILY_BATTLES-used)+(myS.consumables?.battle_ticket||0);
  };

  const startPvp=()=>{
    if(myPick===null||oppPick===null)return;
    const m1=gm(myS.collection,myPick),m2=gm(oppS.collection,oppPick);
    if(!m1||!m2)return;
    if(Math.abs(m1.lv-m2.lv)>MAX_LV_DIFF){toast(`레벨 차이 ${MAX_LV_DIFF} 초과!`,"var(--red)");return;}
    const today=new Date().toDateString();
    const used=myS.lastBattleDate===today?(myS.dailyBattles||0):0;
    const tickets=myS.consumables?.battle_ticket||0;
    if(used>=MAX_DAILY_BATTLES&&tickets<=0){toast("배틀 횟수 소진!","var(--red)");return;}
    setMy(s=>{
      const todayUsed=s.lastBattleDate===today?(s.dailyBattles||0):0;
      if(todayUsed>=MAX_DAILY_BATTLES)return{...s,consumables:{...s.consumables,battle_ticket:Math.max(0,(s.consumables?.battle_ticket||1)-1)}};
      return{...s,dailyBattles:todayUsed+1,lastBattleDate:today};
    });
    setBs({m1,m2,m1idx:myPick,m2idx:oppPick,turn:"m1",over:false,winner:null,mode:"pvp"});
    setBlog([`⚔ ${m1.emoji}${m1.name} Lv.${m1.lv} VS ${m2.emoji}${m2.name} Lv.${m2.lv}`]);
  };

  // ── 실시간 배틀 요청 ──
  const sendBattleRequest=(oppCode)=>{
    if(myPick===null){toast("먼저 몬스터를 선택하세요!","var(--red)");return;}
    const roomId=`battle_${Date.now()}`;
    const m1=gm(myS.collection,myPick);
    if(!m1)return;
    // Firebase에 배틀룸 생성
    db.ref(`battleRooms/${roomId}`).set({
      host:player,hostMon:{...m1,collection:undefined},
      guest:null,guestMon:null,
      status:"waiting",
      turn:"host",hostHp:m1.maxHp,guestHp:0,
      log:[`⚔️ ${myNickname||player}의 배틀 요청!`],
      createdAt:Date.now(),
    });
    // 상대에게 배틀 요청 알림
    db.ref(`players/${oppCode}/battleRequest`).set({roomId,from:player,nickname:myNickname||player,monName:m1.name,monEmoji:m1.emoji});
    setBattleRoomId(roomId);
    // 룸 구독
    db.ref(`battleRooms/${roomId}`).on('value',snap=>{
      const room=snap.val();
      if(room)setBattleRoom(room);
    });
    toast(`⚔️ ${oppCode}에게 배틀 요청!`,"var(--purple)");
  };

  const acceptBattleRequest=(roomId,oppCode)=>{
    if(myPick===null){toast("먼저 몬스터를 선택하세요!","var(--red)");return;}
    const m2=gm(myS.collection,myPick);
    if(!m2)return;
    db.ref(`battleRooms/${roomId}`).update({
      guest:player,guestMon:{...m2},guestHp:m2.maxHp,status:"ongoing",
    });
    setBattleRoomId(roomId);
    db.ref(`battleRooms/${roomId}`).on('value',snap=>{
      const room=snap.val();
      if(room)setBattleRoom(room);
    });
    // 요청 알림 제거
    db.ref(`players/${player}/battleRequest`).remove();
    toast("⚔️ 배틀 수락!","var(--green)");
  };

  const attackRealtime=()=>{
    if(!battleRoom||battleRoom.status!=="ongoing"||!battleRoomId)return;
    const isHost=battleRoom.host===player;
    const myTurn=(battleRoom.turn==="host"&&isHost)||(battleRoom.turn==="guest"&&!isHost);
    if(!myTurn){toast("상대방 차례입니다!","var(--orange)");return;}
    const atk=isHost?battleRoom.hostMon:battleRoom.guestMon;
    const defHp=isHost?battleRoom.guestHp:battleRoom.hostHp;
    const atkMult=getTypeMult(atk.monType,isHost?battleRoom.guestMon?.monType:battleRoom.hostMon?.monType);
    const dmg=Math.max(1,Math.round((atk.atk+(atk.lv-1)*2)*(0.85+Math.random()*0.3)*atkMult));
    const newDefHp=Math.max(0,defHp-dmg);
    const logMsg=`${atk.emoji}→ ${dmg}dmg${atkMult>1?" ⚡효과적!":atkMult<1?" 💤비효과...":""}`;
    const updates={
      turn:isHost?"guest":"host",
      log:[...(battleRoom.log||[]).slice(-8),logMsg],
    };
    if(isHost)updates.guestHp=newDefHp;
    else updates.hostHp=newDefHp;
    if(newDefHp<=0){
      updates.status="over";
      updates.winner=isHost?"host":"guest";
      updates.log=[...(battleRoom.log||[]).slice(-8),logMsg,`🏆 ${myNickname||player} 승리!`];
      // 승리 처리
      const esAmt=3+Math.floor(Math.random()*4);
      const tokenAmt=2+Math.floor(Math.random()*4);
      setMy(s=>{let ns={...s,pvpWins:(s.pvpWins||0)+1};
        ns=addItem(ns,"enhance_stone",esAmt);
        ns=addItem(ns,"battle_token",tokenAmt);
        return addTamerExp(ns,50);});
      toast(`🏆 실시간 배틀 승리! 🔩×${esAmt} 🪙×${tokenAmt}`,"var(--gold)");
    }
    db.ref(`battleRooms/${battleRoomId}`).update(updates);
  };

  const leaveRealtime=()=>{
    if(battleRoomId){
      db.ref(`battleRooms/${battleRoomId}`).off();
      db.ref(`battleRooms/${battleRoomId}`).remove();
    }
    setBattleRoom(null);setBattleRoomId(null);
    db.ref(`players/${player}/battleRequest`).remove();
  };

  const attack=()=>{
    if(!bs||bs.over)return;
    const{m1,m2,turn}=bs;
    const atk=turn==="m1"?m1:m2,def=turn==="m1"?m2:m1;
    const atkType=atk.monType||(MON_BASE_TYPE[atk.baseId||atk.id]);
    const defType=def.monType||(MON_BASE_TYPE[def.baseId||def.id]);
    const typeMult=getTypeMult(atkType,defType);
    const divineAtkMult=turn==="m1"&&myS.divineItem?1.20:1;
    const enhBonusAtk=getEnhanceBonus(atk.enhance||0).atkPct/100;
    const equipB=turn==="m1"?getEquipBonus(myS.equipsOn,myS.equips):{atk:0,def:0};
    const atkStat=Math.floor((atk.atk+(atk.lv-1)*2)*(1+(atk.atkBonus||0))*(1+enhBonusAtk)*(1+equipB.atk/100)*divineAtkMult)+(atk.fusionBonus?.atk||0);
    const rawDmg=Math.max(1,atkStat+Math.floor(Math.random()*6)-2);
    const dmg=Math.max(1,Math.round(rawDmg*typeMult));
    // divine item + 강화 DEF: 내 몬스터가 방어할 때 피해 감소
    const divineDefBonus=turn==="m2"&&myS.divineItem?15:0;
    const enhDefBonus=turn==="m2"?getEnhanceBonus(def.enhance||0).defPct:0;
    const equipDefBonus=turn==="m2"?getEquipBonus(myS.equipsOn,myS.equips).def:0;
    const totalDef=Math.min(65,divineDefBonus+enhDefBonus+equipDefBonus);
    const nhp=Math.max(0,def.curHp-Math.floor(dmg*(1-totalDef/100)));
    const typeMsg=typeMult>1?"⚡효과적!":typeMult<1?"💤비효과적...":"";
    if(nhp<=0){
      setBs(s=>({...s,[turn==="m1"?"m2":"m1"]:{...def,curHp:0},over:true,winner:turn}));
      setBlog(l=>[...l,`${atk.emoji}→${def.emoji} ${dmg}dmg ${typeMsg}`,`🏆 ${atk.name} 승리!`]);
      if(turn==="m1"){
        const esAmt=3+Math.floor(Math.random()*4);
        const tokenAmt=2+Math.floor(Math.random()*4);
        if(bs.mode==="hunt"){
          const ballDrop=Math.floor(Math.random()*3);
          setMy(s=>{let ns={...s,huntWins:(s.huntWins||0)+1};
            // 소환수 개별 사냥 승리 누적
            ns={...ns,collection:(ns.collection||[]).map((c,ci)=>ci===bs.m1idx?{...c,huntWins:(c.huntWins||0)+1}:c)};
            if(ballDrop>0)ns.balls={...ns.balls,ball1:(ns.balls.ball1||0)+ballDrop};
            ns=addItem(ns,"enhance_stone",esAmt);
            return addTamerExp(ns,30);});
          toast(`🏆 사냥 승리! 🔩×${esAmt}${ballDrop>0?` 🟠×${ballDrop}`:""}`,"var(--green)");
        }else{
          let specialDrop=null;
          if(Math.random()<0.05)specialDrop="boss_crystal";
          else if(Math.random()<0.08)specialDrop="ancient_shard";
          setMy(s=>{let ns={...s,pvpWins:(s.pvpWins||0)+1};
            ns=addItem(ns,"enhance_stone",esAmt);
            ns=addItem(ns,"battle_token",tokenAmt);
            if(specialDrop)ns=addItem(ns,specialDrop,1);
            return addTamerExp(ns,50);});
          toast(`🏆 배틀 승리! 🔩×${esAmt} 🪙×${tokenAmt}`,"var(--green)");
        }
      }else{
        setMy(s=>{let ns={...s,losses:(s.losses||0)+1,
          collection:(s.collection||[]).map((c,i)=>i===bs.m1idx?{...c,alive:false,curHp:0}:c)};
          return addTamerExp(ns,10);});
        if(bs.mode==="pvp"&&bs.m2idx!==undefined)
          setOpp(s=>({...s,collection:(s.collection||[]).map((c,i)=>i===bs.m2idx?{...c,alive:false,curHp:0}:c)}));
        toast("😵 패배... 소환수가 쓰러졌다!","var(--red)");
      }
    }else{
      setBs(s=>({...s,[turn==="m1"?"m2":"m1"]:{...def,curHp:nhp},turn:turn==="m1"?"m2":"m1"}));
      setBlog(l=>[...l,`${atk.emoji}→${def.emoji} ${dmg}dmg ${typeMsg}`]);
    }
  };

  const resetB=()=>{setBs(null);setBlog([]);setMyPick(null);setOppPick(null);};

  const enhanceMon=(idx)=>{
    const c=(myS.collection||[])[idx];if(!c)return;
    const cur=c.enhance||0;
    if(cur>=MAX_ENHANCE){toast("이미 최고 강화!","var(--gold)");return;}
    const bm2=MONS.find(m=>m.id===(c.baseId||c.id))||{rarity:"COMMON"};
    const cost=getEnhanceCost(bm2.rarity, cur);
    const have=(myS.consumables?.enhance_stone||0);
    if(have<cost){toast(`강화석 ${cost}개 필요! (보유 ${have}개)`,"var(--red)");return;}

    const [successRate, greatRate]=ENHANCE_RATES[cur];
    const roll=Math.random();
    const isGreat=roll<greatRate; // 대성공
    const isOk=roll<successRate;  // 성공 (대성공 포함)

    const gradeIdx=GRADE_ORDER.indexOf(bm2.rarity);
    const isSafe=gradeIdx<=2; // COMMON/UNCOMMON/RARE: 실패해도 유지
    const canDestroy=gradeIdx>=5; // EPIC 이상: 대실패 시 파괴 가능
    let destroyRate=0;
    if(canDestroy&&!isOk){
      if(bm2.rarity==="EPIC")    destroyRate=cur>=7?0.12:cur>=5?0.06:0;
      else if(bm2.rarity==="LEGEND"||bm2.rarity==="MUTANT") destroyRate=cur>=6?0.15:cur>=3?0.08:0.03;
      else if(bm2.rarity==="BOSS"||bm2.rarity==="DIVINE")   destroyRate=cur>=5?0.20:0.08;
    }
    const destroyed=!isOk&&canDestroy&&Math.random()<destroyRate;

    setMy(s=>{
      let ns=addItem(s,"enhance_stone",-cost);
      const nc=(ns.collection||[]).map((c2,i)=>{
        if(i!==idx)return c2;
        if(isGreat) return{...c2,enhance:Math.min(MAX_ENHANCE,cur+2)}; // 대성공: +2
        if(isOk)   return{...c2,enhance:cur+1};                        // 성공: +1
        if(destroyed)return{...c2,alive:false,curHp:0};              // 대실패: 파괴 (강화수치 유지)
        if(isSafe) return{...c2};                                       // 실패(안전): 유지
        return{...c2,enhance:Math.max(0,cur-1)};                        // 실패: -1
      });
      return{...ns,collection:nc};
    });

    if(isGreat) toast(`🌟 대성공!! +${Math.min(MAX_ENHANCE,cur+2)}강!`,"var(--gold)");
    else if(isOk) toast(`🔩 +${cur+1}강 성공!`,"var(--green)");
    else if(destroyed) toast(`💀 대실패!! 소환수가 파괴됐다...`,"var(--red)");
    else if(isSafe) toast(`💥 강화 실패... (+${cur}강 유지)`,"var(--orange)");
    else toast(`💥 강화 실패! +${cur>0?cur-1:0}강으로 하락`,"var(--red)");
  };

  const typeEvolveRandom=(idx)=>{
    if((myS.stones?.stone1||0)<5){toast("진화석 5개 필요!","var(--red)");return;}
    const c2=(myS.collection||[])[idx];
    const typeKeys=Object.keys(TYPES).filter(t=>c2&&t!==c2.monType);
    if(!typeKeys.length)return;
    const rndType=typeKeys[Math.floor(Math.random()*typeKeys.length)];
    setMy(s=>({...s,stones:{...s.stones,stone1:Math.max(0,(s.stones.stone1||5)-5)}}));
    typeEvolve(idx,rndType);
  };

  const typeEvolve=(idx,type)=>{
    const c=(myS.collection||[])[idx];if(!c)return;
    const stoneId=`tstone_${type}`;
    if((myS.typeStones?.[stoneId]||0)<=0){toast(`${TYPES[type]?.emoji}속성석 없음!`,"var(--red)");return;}
    const baseId=c.baseId||c.id;
    const baseMon=MONS.find(m=>m.id===baseId);
    if(!baseMon){toast("진화 불가 몬스터","var(--red)");return;}
    if(baseMon.rarity==="LEGEND"||baseMon.rarity==="BOSS"){toast("해당 등급은 속성 진화 불가!","var(--red)");return;}
    const t=TYPES[type];
    const bonus=t.bonus||{};
    const newMon={...c,id:`${baseId}_T_${type}`,name:`${t.emoji}${baseMon.name}`,
      monType:type,baseId,maxHp:Math.floor((baseMon.hp+(c.lv-1)*5)*(1+(bonus.hp||0))),
      hp:Math.floor((baseMon.hp+(c.lv-1)*5)*(1+(bonus.hp||0))),
      curHp:Math.floor((baseMon.hp+(c.lv-1)*5)*(1+(bonus.hp||0))),
      atkBonus:bonus.atk||0,spdBonus:bonus.spd||0,alive:true};
    setMy(s=>{
      let ns=addItem(s,stoneId,-1);
      const nc=(ns.collection||[]).map((ci,i)=>i===idx?newMon:ci);
      const typeEvoId=`${baseId}_T_${type}`;
      const newDex=(ns.dexSeen||[]).includes(typeEvoId)?ns.dexSeen:[...(ns.dexSeen||[]),typeEvoId];
      return addTamerExp({...ns,collection:nc,dexSeen:newDex},20);
    });
    toast(`${t.emoji} ${baseMon.name} → ${t.name} 속성 진화!`,"var(--purple)");
  };

  const claimAchReward=(id)=>{
    const a=ACHS.find(x=>x.id===id);if(!a||!a.reward)return;
    setMy(s=>{
      let ns={...s,achClaimed:[...(s.achClaimed||[]),id]};
      Object.entries(a.reward).forEach(([rid,amt])=>{ns=addItem(ns,rid,amt);});
      return ns;
    });
    toast(`🎁 ${a.name} 보상 수령!`,"var(--gold)");
  };

  const fuse=()=>{
    if(fa===null||fb===null||fa===fb){toast("두 마리 선택!","var(--red)");return;}
    const col=myS.collection||[];
    const a=col[fa],b=col[fb];if(!a||!b)return;
    const bmA=MONS.find(m=>m.id===a.id)||{rarity:"COMMON"};
    const bmB=MONS.find(m=>m.id===b.id)||{rarity:"COMMON"};
    const isMutA=bmA.rarity==="MUTANT",isMutB=bmB.rarity==="MUTANT";
    // 뮤턴트 + 에픽 조합 체크 (레전드 랜덤 진화 루트)
    const isMutantEpicCombo=(isMutA&&bmB.rarity==="EPIC")||(isMutB&&bmA.rarity==="EPIC");
    if(!isMutA&&!isMutB&&bmA.rarity!==bmB.rarity){toast("같은 등급끼리만! (또는 MUTANT+EPIC)","var(--red)");return;}
    if(isMutA&&isMutB){toast("MUTANT끼리는 합성 불가!","var(--red)");return;}
    if((isMutA||isMutB)&&!isMutantEpicCombo){
      toast("MUTANT는 EPIC과만 합성 가능 (→랜덤 레전드)","var(--red)");return;
    }
    if(bmA.rarity==="LEGEND"||bmB.rarity==="LEGEND"){toast("LEGEND는 합성 불가!","var(--red)");return;}
    if(bmA.rarity==="BOSS"||bmB.rarity==="BOSS"){toast("BOSS는 합성 불가!","var(--red)");return;}
    if((a.enhance||0)<MAX_ENHANCE||(b.enhance||0)<MAX_ENHANCE){toast("두 몬스터 모두 +10강 필요!","var(--red)");return;}

    // 🏆 뮤턴트+에픽 합성: 무조건 랜덤 레전드 (확률표 건너뛰기)
    if(isMutantEpicCombo){
      const legendPool=FUSION_POOL["LEGEND"]||[];
      if(legendPool.length===0){toast("레전드 풀 없음","var(--red)");return;}
      // 뮤턴트+에픽: 70% 레전드 / 30% 실패 (양쪽 소멸)
      const mutEpicSuccess=Math.random()<0.70;
      if(!mutEpicSuccess){
        setFusAnim("fail");
        setTimeout(()=>setFusAnim(null),2200);
        setMy(s=>{
          const sortedRemove=[fa,fb].sort((a,b)=>b-a);
          let nc=[...(s.collection||[])];
          sortedRemove.forEach(ri=>nc.splice(ri,1));
          return addTamerExp({...s,collection:nc},5);
        });
        setFa(null);setFb(null);
        toast("💥 뮤턴트+에픽 합성 실패... 두 몬스터 소멸 (70% 도전)","var(--red)");
        return;
      }
      const resultId=legendPool[Math.floor(Math.random()*legendPool.length)];
      const res=MONS.find(m=>m.id===resultId);if(!res)return;
      setFusAnim("great");
      setTimeout(()=>setFusAnim(null),2200);
      setMy(s=>{
        const sortedRemove=[fa,fb].sort((a,b)=>b-a);
        let nc=[...(s.collection||[])];
        sortedRemove.forEach(ri=>nc.splice(ri,1));
        const baseHp=res.hp+5;
        nc.push({id:res.id,lv:1,exp:0,maxHp:baseHp,hp:baseHp,curHp:baseHp,alive:true,enhance:0,fusionBonus:{atk:3,hp:5},gender:Math.random()<0.5?"♂":"♀"});
        return addTamerExp({...s,collection:nc,totalFusions:(s.totalFusions||0)+1},100);
      });
      setFusRes({res,grade:"LEGEND",bonus:{atk:3,hp:5}});
      setFa(null);setFb(null);
      toast(`🏆 ${res.name} [LEGEND] 탄생! (뮤턴트+에픽 → 랜덤 레전드)`,"var(--gold)");
      return;
    }

    const useCrystal=(myS.bossItems?.boss_crystal||0)>0;
    const resultGrade=rollFusion(bmA.rarity,bmB.rarity,useCrystal);
    setFusRes(null);setFusAnim(null);
    if(!resultGrade){
      // 합성 실패: A는 항상 소멸, B는 50% 확률로 생존
      const bSurvives=Math.random()<0.5;
      setFusAnim("fail");
      setTimeout(()=>setFusAnim(null),2200);
      setMy(s=>{
        let nc=[...(s.collection||[])];
        if(bSurvives){
          const removeIdx=fa;
          nc=nc.filter((_,i)=>i!==removeIdx);
          toast(`💥 합성 실패! A 몬스터 소멸 · B는 살아남았습니다!`,"var(--orange)");
        }else{
          const sortedRemove=[fa,fb].sort((a,b)=>b-a);
          sortedRemove.forEach(ri=>{nc.splice(ri,1);});
          toast(`💥 합성 실패! 두 몬스터 모두 소멸...`,"var(--red)");
        }
        return addTamerExp({...s,collection:nc},5);
      });
      setFa(null);setFb(null);return;
    }
    const pool=FUSION_POOL[resultGrade];
    if(!pool||!pool.length){toast("합성 결과 없음","var(--red)");return;}
    const resultId=pool[Math.floor(Math.random()*pool.length)];
    const res=MONS.find(m=>m.id===resultId);if(!res)return;
    // 결과 등급에 따른 애니 결정
    const gradeIdx=GRADE_ORDER.indexOf(resultGrade);
    const inputIdx=GRADE_ORDER.indexOf(bmA.rarity);
    const isGreat=gradeIdx>=inputIdx+2||(resultGrade==="LEGEND");
    setFusAnim(isGreat?"great":"success");
    setTimeout(()=>setFusAnim(null),2200);
    if(useCrystal)setMy(s=>({...s,bossItems:{...s.bossItems,boss_crystal:Math.max(0,(s.bossItems.boss_crystal||1)-1)}}));
    setMy(s=>{
      const sortedRemove=[fa,fb].sort((a,b)=>b-a);
      let nc=[...(s.collection||[])];
      sortedRemove.forEach(ri=>nc.splice(ri,1));
      // 등급별 합성 보너스 스탯 (랜덤)
      const fusionBonusTable={
        "RARE":{atk:[1,2],hp:[1,2]},
        "UNIQUE":{atk:[1,3],hp:[1,3]},
                "EPIC":{atk:[2,4],hp:[2,4]},
        "LEGEND":{atk:[2,4],hp:[2,4]},
      };
      const fbt=fusionBonusTable[resultGrade]||{atk:[1,2],hp:[1,2]};
      const rndRange=(r)=>r[0]+Math.floor(Math.random()*(r[1]-r[0]+1));
      const fusionBonus={atk:rndRange(fbt.atk),hp:rndRange(fbt.hp)};
      // 뮤턴트: EPIC+ 결과일 때 3% 확률로 뮤턴트 버전 등장
      let finalRes=res;
      let isMutant=false;
      if((resultGrade==="EPIC"||resultGrade==="LEGEND")&&MUTANT_POOL[res.id]&&Math.random()<0.03){
        const mutantMon=MONS.find(m=>m.id===MUTANT_POOL[res.id]);
        if(mutantMon){
          finalRes=mutantMon;
          isMutant=true;
        }
      }
      const baseHp=finalRes.hp+fusionBonus.hp;
      nc.push({id:finalRes.id,lv:1,exp:0,maxHp:baseHp,hp:baseHp,curHp:baseHp,alive:true,enhance:0,fusionBonus,gender:Math.random()<0.5?"♂":"♀",isMutant});
      return addTamerExp({...s,collection:nc,totalFusions:(s.totalFusions||0)+1},40);
    });
    setFusRes({res,grade:resultGrade,bonus:fusionBonus});setFa(null);setFb(null);
    toast(`🔮 ${res.name} [${resultGrade}] 합성!`,"var(--purple)");
  };

  const useStaminaPot=()=>{
    if((myS.consumables?.stamina_pot||0)<=0){toast("스태미나포션 없음!","var(--red)");return;}
    setMy(s=>{const ns=Math.min(s.maxStamina||10,(s.stamina||0)+5);
      return{...s,stamina:ns,consumables:{...s.consumables,stamina_pot:Math.max(0,(s.consumables.stamina_pot||1)-1)}};});
    toast("⚡ 스태미나 +5!","var(--cyan)");
  };

  const runDungeon=(dg,times=1)=>{
    if(!unlocks.dungeons.includes(dg.id)){toast("테이머 레벨업 필요!","var(--red)");return;}
    const maxRuns=times===-1?Math.floor((myS.stamina||0)/dg.stamina):times; // -1=일괄
    const actualRuns=Math.max(1,Math.min(maxRuns,Math.floor((myS.stamina||0)/dg.stamina)));
    if(actualRuns<=0||(myS.stamina||0)<dg.stamina){toast("스태미나 부족!","var(--red)");return;}
    const eligible=(myS.collection||[]).filter(c=>c.alive!==false);
    if(eligible.length===0){toast("몬스터가 없어요!","var(--red)");return;}
    const picked=eligible[Math.floor(Math.random()*eligible.length)];
    setDgExploring({dg,mon:picked,runs:actualRuns});
    setDgRes(null);
    const delay=actualRuns===1?2200:Math.min(2200,800+actualRuns*200);
    setTimeout(()=>{
      // actualRuns 횟수만큼 드롭 누적
      const totalDrops={};
      for(let r=0;r<actualRuns;r++){
        dg.drops.forEach(d=>{if(Math.random()<d.rate)totalDrops[d.id]=(totalDrops[d.id]||0)+d.amt;});
      }
      setMy(s=>{
        let ns={...s,
          stamina:Math.max(0,(s.stamina||0)-dg.stamina*actualRuns),
          totalDungeons:(s.totalDungeons||0)+actualRuns,
          lastStaminaRefill:s.lastStaminaRefill||Date.now()};
        Object.entries(totalDrops).forEach(([id,amt])=>{
          if(id==="TYPE_STONE_RANDOM"){
            const typeKeys=Object.keys(TYPES);
            const rndType=typeKeys[Math.floor(Math.random()*typeKeys.length)];
            ns=addItem(ns,`tstone_${rndType}`,amt);
          }else{ns=addItem(ns,id,amt);}
        });
        return addTamerExp(ns,30*actualRuns);
      });
      const dt=Object.entries(totalDrops).filter(([id])=>id!=="TYPE_STONE_RANDOM")
        .map(([id,amt])=>{const it=[...FOODS,...EVO_STONES,{id:"enhance_stone",emoji:"🔩"}].find(i=>i.id===id);return it?`${it.emoji}×${amt}`:""})
        .filter(Boolean).join(" ")||"없음";
      setDgExploring(null);
      setDgRes({dt,dg,runs:actualRuns});
      toast(`🏰 ${dg.name} ×${actualRuns}회! ${dt}`,"var(--green)");
    },delay);
  };

  const buyShop=(item)=>{
    const canBuy=Object.entries(item.cost).every(([id,amt])=>getItemAmt(id)>=amt);
    if(!canBuy){toast("재료 부족!","var(--red)");return;}
    // 일일 제한 체크
    const today=new Date().toDateString();
    if(item.dailyLimit){
      const sdd=myS.shopDailyDate===today?myS.shopDaily||{}:{};
      const bought=sdd[item.id]||0;
      if(bought>=item.dailyLimit){toast(`오늘 구매 한도 초과! (${item.dailyLimit}회/일)`,"var(--red)");return;}
    }
    setMy(s=>{
      const today2=new Date().toDateString();
      const sdd2=s.shopDailyDate===today2?s.shopDaily||{}:{};
      let ns={...s,totalShops:(s.totalShops||0)+1,
        shopDailyDate:today2,
        shopDaily:{...sdd2,[item.id]:(sdd2[item.id]||0)+1}};
      Object.entries(item.cost).forEach(([id,amt])=>{ns=addItem(ns,id,-amt);});
      Object.entries(item.give).forEach(([id,amt])=>{ns=addItem(ns,id,amt);});
      return ns;
    });
    toast(`✅ ${item.name} 교환!`,"var(--green)");
  };

  const claimMonthly=(day)=>{
    const claimed=myS.monthlyClaimedDays||[];
    if(claimed.includes(day))return;
    if(day!==new Date().getDate()){toast("오늘 날짜만 수령 가능!","var(--red)");return;}
    const reward=MONTHLY_REWARDS.find(r=>r.day===day);if(!reward)return;
    setMy(s=>{
      let ns={...s,monthlyClaimedDays:[...(s.monthlyClaimedDays||[]),day],monthlyDays:(s.monthlyDays||0)+1};
      reward.items.forEach(({id,amt})=>{ns=addItem(ns,id,amt);});
      return addTamerExp(ns,50);
    });
    toast(`🎁 ${day}일 출석! ${reward.label}`,"var(--gold)");
  };

  const startBossFight=(bossId,pickedIdx)=>{
    const bm=MONS.find(m=>m.id===bossId);if(!bm)return;
    const lv=Math.max(5,tLv);
    const boss={...bm,lv,maxHp:bm.hp+(lv-1)*8,curHp:bm.hp+(lv-1)*8,atk:bm.atk+(lv-1)*3};
    const myMon=gm(myS.collection,pickedIdx);if(!myMon)return;
    setBossFight({bossId,boss,myMon,myIdx:pickedIdx,over:false,winner:null});
    setBossLog([`🌋 보스 ${boss.emoji}${boss.name} 출현!`]);
    setWild(null);setWildFixed(false);setCr(null);
  };

  const attackBoss=()=>{
    if(!bossFight||bossFight.over)return;
    const{boss,myMon}=bossFight;
    const myType=myMon.monType||(MON_BASE_TYPE[myMon.baseId||myMon.id]);
    const bossType=MON_BASE_TYPE[bossFight.bossId]||"fire";
    const bMult=getTypeMult(myType,bossType);
    const myAtkStat=Math.floor((myMon.atk+(myMon.lv-1)*2)*(1+(myMon.atkBonus||0)));
    const dmg=Math.max(1,Math.round((myAtkStat+Math.floor(Math.random()*8)-3)*bMult));
    const bDmg=Math.max(1,boss.atk+Math.floor(Math.random()*6)-2);
    const newBossHp=Math.max(0,boss.curHp-dmg);
    const newMyHp=Math.max(0,myMon.curHp-bDmg);
    const typeMsg=bMult>1?"⚡효과적!":bMult<1?"💤비효과적...":"";
    if(newBossHp<=0){
      const drops=BOSS_DROPS[bossFight.bossId]||{};
      const got={};
      if(Math.random()<(drops.crystal||0))got.boss_crystal=1;
      if(Math.random()<(drops.shard||0))got.ancient_shard=1;
      if(Math.random()<(drops.eye||0))got.boss_eye=1;
      if(Math.random()<(drops.trophy||0))got.trophy=1;
      let gotTypeStone=null;
      if(Math.random()<(drops.type_stone||0)){
        const typeKeys=Object.keys(TYPES);
        gotTypeStone=typeKeys[Math.floor(Math.random()*typeKeys.length)];
      }
      // 장비 드롭: 해당 보스 전용 장비 중 랜덤 1개, 30% 확률
      let gotEquip=null;
      const equipPool=drops.equip||[];
      if(equipPool.length>0&&Math.random()<0.05){
        gotEquip=equipPool[Math.floor(Math.random()*equipPool.length)];
      }
      setBossFight(bf=>({...bf,boss:{...bf.boss,curHp:0},over:true,winner:"player"}));
      setBossLog(l=>[...l,`${myMon.emoji}→${boss.emoji} ${dmg}dmg ${typeMsg}`,`🏆 보스 토벌!`]);
      setMy(s=>{
        let ns={...s};
        const nb={...s.bossItems};
        Object.entries(got).forEach(([k,v])=>nb[k]=(nb[k]||0)+v);
        ns={...ns,bossItems:nb};
        if(gotTypeStone)ns=addItem(ns,`tstone_${gotTypeStone}`,1);
        if(gotEquip)ns={...ns,equips:{...(ns.equips||{}),[gotEquip]:true}};
        const bk={...(ns.bossKills||{}),[bossFight.bossId]:(ns.bossKills?.[bossFight.bossId]||0)+1};
        return addTamerExp({...ns,bossKills:bk},100);
      });
      const tsInfo=gotTypeStone?TYPES[gotTypeStone]:null;
      const eqInfo=gotEquip?BOSS_EQUIPS.find(e=>e.id===gotEquip):null;
      const dt=[...Object.entries(got).map(([k,v])=>{const it=BOSS_ITEMS.find(i=>i.id===k);return it?`${it.emoji}×${v}`:""}),
        tsInfo?`${tsInfo.emoji}×1`:"",
        eqInfo?`${eqInfo.emoji}${eqInfo.name}`:""
      ].filter(Boolean).join(" ")||"없음";
      toast(`🏆 보스 토벌! ${dt}`,"var(--gold)");
    }else if(newMyHp<=0){
      setBossFight(bf=>({...bf,boss:{...bf.boss,curHp:newBossHp},myMon:{...bf.myMon,curHp:0},over:true,winner:"boss"}));
      setBossLog(l=>[...l,`${myMon.emoji}→${boss.emoji} ${dmg}dmg`,`${boss.emoji}→${myMon.emoji} ${bDmg}dmg`,`😵 패배...`]);
      setMy(s=>({...s,losses:(s.losses||0)+1,collection:(s.collection||[]).map((c,i)=>i===bossFight.myIdx?{...c,alive:false,curHp:0}:c)}));
      toast("😵 보스에게 패배!","var(--red)");
    }else{
      setBossFight(bf=>({...bf,boss:{...bf.boss,curHp:newBossHp},myMon:{...bf.myMon,curHp:newMyHp}}));
      setBossLog(l=>[...l,`${myMon.emoji}→${boss.emoji} ${dmg}dmg ${typeMsg}`,`${boss.emoji}→${myMon.emoji} ${bDmg}dmg`]);
    }
  };

  const col=myS.collection||[];
  const aliveCols=col.filter(c=>c.alive!==false);
  const oppHas=(oppS?.collection||[]).filter(c=>c.alive!==false).length>0;
  const todayDay=new Date().getDate();
  const battleLeft=getBattleLeft();
  const MAIN_TABS=[["field","🗺","필드"],["collection","📦","몬스터"],["bag","🎒","가방"],["shop","🛒","상점"],["explore","⛏️","탐험"],["hunt","⚔️","사냥터"],["fusion","⚗️","제련소"],["pvp","👥","대전"]];
  const MENU_TABS=[["monthly","📅","월간출석"],["tamer","🏅","테이머"],["dex","📖","도감"],["ach","🏆","업적"],["lab","🔬","연구소"],["help","❓","도움말"]];

  const SIDE_TABS_TOP=[["tamer","🏅","테이머"],["monthly","📅","출석"],["breed","🥚","교배"],["dex","📖","도감"],["ach","🏆","업적"],["lab","🔬","연구소"],["help","❓","도움말"]];

  return <div className="app-outer">
    <div className="game-col">

    {/* 신성 조우 풀스크린 오버레이 */}
    <DivineEncounter phase={youngsooPhase}/>

    {/* 토스트 */}
    {notif&&<div key={nk} style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",
      background:notif.color,color:"#fff",padding:"9px 20px",borderRadius:24,zIndex:9999,
      fontSize:16,fontWeight:800,pointerEvents:"none",whiteSpace:"nowrap",
      boxShadow:`0 4px 20px ${notif.color}77`,letterSpacing:0.3}}>{notif.msg}</div>}

    {/* 메뉴 오버레이 */}
    {menuOpen&&<div style={{position:"fixed",inset:0,background:"rgba(45,38,64,0.5)",zIndex:200,
      display:"flex",alignItems:"flex-end",backdropFilter:"blur(2px)"}} onClick={()=>setMenuOpen(false)}>
      <div style={{width:"100%",background:"white",borderRadius:"24px 24px 0 0",
        padding:"16px 14px 36px",boxShadow:"0 -8px 32px rgba(139,92,246,0.18)"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{width:40,height:4,borderRadius:2,background:"rgba(139,92,246,0.2)",margin:"0 auto 12px"}}/>
        <div style={{fontSize:17,fontWeight:800,color:"var(--purple)",marginBottom:10,textAlign:"center"}}>메뉴</div>
        {/* 메인 탭 */}
        <div style={{fontSize:11,color:"var(--tx3)",fontWeight:700,marginBottom:6}}>🗺 게임</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}}>
          {MENU_TABS.map(([k,icon,name])=>(
            <button key={k} onClick={()=>{setTab(k);setMenuOpen(false);resetB();}} style={{
              padding:"10px 0 8px",borderRadius:12,
              border:`2px solid ${tab===k?acHex:"rgba(139,92,246,0.1)"}`,
              background:tab===k?`${acHex}15`:"rgba(139,92,246,0.03)",
              color:tab===k?acHex:"var(--tx2)",cursor:"pointer",fontSize:15,
              fontWeight:tab===k?800:600,lineHeight:1.5,fontFamily:"inherit"}}>
              {icon}<br/><span style={{fontSize:11}}>{name}</span>
            </button>
          ))}
        </div>
        {/* 사이드 패널 탭 */}
        <div style={{fontSize:11,color:"var(--tx3)",fontWeight:700,marginBottom:6}}>📋 정보 / 관리</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
          {[["tamer","🏅","테이머"],["monthly","📅","출석"],["breed","🥚","교배"],["dex","📖","도감"],
            ["ach","🏆","업적"],["lab","🔬","연구소"],["help","❓","도움말"]].map(([k,icon,name])=>(
            <button key={k} onClick={()=>{setSideTabTop(k);setMenuOpen(false);}} style={{
              padding:"10px 0 8px",borderRadius:12,
              border:`2px solid ${sideTabTop===k?acHex:"rgba(139,92,246,0.1)"}`,
              background:sideTabTop===k?`${acHex}15`:"rgba(139,92,246,0.03)",
              color:sideTabTop===k?acHex:"var(--tx2)",cursor:"pointer",fontSize:15,
              fontWeight:sideTabTop===k?800:600,lineHeight:1.5,fontFamily:"inherit"}}>
              {icon}<br/><span style={{fontSize:11}}>{name}</span>
            </button>
          ))}
        </div>
      </div>

                  // 보유 먹이 중 가장 효율 좋은 것 우선 사용 (없으면 하위로 폴백)
                  const foodPriority=["food3","food2","food1"].filter(f=>unlocks.foods.includes(f));

                  const haveFood=myS.foods[bestFood]||0;
                  // 먹이별 색상

                    <span style={{fontSize:10,color:"var(--tx3)",alignSelf:"center",flexShrink:0}}>일괄:</span>
                    {targets.map(t=>(
                      <button key={t} onClick={()=>bulkFeed(i,bestFood,t)}

                  {GRADE_ORDER.indexOf(bm.rarity)<=2&&<span style={{fontSize:10,color:"var(--green)",marginLeft:3}}>✓안전</span>}
                  {bm.rarity==="UNIQUE"&&<span style={{fontSize:10,color:"var(--gold)",marginLeft:3}}>⚠하락</span>}
                  {GRADE_ORDER.indexOf(bm.rarity)>=5&&<span style={{fontSize:10,color:"var(--red)",marginLeft:3}}>💀파괴위험</span>}

                {(c.awakenLv||0)>0&&<div style={{fontSize:10,padding:"3px 8px",borderRadius:8,fontWeight:700,
                  background:"rgba(6,182,212,0.1)",color:"#06b6d4",border:"1px solid rgba(6,182,212,0.25)"}}>

                {c.isMutant&&<div style={{fontSize:10,padding:"3px 8px",borderRadius:8,fontWeight:700,

                  💠 뮤턴트

                {bm.rarity==="MUTANT"&&<div style={{fontSize:10,padding:"3px 8px",borderRadius:8,fontWeight:700,
                  background:"rgba(0,172,193,0.1)",color:"#00acc1",border:"1px solid rgba(0,172,193,0.25)"}}>
                  🧬 돌연변이
                </div>}
                {(c.baseId||c.id)!==c.id&&<div style={{fontSize:10,padding:"3px 8px",borderRadius:8,fontWeight:700,
                  background:"rgba(16,185,129,0.1)",color:"var(--green)",border:"1px solid rgba(16,185,129,0.25)"}}>
                  ⚗️ 진화체
                </div>}
                {chain&&condOk&&<div style={{fontSize:9,color:"var(--tx3)",width:"100%"}}>
                  → {chain.name} {chain.altTo&&`(대성공: ${chain.altName?.replace("(대성공!)","").trim()})`}
                </div>}
              </div>
              <div style={{marginBottom:5}}>
                <span style={{fontSize:13,color:"var(--tx3)",fontWeight:600}}>속성: </span>
                {c.monType
                  ?<span style={{fontSize:13,fontWeight:700,color:TYPES[c.monType]?.color}}>{TYPES[c.monType]?.emoji} {TYPES[c.monType]?.name}</span>
                  :<span style={{fontSize:13,color:"var(--tx3)"}}>없음 (속성진화석으로 부여)</span>}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:3}}>

            {isDead&&<div style={{display:"flex",gap:6,marginTop:4}}>

              </div>
              <button onClick={()=>setReleaseIdx(i)} style={{padding:"5px 10px",borderRadius:8,
                border:"1px solid rgba(245,158,11,0.3)",background:"rgba(245,158,11,0.08)",
                color:"var(--gold)",fontSize:13,cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>
                🕊️ 방생

            </div>}
            <div style={{fontSize:16,color:"var(--tx3)",marginTop:4}}>{bm.desc}</div>
          </div>;

      </div>

      <div style={{fontSize:16,fontWeight:800,color:"var(--tx1)",marginBottom:12}}>🎒 아이템 가방</div>
      {[
        {title:"포획볼",items:BALLS,key:"balls",color:acHex},
        {title:"먹이",items:FOODS,key:"foods",color:"var(--green)"},
        {title:"진화석",items:EVO_STONES,key:"stones",color:"var(--purple)"},
        {title:"특수 (교환전용)",items:SPECIALS,key:"specials",color:"var(--blue)"},
        {title:"소모품",items:CONSUMABLES,key:"consumables",color:"var(--gold)"},
        {title:"레이드 보상",items:BOSS_ITEMS,key:"bossItems",color:"var(--orange)"},
        {title:"배틀 아이템",items:[{id:"battle_token",name:"배틀 토큰",emoji:"🪙",desc:"배틀 전용 교환 화폐"}],key:"battleItems",color:"var(--cyan)"},
        {title:"속성 진화석",items:TYPE_STONES,key:"typeStones",color:"var(--purple)"},
      ].map(({title,items,key,color})=>(
        <div key={title} style={{marginBottom:12}}>
          <div style={{fontSize:16,fontWeight:700,color:"var(--tx3)",marginBottom:5,letterSpacing:0.5}}>{title.toUpperCase()}</div>
          {items.map(item=>{
            const locked=key==="balls"?!unlocks.balls.includes(item.id):key==="foods"?!unlocks.foods.includes(item.id):key==="stones"?!unlocks.stones.includes(item.id):false;
            const amt=(myS[key]||{})[item.id]||0;
            return <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",
              borderRadius:12,border:`1px solid ${amt>0?color+"25":"rgba(0,0,0,0.06)"}`,marginBottom:4,
              background:amt>0?`${color}06`:"rgba(0,0,0,0.01)",opacity:locked?0.35:1}}>
              <div style={{width:34,height:34,borderRadius:9,background:`${color}18`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{locked?"🔒":item.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:17,fontWeight:700,color:"var(--tx1)"}}>{item.name}{locked?" (잠금)":""}</div>
                <div style={{fontSize:17,color:"var(--tx3)"}}>{item.desc}</div>
              </div>
              <div style={{fontSize:17,fontWeight:800,color:amt>0?color:"var(--tx3)"}}>{amt}<span style={{fontSize:16,fontWeight:400}}>개</span></div>
            </div>;
          })}
        </div>
      ))}
    </div>}

    {/* ── 교환 상점 ── */}
    {tab==="shop"&&(()=>{
      const shopCats=[
        {cat:"볼",label:"🎯 볼 교환",color:"#3b82f6"},
        {cat:"먹이",label:"🍖 먹이 교환",color:"#10b981"},
        {cat:"진화석",label:"💠 진화석 교환",color:"#8b5cf6"},
        {cat:"강화석",label:"🔩 강화석 구매",color:"#f97316"},
        {cat:"특수",label:"⭐ 특수 아이템",color:"#f97316"},
        {cat:"토큰",label:"🪙 배틀토큰 교환",color:"#06b6d4"},
      ];
      return <div style={{padding:12}}>
        <div style={{fontSize:16,fontWeight:800,color:"var(--tx1)",marginBottom:8}}>🛒 교환 상점</div>
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          {[{v:myS.balls?.ball1||0,c:"var(--orange)",e:"🟠",n:"일반볼"},
            {v:myS.battleItems?.battle_token||0,c:"var(--cyan)",e:"🪙",n:"배틀토큰"},
            {v:myS.foods?.food1||0,c:"var(--green)",e:"🌾",n:"일반먹이"}].map(({v,c,e,n})=>(
            <div key={n} style={{flex:1,padding:"8px 6px",background:`${c}12`,borderRadius:12,
              border:`1.5px solid ${c}25`,textAlign:"center",boxShadow:"var(--shadow)"}}>
              <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:16,color:"var(--tx3)",fontWeight:600}}>{e} {n}</div>
            </div>
          ))}
        </div>
        {shopCats.map(({cat,label,color})=>{
          const catItems=SHOP_ITEMS.filter(si=>si.cat===cat);
          if(!catItems.length)return null;
          const today=new Date().toDateString();
          const sdd=myS.shopDailyDate===today?myS.shopDaily||{}:{};
          return <div key={cat} style={{marginBottom:14}}>
            <div style={{fontSize:16,fontWeight:800,color,marginBottom:7,paddingLeft:2}}>{label}</div>
            {catItems.map(item=>{
              const hasEnough=Object.entries(item.cost).every(([id,amt])=>getItemAmt(id)>=amt);
              const bought=item.dailyLimit?(sdd[item.id]||0):0;
              const dailyOver=item.dailyLimit&&bought>=item.dailyLimit;
              const ok=hasEnough&&!dailyOver;
              return <div key={item.id} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 12px",
                borderRadius:13,border:`1.5px solid ${dailyOver?"rgba(239,68,68,0.2)":ok?color+"30":"rgba(0,0,0,0.06)"}`,marginBottom:5,
                background:dailyOver?"rgba(239,68,68,0.03)":ok?`${color}06`:"rgba(0,0,0,0.01)",
                boxShadow:ok?"var(--shadow)":"none",opacity:dailyOver?0.7:1}}>
                <div style={{fontSize:22,flexShrink:0}}>{item.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:17,fontWeight:700,color:"var(--tx1)"}}>{item.name}</div>
                  <div style={{fontSize:16,color:"var(--tx3)"}}>{item.desc}</div>
                  {item.dailyLimit&&<div style={{fontSize:11,marginTop:1,
                    color:dailyOver?"var(--red)":bought>0?"var(--gold)":"var(--tx3)",fontWeight:600}}>
                    📅 오늘 {bought}/{item.dailyLimit}회 {dailyOver?"(한도 초과)":""}

                  border:"none",background:ok?color:"rgba(0,0,0,0.06)",color:ok?"#fff":"rgba(0,0,0,0.2)",
                  fontSize:17,fontWeight:800,cursor:ok?"pointer":"default",whiteSpace:"nowrap",flexShrink:0,
                  fontFamily:"inherit",boxShadow:ok?`0 3px 10px ${color}44`:"none"}}>
                  {dailyOver?"한도":ok?"교환":"부족"}
                </button>
              </div>;
            })}
          </div>;
        })}
      </div>;
    })()}

    {/* ── 던전 (메인탭) ── */}

    {/* ── 탐험 (던전 + 광산) ── */}
    {tab==="explore"&&<div>
      {/* 탐험 헤더 */}
      <div style={{position:"relative",overflow:"hidden"}}>
        <svg width="100%" height={70} viewBox="0 0 600 70" style={{display:"block",width:"100%"}}>

        </svg>

        useStaminaPot={useStaminaPot} acHex={acHex}/>
    </div>}

    {/* ── 사냥터 ── */}
    {tab==="hunt"&&<div>
      <div style={{position:"relative",overflow:"hidden"}}>
        <svg width="100%" height={100} viewBox="0 0 600 100" style={{display:"block",width:"100%"}}>
          <defs><linearGradient id="huntsky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#0f172a"/><stop offset="100%" stopColor="#1e293b"/>
          </linearGradient></defs>
          <rect width={600} height={100} fill="url(#huntsky)"/>
          {[[50,15],[150,8],[280,20],[420,10],[530,18]].map(([sx,sy],i)=>(
            <circle key={i} cx={sx} cy={sy} r={1.5} fill="white" opacity={0.6}/>
          ))}
          <polygon points="0,72 80,35 160,72" fill="#14532d"/>
          <polygon points="100,72 240,22 380,72" fill="#166534"/>
          <polygon points="300,72 450,30 600,72" fill="#14532d"/>
          <rect x={0} y={72} width={600} height={28} fill="#15803d"/>
          <rect x={0} y={72} width={600} height={5} fill="#4ade80"/>
          <text x={300} y={52} textAnchor="middle" fontSize={22} fontWeight="900" fill="white" opacity={0.9}>⚔️ 사냥터</text>
          <text x={300} y={70} textAnchor="middle" fontSize={10} fill="rgba(255,255,255,0.6)">패배 시 몬스터 전사 · 무제한</text>
        </svg>
      </div>
      <div style={{padding:"10px 12px"}}>
        {!bs&&(aliveCols.length===0
          ?<div style={{textAlign:"center",padding:"24px 0",color:"var(--tx3)"}}>살아있는 몬스터 없음!</div>
          :<>
            {/* 사냥 시작 버튼 - 맨 위 */}
            <Btn onClick={startHunt} disabled={myPick===null} color={acHex}>⚔️ 사냥 시작!</Btn>
            {tLv>=15&&<div style={{marginTop:6,marginBottom:8,fontSize:11,color:"var(--red)",textAlign:"center",
              padding:"4px 0",background:"rgba(239,68,68,0.06)",borderRadius:7,border:"1px solid rgba(239,68,68,0.12)"}}>
              ⚠️ Lv.15+ · 보스가 출현할 수 있다...
            </div>}
            {tLv<15&&<div style={{marginTop:6,marginBottom:8,fontSize:11,color:"var(--tx3)",textAlign:"center",
              padding:"4px 0",background:"rgba(0,0,0,0.03)",borderRadius:7}}>
              🔒 Lv.15 달성 시 보스 출현 가능
            </div>}
            {/* 출전 몬스터 선택 - 정렬: 즐겨찾기>등급>강화>스탯 */}
            <div style={{fontSize:11,fontWeight:700,color:"var(--tx2)",marginBottom:6}}>출전 몬스터 선택</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:10}}>
              {[...aliveCols].sort((a,b)=>{
                const gradeOrder={COMMON:0,UNCOMMON:1,RARE:2,UNIQUE:3,EPIC:4,LEGEND:5,MUTANT:6};
                const bmA=MONS.find(m=>m.id===(a.baseId||a.id))||{rarity:'COMMON'};
                const bmB=MONS.find(m=>m.id===(b.baseId||b.id))||{rarity:'COMMON'};
                // 1. 즐겨찾기
                if((b.star||0)!==(a.star||0)) return (b.star||0)-(a.star||0);
                // 2. 등급 높은순
                if((gradeOrder[bmB.rarity]||0)!==(gradeOrder[bmA.rarity]||0))
                  return (gradeOrder[bmB.rarity]||0)-(gradeOrder[bmA.rarity]||0);
                // 3. 강화 높은순
                if((b.enhance||0)!==(a.enhance||0)) return (b.enhance||0)-(a.enhance||0);
                // 4. 스탯합 높은순
                const statA=(a.maxHp||0)+(a.maxAtk||bmA.atk||0);
                const statB=(b.maxHp||0)+(b.maxAtk||bmB.atk||0);
                return statB-statA;

                const ri=col.indexOf(c);const bm=MONS.find(m=>m.id===(c.baseId||c.id))||c;

                const rCol=RCOL[bm.rarity]||'#888';
                return <div key={ri} onClick={()=>setMyPick(ri)} style={{
                  border:myPick===ri?`2px solid ${acHex}`:`1.5px solid ${rCol}30`,
