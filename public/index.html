// ── 진화석 연구소 (부스터/각인/리롤) ──
function SideStoneLab({myS,col,setMy,toast,acHex}){
  const [labTab,setLabTab]=React.useState("boost");
  const [targetIdx,setTargetIdx]=React.useState(null);
  const aliveCols=(myS.collection||[]).filter(c=>c.alive!==false);

  // 부스터: 진화석 소모 → 소환수 EXP 대량 부여
  const useBooster=(stoneId,expAmt)=>{
    if(targetIdx===null){toast("소환수를 선택하세요!","var(--red)");return;}
    if((myS.stones?.[stoneId]||0)<=0){toast("진화석이 없습니다!","var(--red)");return;}
    setMy(s=>{
      let ns={...s,stones:{...s.stones,[stoneId]:Math.max(0,(s.stones[stoneId]||1)-1)}};
      const nc=(ns.collection||[]).map((c,i)=>{
        if(i!==targetIdx)return c;
        const ne=c.exp+expAmt,need=c.lv*30;
        if(ne>=need){const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{hp:30};const nl=c.lv+1,nm=bm.hp+(nl-1)*5;return{...c,lv:nl,exp:ne-need,maxHp:nm,hp:nm,curHp:nm};}
        return{...c,exp:ne};
      });
      return addTamerExp({...ns,collection:nc},15);
    });
    toast(`💠 EXP +${expAmt} 부스터!`,"var(--purple)");
  };

  // 각인: 진화석 소모 → 소환수 스탯 영구 +% (imprint)
  const useImprint=(stoneId,stat,pct)=>{
    if(targetIdx===null){toast("소환수를 선택하세요!","var(--red)");return;}
    if((myS.stones?.[stoneId]||0)<=0){toast("진화석이 없습니다!","var(--red)");return;}
    setMy(s=>{
      let ns={...s,stones:{...s.stones,[stoneId]:Math.max(0,(s.stones[stoneId]||1)-1)}};
      const nc=(ns.collection||[]).map((c,i)=>{
        if(i!==targetIdx)return c;
        const imprints={...(c.imprints||{})};
        imprints[stat]=(imprints[stat]||0)+pct;
        return{...c,imprints};
      });
      return{...ns,collection:nc};
    });
    toast(`🔮 ${stat==="atk"?"ATK":"HP"} 각인 +${pct}%!`,"var(--cyan)");
  };

  // 리롤: 희귀진화석 소모 → 소환수 속성 랜덤 변경
  const useReroll=()=>{
    if(targetIdx===null){toast("소환수를 선택하세요!","var(--red)");return;}
    if((myS.stones?.stone2||0)<=0){toast("희귀진화석이 없습니다!","var(--red)");return;}
    const typeKeys=Object.keys(TYPES);
    const c=aliveCols[targetIdx];if(!c)return;
    const curType=c.monType;
    const newType=typeKeys.filter(t=>t!==curType)[Math.floor(Math.random()*(typeKeys.length-1))];
    const tBonus=TYPES[newType]?.bonus||{};
    const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{hp:30,atk:10};
    setMy(s=>{
      let ns={...s,stones:{...s.stones,stone2:Math.max(0,(s.stones.stone2||1)-1)}};
      const nc=(ns.collection||[]).map((ci,i)=>i!==targetIdx?ci:{
        ...ci,monType:newType,atkBonus:tBonus.atk||0,spdBonus:tBonus.spd||0,
        maxHp:Math.floor((bm.hp+(ci.lv-1)*5)*(1+(tBonus.hp||0))),
      });
      return{...ns,collection:nc};
    });
    toast(`🎲 속성 리롤: ${TYPES[newType]?.emoji}${TYPES[newType]?.name}!`,"var(--orange)");
  };

  const LABS=[
    {id:"boost",label:"💠 부스터",desc:"EXP 대량 지급"},
    {id:"imprint",label:"🔮 각인",desc:"스탯 영구 강화"},
    {id:"reroll",label:"🎲 리롤",desc:"속성 재추첨"},
  ];

  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:6}}>💎 진화석 연구소</div>
    <div style={{display:"flex",gap:4,marginBottom:8}}>
      {LABS.map(l=>(
        <button key={l.id} onClick={()=>setLabTab(l.id)}
          style={{flex:1,padding:"5px 3px",borderRadius:8,border:`1.5px solid ${labTab===l.id?"var(--purple)":"rgba(0,0,0,0.08)"}`,
            background:labTab===l.id?"rgba(139,92,246,0.1)":"white",cursor:"pointer",fontFamily:"inherit",
            fontSize:9,fontWeight:labTab===l.id?800:500,color:labTab===l.id?"var(--purple)":"var(--tx2)"}}>
          {l.label.split(" ")[0]}<br/><span style={{fontSize:7}}>{l.desc}</span>
        </button>
      ))}
    </div>

    {/* 소환수 선택 */}
    <div style={{fontSize:9,fontWeight:700,color:"var(--tx3)",marginBottom:4}}>대상 소환수</div>
    <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:8}}>
      {aliveCols.map((c,i)=>{
        const bm=MONS.find(m=>m.id===(c.baseId||c.id))||{emoji:"❓"};
        return <button key={i} onClick={()=>setTargetIdx(targetIdx===i?null:i)}
          style={{padding:"3px 5px",borderRadius:7,border:`1.5px solid ${targetIdx===i?"var(--purple)":"rgba(0,0,0,0.08)"}`,
            background:targetIdx===i?"rgba(139,92,246,0.1)":"white",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
          {bm.emoji}<span style={{fontSize:7,color:"var(--tx3)",marginLeft:1}}>Lv{c.lv}</span>
        </button>;
      })}
    </div>

    {labTab==="boost"&&<div>
      <div style={{fontSize:10,color:"var(--tx3)",marginBottom:6}}>진화석 소모로 소환수 EXP를 즉시 지급합니다.</div>
      {[
        {id:"stone1",emoji:"💠",exp:50,label:"EXP +50"},
        {id:"stone2",emoji:"🔷",exp:150,label:"EXP +150"},
        {id:"stone3",emoji:"🌀",exp:400,label:"EXP +400"},
      ].map(({id,emoji,exp,label})=>{
        const have=myS.stones?.[id]||0;
        return <div key={id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:10,
          border:`1px solid ${have>0?"rgba(139,92,246,0.2)":"rgba(0,0,0,0.06)"}`,marginBottom:5,
          background:have>0?"rgba(139,92,246,0.04)":"rgba(0,0,0,0.01)"}}>
          <span style={{fontSize:18}}>{emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:"var(--tx1)"}}>{label}</div>
            <div style={{fontSize:9,color:"var(--tx3)"}}>보유: {have}개</div>
          </div>
          <button onClick={()=>useBooster(id,exp)} disabled={have<=0||targetIdx===null}
            style={{padding:"5px 10px",borderRadius:8,border:"none",
              background:have>0&&targetIdx!==null?"var(--purple)":"rgba(0,0,0,0.06)",
              color:have>0&&targetIdx!==null?"white":"rgba(0,0,0,0.2)",
              fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>사용</button>
        </div>;
      })}
    </div>}

    {labTab==="imprint"&&<div>
      <div style={{fontSize:10,color:"var(--tx3)",marginBottom:6}}>소환수에 스탯을 영구 각인합니다. (배틀/진화 후에도 유지)</div>
      {[
        {id:"stone1",emoji:"💠",stat:"atk",pct:2,label:"ATK +2% 각인"},
        {id:"stone2",emoji:"🔷",stat:"hp",pct:3,label:"HP +3% 각인"},
        {id:"stone3",emoji:"🌀",stat:"atk",pct:5,label:"ATK +5% 각인"},
      ].map(({id,emoji,stat,pct,label})=>{
        const have=myS.stones?.[id]||0;
        const cur=targetIdx!==null?(aliveCols[targetIdx]?.imprints?.[stat]||0):0;
        return <div key={id+stat} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:10,
          border:`1px solid ${have>0?"rgba(6,182,212,0.2)":"rgba(0,0,0,0.06)"}`,marginBottom:5,
          background:have>0?"rgba(6,182,212,0.04)":"rgba(0,0,0,0.01)"}}>
          <span style={{fontSize:18}}>{emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:"var(--tx1)"}}>{label}</div>
            <div style={{fontSize:9,color:"var(--tx3)"}}>보유:{have} {targetIdx!==null&&`· 현재 각인:+${cur}%`}</div>
          </div>
          <button onClick={()=>useImprint(id,stat,pct)} disabled={have<=0||targetIdx===null}
            style={{padding:"5px 10px",borderRadius:8,border:"none",
              background:have>0&&targetIdx!==null?"var(--cyan)":"rgba(0,0,0,0.06)",
              color:have>0&&targetIdx!==null?"white":"rgba(0,0,0,0.2)",
              fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>각인</button>
        </div>;
      })}
    </div>}

    {labTab==="reroll"&&<div>
      <div style={{fontSize:10,color:"var(--tx3)",marginBottom:6}}>희귀진화석 1개로 소환수의 속성을 랜덤 재추첨합니다.</div>
      {targetIdx!==null&&<div style={{padding:"8px",borderRadius:9,background:"rgba(249,115,22,0.06)",border:"1px solid rgba(249,115,22,0.2)",marginBottom:8,fontSize:10}}>
        현재 속성: {aliveCols[targetIdx]?.monType?`${TYPES[aliveCols[targetIdx].monType]?.emoji}${TYPES[aliveCols[targetIdx].monType]?.name}`:"없음"}
      </div>}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:11,
        border:`1px solid ${(myS.stones?.stone2||0)>0?"rgba(249,115,22,0.2)":"rgba(0,0,0,0.06)"}`,
        background:(myS.stones?.stone2||0)>0?"rgba(249,115,22,0.04)":"rgba(0,0,0,0.01)"}}>
        <span style={{fontSize:20}}>🔷</span>
        <div style={{flex:1}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--tx1)"}}>속성 리롤</div>
          <div style={{fontSize:9,color:"var(--tx3)"}}>희귀진화석 ×1 소모 · 보유: {myS.stones?.stone2||0}개</div>
        </div>
        <button onClick={useReroll} disabled={(myS.stones?.stone2||0)<=0||targetIdx===null}
          style={{padding:"6px 12px",borderRadius:8,border:"none",
            background:(myS.stones?.stone2||0)>0&&targetIdx!==null?"var(--orange)":"rgba(0,0,0,0.06)",
            color:(myS.stones?.stone2||0)>0&&targetIdx!==null?"white":"rgba(0,0,0,0.2)",
            fontSize:10,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>🎲 리롤</button>
      </div>
    </div>}
  </div>;
}

        </div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {[{label:"ATK +20%",c:"#ef4444"},{label:"DEF +15%",c:"#3b82f6"},{label:"포획률 +20%",c:"#10b981"}].map(({label,c})=>(
          <span key={label} style={{fontSize:10,padding:"2px 7px",borderRadius:10,
            background:`${c}15`,color:c,border:`1px solid ${c}30`,fontWeight:700}}>
            {label}
          </span>
        ))}
      </div>
    </div>}
    {/* 보스 장비 */}
    {Object.keys(myS.equips||{}).length>0&&<div style={{marginTop:10}}>
      <div style={{fontSize:11,fontWeight:700,color:"var(--tx2)",marginBottom:6}}>⚔️ 보스 장비</div>
      <div style={{fontSize:10,color:"var(--tx3)",marginBottom:6}}>
        장착 효과: ATK +{getEquipBonus(myS.equipsOn,myS.equips).atk}% · DEF +{getEquipBonus(myS.equipsOn,myS.equips).def}%
      </div>
      {BOSS_EQUIPS.map(eq=>{
        const have=(myS.equips||{})[eq.id];
        const on=(myS.equipsOn||{})[eq.slot];
        if(!have)return null;
        return <div key={eq.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",
          borderRadius:10,marginBottom:4,
          background:on?"rgba(245,158,11,0.08)":"rgba(0,0,0,0.02)",
          border:`1px solid ${on?"rgba(245,158,11,0.3)":"rgba(0,0,0,0.07)"}`}}>
          <span style={{fontSize:18}}>{eq.emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--tx1)"}}>{eq.name}</div>
            <div style={{fontSize:10,color:"var(--tx3)"}}>{eq.desc}</div>
          </div>
          <button onClick={()=>{
            // equipsOn 토글 - 같은 슬롯은 하나만
            const cur=(myS.equipsOn||{})[eq.slot];
            setMy(s=>({...s,equipsOn:{...(s.equipsOn||{}),[eq.slot]:cur?undefined:true}}));
          }} style={{padding:"4px 9px",borderRadius:7,border:"none",fontFamily:"inherit",
            background:on?"var(--gold)":"rgba(139,92,246,0.12)",
            color:on?"#000":"var(--purple)",fontSize:10,fontWeight:700,cursor:"pointer"}}>
            {on?"해제":"착용"}
          </button>
        </div>;
      })}
    </div>}
  </div>;
}

function SideDex({myS,col,acHex,setMy}){
  const [dexF,setDexF]=React.useState("all");
  const filters=["all",...GRADE_ORDER,...Object.keys(TYPES).map(t=>`type:${t}`)];
  const seenCount=(myS.dexSeen||[]).length;
  const totalCount=MONS.filter(m=>m.rarity!=="DIVINE").length;
  const DEX_REWARDS=[
    {need:5, label:"5종",reward:{enhance_stone:5},emoji:"📗",id:"dex5"},
    {need:10,label:"10종",reward:{enhance_stone:10,food2:2},emoji:"📘",id:"dex10"},
    {need:20,label:"20종",reward:{enhance_stone:20,stone1:1},emoji:"📙",id:"dex20"},
    {need:30,label:"30종",reward:{enhance_stone:30,stone2:1,food3:2},emoji:"📕",id:"dex30"},
    {need:40,label:"40종",reward:{enhance_stone:50,stone3:1,food3:3},emoji:"🏆",id:"dex40"},
    {need:totalCount,label:"완성!",reward:{enhance_stone:100,stone3:2,ball3:3},emoji:"👑",id:"dexAll"},
  ];
  const claimDexReward=(tier)=>{
    if(seenCount<tier.need)return;
    if((myS.dexRewardsClaimed||[]).includes(tier.id))return;
    if(!setMy)return;
    setMy(s=>{
      let ns={...s,dexRewardsClaimed:[...(s.dexRewardsClaimed||[]),tier.id]};
      Object.entries(tier.reward).forEach(([id,amt])=>{ns=addItem(ns,id,amt);});
      return ns;
    });
  };
  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:6}}>📖 도감 <span style={{fontSize:11,color:"var(--tx3)",fontWeight:400}}>{seenCount}/{totalCount}종</span></div>
    {/* 완성도 바 */}
    <div style={{marginBottom:8}}>
      <div style={{background:"rgba(0,0,0,0.07)",borderRadius:6,height:7,overflow:"hidden",marginBottom:4}}>
        <div style={{width:`${Math.min(100,seenCount/totalCount*100)}%`,height:"100%",background:`linear-gradient(90deg,${acHex},${acHex}aa)`,borderRadius:6,transition:"width 0.4s"}}/>
      </div>
      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
        {DEX_REWARDS.map(tier=>{
          const done=seenCount>=tier.need;
          const claimed=(myS.dexRewardsClaimed||[]).includes(tier.id);
          const canClaim=done&&!claimed;
          return <button key={tier.id} onClick={()=>canClaim&&claimDexReward(tier)} style={{
            padding:"3px 5px",borderRadius:7,border:`1px solid ${claimed?"rgba(245,158,11,0.3)":done?"rgba(245,158,11,0.6)":"rgba(0,0,0,0.07)"}`,
            background:claimed?"rgba(245,158,11,0.08)":done?"rgba(245,158,11,0.12)":"rgba(0,0,0,0.02)",
            cursor:canClaim?"pointer":"default",fontFamily:"inherit",
            opacity:done?1:0.45}}>
            <span style={{fontSize:9}}>{tier.emoji}</span>
            <span style={{fontSize:8,color:claimed?"var(--gold)":done?"var(--gold)":"var(--tx3)",fontWeight:600,marginLeft:2}}>{tier.label}{claimed?"✅":canClaim?"🆕":""}</span>
          </button>;
        })}
      </div>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
      {filters.map(f=>{
        const isType=f.startsWith("type:");
        const tk=isType?f.replace("type:",""):null;
        const label=tk?`${TYPES[tk].emoji}`:f==="all"?"전체":f;
        const col2=tk?TYPES[tk].color:acHex;
        return <button key={f} onClick={()=>setDexF(f)} style={{padding:"2px 8px",borderRadius:12,border:`1px solid ${dexF===f?col2:"rgba(0,0,0,0.07)"}`,background:dexF===f?`${col2}15`:"rgba(0,0,0,0.02)",color:dexF===f?col2:"var(--tx3)",fontSize:11,cursor:"pointer",fontWeight:dexF===f?800:400}}>{label}</button>;
      })}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
      {MONS.filter(m=>{
        if(m.rarity==="DIVINE") return dexF==="all"; // DIVINE은 전체 탭에서만
        if(dexF==="all")return true;
        if(dexF.startsWith("type:")){const t=dexF.replace("type:","");return MON_BASE_TYPE[m.id]===t||col.some(c=>c.baseId===m.id&&c.monType===t);}
        return m.rarity===dexF;
      }).map(m=>{
        const owned=col.find(c=>c.id===m.id||(c.baseId&&c.baseId===m.id));
        const seen=(myS.dexSeen||[]).includes(m.id)||owned;
        const bk=(myS.bossKills||{})[m.id];
        const isDivine=m.rarity==="DIVINE";
        if(isDivine&&!seen)return null; // 미발견 DIVINE은 도감에 아예 안보임
        return <div key={m.id} style={{
          border:`1.5px solid ${seen||bk?(isDivine?"#ff660070":m.color+"45"):"rgba(0,0,0,0.06)"}`,
          borderRadius:10,padding:"8px 4px",textAlign:"center",
          opacity:seen||bk?1:0.25,
          background:seen||bk?(isDivine?"rgba(255,102,0,0.06)":`${m.color}08`):"rgba(0,0,0,0.01)",
          boxShadow:isDivine&&seen?"0 0 8px rgba(255,102,0,0.3)":undefined}}>
          <div style={{fontSize:18,filter:isDivine&&seen?"drop-shadow(0 0 4px #ff6600)":undefined}}>{seen||bk?m.emoji:"❓"}</div>
          <div style={{fontSize:11,fontWeight:700,color:isDivine&&seen?"#ff6600":"var(--tx1)",marginTop:1}}>
            {isDivine?"???":seen||bk?m.name:"????"}
          </div>
          <span style={{fontSize:9,fontWeight:800,padding:"1px 4px",borderRadius:6,
            background:isDivine?"rgba(255,102,0,0.15)":(`${RCOL[m.rarity]||"#888"}18`),
            color:isDivine?"#ff6600":RCOL[m.rarity]||"#888",
            border:`1px solid ${isDivine?"rgba(255,102,0,0.3)":RCOL[m.rarity]+"25"||"#88825"}`}}>
            {isDivine?"???.":m.rarity}
          </span>
          {owned&&owned.monType&&<div style={{fontSize:11,color:TYPES[owned.monType]?.color,marginTop:1}}>{TYPES[owned.monType]?.emoji}</div>}
        </div>;
      })}
    </div>
  </div>;
}

function SideAch({myS,acHex,claimAchReward}){
  return <div>
    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:8}}>🏆 업적 <span style={{fontSize:11,color:"var(--tx3)",fontWeight:400}}>{(myS.achievements||[]).length}/{ACHS.length}</span></div>
    {ACHS.map(a=>{
      const done=(myS.achievements||[]).includes(a.id);
      const claimed=(myS.achClaimed||[]).includes(a.id);
      const rStr=a.reward?Object.entries(a.reward).map(([id,v])=>{
        const all=[...FOODS,...CONSUMABLES,...BOSS_ITEMS,{id:"battle_token",emoji:"🪙"},{id:"stone1",emoji:"💠"},{id:"stone2",emoji:"🔷"},{id:"stone3",emoji:"🌀"}].find(x=>x.id===id);
        return all?`${all.emoji}×${v}`:"";
      }).filter(Boolean).join(" "):"";
      return <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:11,border:`1px solid ${done?acHex+"25":"rgba(0,0,0,0.05)"}`,marginBottom:5,background:done?`${acHex}05`:"rgba(0,0,0,0.01)",opacity:done?1:0.4}}>
        <div style={{fontSize:11,width:24,textAlign:"center"}}>{a.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,fontWeight:700,color:done?acHex:"var(--tx2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}{done&&!claimed&&" 🆕"}</div>
          {a.reward&&<div style={{fontSize:11,color:"var(--gold)"}}>{rStr}{a.title?` + "${a.title}"`:""}</div>}
        </div>
        {done&&!claimed&&<button onClick={()=>claimAchReward(a.id)} style={{padding:"4px 8px",borderRadius:7,border:"none",background:"linear-gradient(135deg,var(--gold),#cc8800)",color:"#fff",fontSize:11,fontWeight:800,cursor:"pointer",flexShrink:0}}>수령</button>}
        {claimed&&<span style={{fontSize:11,color:"var(--green)"}}>✅</span>}
      </div>;
    })}
  </div>;
}

    <div style={{fontSize:11,fontWeight:800,color:"var(--tx1)",marginBottom:10}}>📊 확률표</div>
    <div style={{fontSize:11,fontWeight:700,color:"var(--tx2)",marginBottom:6}}>🔮 합성 확률</div>

      ["COMMON+COMMON","RARE 50% / UNIQUE 15% / SUPER 5% / 실패 30%","#607080"],

    {Object.entries(TYPE_CHART).map(([atk,v])=>(
      <div key={atk} style={{display:"flex",gap:6,padding:"4px 8px",borderBottom:"1px solid rgba(0,0,0,0.04)",alignItems:"center"}}>

        <span style={{fontSize:11,color:"var(--tx2)",minWidth:24}}>{TYPES[atk]?.name}</span>

    <div style={{fontSize:11,fontWeight:700,color:"var(--tx2)",marginBottom:6,marginTop:12}}>🔩 강화 확률 & 비용</div>

      <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 8px",borderBottom:"1px solid rgba(0,0,0,0.04)"}}>
        <span style={{fontSize:11,color:"var(--tx2)"}}>{l}</span>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {safe&&<span style={{fontSize:9,color:"var(--green)"}}>{safe}</span>}
          <span style={{fontSize:11,fontWeight:700,color:c}}>{v}</span>
        </div>
      </div>
    ))}
    <div style={{fontSize:11,fontWeight:700,color:"var(--tx2)",marginBottom:6,marginTop:12}}>✨ 진화 결과 확률 (4단계)</div>
    <div style={{fontSize:10,color:"var(--tx3)",marginBottom:5}}>🌟대성공=다른진화체 / ✨성공=일반진화 / 💔실패=🔩×3 / 💀대실패=사망</div>
    {[
      ["COMMON",   "15%","65%","18%","2%",  "#607080"],
      ["UNCOMMON", "10%","60%","25%","5%",  "#1565c0"],
      ["RARE",      "8%","55%","27%","10%", "#00838f"],
      ["UNIQUE",    "5%","50%","30%","15%", "#e65100"],
      ["SUPER",     "3%","42%","35%","20%", "#ad1457"],
      ["EPIC",      "2%","33%","40%","25%", "#6a1b9a"],
    ].map(([g,gs,s,f,ff,c])=>(
      <div key={g} style={{display:"flex",gap:3,alignItems:"center",padding:"4px 6px",borderBottom:"1px solid rgba(0,0,0,0.04)",fontSize:10}}>
        <span style={{fontWeight:700,color:c,minWidth:50}}>{g}</span>
        <span style={{color:"#d97706",background:"rgba(245,158,11,0.1)",padding:"1px 3px",borderRadius:3}}>🌟{gs}</span>
        <span style={{color:"var(--purple)",background:"rgba(139,92,246,0.1)",padding:"1px 3px",borderRadius:3}}>✨{s}</span>

        <span style={{color:"var(--red)",background:"rgba(239,68,68,0.1)",padding:"1px 3px",borderRadius:3}}>💀{ff}</span>

    <div style={{marginTop:6,fontSize:10,color:"var(--tx3)",lineHeight:1.7,padding:"4px 6px",background:"rgba(245,158,11,0.04)",borderRadius:8}}>
      💡 고대파편💎 사용 시 무조건 성공<br/>
      💡 진화 조건: Lv · 강화 · 사냥승 · 먹이횟수 · 던전 · 배틀 · 보스토벌 · 테이머Lv
    </div>
    <div style={{fontSize:11,fontWeight:700,color:"var(--tx2)",marginBottom:6,marginTop:12}}>🕊️ 방생 보상</div>
    {[
      ["COMMON","🌾×2 🟠×1","#607080"],
      ["UNCOMMON","🌾×3 🟠×2 🔩×1","#1565c0"],
      ["RARE","🍖×2 🟠×3 🔩×2","#00838f"],
      ["UNIQUE","🍖×3 🟠×4 🔩×3","#e65100"],
      ["SUPER","✨×1 🔵×1 🔩×5","#ad1457"],
      ["EPIC","✨×2 🔵×2 🔩×8 💠×1","#6a1b9a"],

        <span style={{fontSize:10,color:"var(--tx3)"}}>{reward} <span style={{color:"var(--gold)"}}>+Lv보너스</span></span>
      </div>

    <div style={{marginTop:8,padding:"6px 8px",background:"rgba(245,158,11,0.04)",borderRadius:8,fontSize:10,color:"var(--tx3)",lineHeight:1.6}}>
      💡 보관함: Lv1=16칸 → Lv10=31칸 → Lv20=51칸 → Lv30=76칸 → Lv50=115칸
    </div>
  </div>;
}
